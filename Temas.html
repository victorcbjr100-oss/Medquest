<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Temas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-brain text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800">MedQuest</h1>
                <p class="text-xs text-gray-400">Provas e Questões</p>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-1 mt-4">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 mb-2">Navegação</p>
            
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-all">
                <i class="fas fa-home w-5"></i> Página Inicial
            </a>
            
            <a href="temas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">
                <i class="fas fa-layer-group w-5"></i> Temas
            </a>
        </nav>
    </aside>

    <main class="ml-64 flex-1 p-8">
        <header class="mb-8">
            <div class="flex items-center gap-3 text-blue-600 mb-2">
                <i class="fas fa-book-medical text-2xl"></i>
                <h2 class="text-2xl font-bold text-gray-800">Gerenciar Temas</h2>
            </div>
            <p class="text-gray-500">Selecione uma especialidade médica abaixo</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:border-blue-400 transition-all cursor-pointer group">
                <div class="w-12 h-12 bg-red-50 text-red-500 rounded-xl flex items-center justify-center mb-4 group-hover:bg-red-500 group-hover:text-white transition-all">
                    <i class="fas fa-heartbeat text-xl"></i>
                </div>
                <h3 class="font-bold text-gray-800">Cardiologia</h3>
                <p class="text-xs text-gray-500 mt-1">120 Questões • 15 Simulados</p>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:border-blue-400 transition-all cursor-pointer group">
                <div class="w-12 h-12 bg-green-50 text-green-500 rounded-xl flex items-center justify-center mb-4 group-hover:bg-green-500 group-hover:text-white transition-all">
                    <i class="fas fa-baby text-xl"></i>
                </div>
                <h3 class="font-bold text-gray-800">Pediatria</h3>
                <p class="text-xs text-gray-500 mt-1">85 Questões • 8 Simulados</p>
            </div>
        </div>
    </main>

</body>
</html>
