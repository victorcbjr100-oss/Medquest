<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest - Estudar por Temas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full">
        <div class="p-6">
            <h1 class="font-bold text-blue-600 text-xl flex items-center gap-2">
                <i class="fas fa-brain"></i> MedQuest
            </h1>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-3 mb-2">Navegação</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">
                <i class="fas fa-home"></i> Página Inicial
            </a>
            <a href="temas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">
                <i class="fas fa-layer-group"></i> Temas
            </a>
        </nav>
    </aside>

    <main class="ml-64 flex-1 p-8">
        <div class="max-w-6xl mx-auto">
            
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Estudar por Temas</h2>
                <p class="text-sm text-gray-500">Escolha uma especialidade para ver os subtemas disponíveis</p>
            </div>

            <div class="flex flex-wrap items-center gap-4 mb-8">
                <div class="relative flex-1 min-w-[300px]">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" placeholder="Buscar especialidade ou subtema..." class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="flex bg-white border border-gray-200 rounded-lg p-1 gap-1">
                    <button class="px-4 py-1.5 text-xs font-bold bg-blue-600 text-white rounded-md">Todas as dificuldades</button>
                    <button class="px-4 py-1.5 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded-md transition">Fácil</button>
                    <button class="px-4 py-1.5 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded-md transition">Médio</button>
                    <button class="px-4 py-1.5 text-xs font-bold text-gray-500 hover:bg-gray-50 rounded-md transition">Difícil</button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                
                <a href="cardiologia.html" class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-blue-300 transition-all flex flex-col items-center text-center group">
                    <div class="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-red-500 group-hover:text-white transition-all">
                        <i class="fas fa-heart text-2xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 text-sm">Cardiologia</h3>
                    <p class="text-[11px] text-gray-400 mt-1 font-medium italic">646 questões</p>
                </a>

                <a href="pediatria.html" class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-blue-300 transition-all flex flex-col items-center text-center group">
                    <div class="w-16 h-16 bg-green-50 text-green-500 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-green-500 group-hover:text-white transition-all">
                        <i class="fas fa-child text-2xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 text-sm">Pediatria</h3>
                    <p class="text-[11px] text-gray-400 mt-1 font-medium italic">28 questões</p>
                </a>

                <div class="bg-white p-6 rounded-2xl border border-gray-100 opacity-40 flex flex-col items-center text-center italic">
                    <div class="w-16 h-16 bg-gray-50 text-gray-300 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-lock text-2xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-400 text-sm">Em breve</h3>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
