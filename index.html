<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-[#f8fafc] dark:bg-slate-950 flex min-h-screen transition-colors">

    <aside class="w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex flex-col fixed h-full">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-user-shield text-xl"></i>
            </div>
            <h1 class="font-bold text-gray-800 dark:text-white">Admin</h1>
        </div>
        <nav class="flex-1 px-4 mt-4">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
                <i class="fas fa-home w-5"></i> Dashboard
            </a>
            <a href="temas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">
                <i class="fas fa-database w-5"></i> Questões
            </a>
        </nav>
        </aside>

    <main class="flex-1 p-8 ml-64">
        <header class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Painel Administrativo</h2>
            <p class="text-gray-500">Gerencie a base de dados do MedQuest</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800">
                <p class="text-gray-400 text-xs font-bold uppercase">Total Usuários</p>
                <p class="text-3xl font-bold dark:text-white">1.240</p>
            </div>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800">
                <p class="text-gray-400 text-xs font-bold uppercase">Questões Ativas</p>
                <p class="text-3xl font-bold dark:text-white">15.000</p>
            </div>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800">
                <p class="text-gray-400 text-xs font-bold uppercase">Uptime Sistema</p>
                <p class="text-3xl font-bold text-green-500">99.9%</p>
            </div>
        </div>
    </main>
    </body>
</html>
