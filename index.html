<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script> <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="ml-64 flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-gray-800">Olá, <span id="welcome-name">Victor</span>! 👋</h2>
                <p class="text-gray-500 mt-1">Continue seus estudos médicos e acompanhe seu progresso</p>
            </div>

            </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const dados = JSON.parse(localStorage.getItem('medquest_perfil'));
            if (dados && dados.nome) {
                document.getElementById('welcome-name').innerText = dados.nome.split(' ');
            }
        });
    </script>
</body>
</html>
