<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        main { margin-left: 16rem; }
        
        /* Efeito de virada do Flashcard */
        .flip-card { background-color: transparent; perspective: 1000px; height: 200px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; border-radius: 1.5rem; border: 1px solid #e2e8f0;
        }
        .flip-card-back { transform: rotateY(180deg); background-color: #f0f7ff; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-gray-800">Meu Caderno de Estudos 📝</h2>
                <p class="text-gray-500 mt-1">Organize suas anotações e crie revisões rápidas</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                <div class="bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-yellow-100 text-yellow-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <h3 class="font-bold text-gray-800 text-xl">Anotações Gerais</h3>
                    </div>
                    <textarea id="study-notes" 
                        class="w-full h-64 p-5 bg-yellow-50/50 border border-yellow-100 rounded-2xl text-gray-700 focus:ring-2 focus:ring-yellow-200 focus:outline-none resize-none"
                        placeholder="Escreva aqui suas observações..."></textarea>
                    <button onclick="saveNotes()" class="mt-4 w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-700 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> Salvar Anotações
                    </button>
                </div>

                <div class="bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <h3 class="font-bold text-gray-800 text-xl">Novo Flashcard</h3>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Frente</label>
                            <input type="text" id="fc-front" class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Pergunta...">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Verso</label>
                            <textarea id="fc-back" class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-100 outline-none h-20" placeholder="Resposta..."></textarea>
                        </div>
                        <button onclick="addFlashcard()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">
                            Adicionar ao Lote
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-12">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-2xl font-bold text-gray-800">Meus Flashcards Salvos 📚</h3>
                    <button onclick="clearFlashcards()" class="text-sm text-red-500 hover:underline">Limpar tudo</button>
                </div>
                <div id="flashcards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>
        </div>
    </main>

    <script>
        let flashcards = JSON.parse(localStorage.getItem('medquest_cards')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            // Carregar Notas
            const savedNotes = localStorage.getItem('medquest_notes');
            if (savedNotes) document.getElementById('study-notes').value = savedNotes;
            
            // Carregar Flashcards
            renderFlashcards();
        });

        function saveNotes() {
            const notes = document.getElementById('study-notes').value;
            localStorage.setItem('medquest_notes', notes);
            alert('Anotações salvas!');
        }

        function addFlashcard() {
            const front = document.getElementById('fc-front').value;
            const back = document.getElementById('fc-back').value;

            if (!front || !back) {
                alert('Preencha ambos os lados!');
                return;
            }

            const newCard = {
                id: Date.now(),
                front: front,
                back: back
            };

            flashcards.push(newCard);
            localStorage.setItem('medquest_cards', JSON.stringify(flashcards));
            
            // Limpa campos e atualiza tela
            document.getElementById('fc-front').value = '';
            document.getElementById('fc-back').value = '';
            renderFlashcards();
        }

        function renderFlashcards() {
            const container = document.getElementById('flashcards-container');
            container.innerHTML = '';

            flashcards.forEach((card) => {
                const cardHtml = `
                    <div class="flip-card" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front bg-white shadow-sm border-gray-100">
                                <p class="font-bold text-gray-800">${card.front}</p>
                                <span class="absolute bottom-3 text-[9px] text-gray-400 uppercase font-bold italic">Toque para ver a resposta</span>
                            </div>
                            <div class="flip-card-back shadow-inner">
                                <p class="text-sm text-blue-800 font-medium">${card.back}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function clearFlashcards() {
            if(confirm("Deseja apagar todos os flashcards salvos?")) {
                flashcards = [];
                localStorage.removeItem('medquest_cards');
                renderFlashcards();
            }
        }
    </script>
</body>
</html>
