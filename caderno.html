<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        main { margin-left: 16rem; }
        
        /* Efeito de virada do Flashcard */
        .flip-card { background-color: transparent; perspective: 1000px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 200px;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; border-radius: 1.5rem; border: 1px solid #e2e8f0;
        }
        .flip-card-back { transform: rotateY(180deg); background-color: #f0f7ff; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="flex-1 p-10">
        <div class="max-w-5xl mx-auto">
            
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-gray-800">Meu Caderno de Estudos 📝</h2>
                <p class="text-gray-500 mt-1">Organize suas anotações e crie revisões rápidas</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-yellow-100 text-yellow-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <h3 class="font-bold text-gray-800 text-xl">Bloco de Notas</h3>
                    </div>
                    <textarea id="study-notes" 
                        class="w-full h-80 p-5 bg-yellow-50/50 border border-yellow-100 rounded-2xl text-gray-700 focus:ring-2 focus:ring-yellow-200 focus:outline-none resize-none leading-relaxed"
                        placeholder="Escreva aqui suas observações importantes sobre os casos clínicos..."></textarea>
                    <button onclick="saveNotes()" class="mt-4 w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-700 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> Salvar Anotações
                    </button>
                </div>

                <div class="bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <h3 class="font-bold text-gray-800 text-xl">Criar Flashcard</h3>
                    </div>

                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Frente (Pergunta/Conceito)</label>
                            <input type="text" id="fc-front" class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-100 focus:outline-none" placeholder="Ex: Tríade de Virchow">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Verso (Resposta/Explicação)</label>
                            <textarea id="fc-back" class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-100 focus:outline-none h-20" placeholder="Ex: Estase venosa, lesão endotelial e hipercoagulabilidade."></textarea>
                        </div>
                        <button onclick="previewFlashcard()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">
                            Gerar Flashcard
                        </button>
                    </div>

                    <div id="flashcard-preview" class="flip-card group hidden" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front shadow-sm bg-white">
                                <p id="text-front" class="font-bold text-gray-800"></p>
                                <span class="absolute bottom-3 text-[9px] text-gray-400 uppercase font-bold italic">Clique para virar</span>
                            </div>
                            <div class="flip-card-back shadow-inner">
                                <p id="text-back" class="text-sm text-blue-800 font-medium"></p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Carrega notas salvas ao abrir a página
        window.addEventListener('DOMContentLoaded', () => {
            const savedNotes = localStorage.getItem('medquest_notes');
            if (savedNotes) {
                document.getElementById('study-notes').value = savedNotes;
            }
        });

        // Função para salvar as notas do aluno
        function saveNotes() {
            const notes = document.getElementById('study-notes').value;
            localStorage.setItem('medquest_notes', notes);
            alert('Anotações salvas com sucesso!');
        }

        // Função para gerar a visualização do flashcard
        function previewFlashcard() {
            const front = document.getElementById('fc-front').value;
            const back = document.getElementById('fc-back').value;

            if (!front || !back) {
                alert('Preencha a frente e o verso do cartão.');
                return;
            }

            document.getElementById('text-front').innerText = front;
            document.getElementById('text-back').innerText = back;
            
            const card = document.getElementById('flashcard-preview');
            card.classList.remove('hidden');
            card.classList.remove('flipped'); // Reseta a posição ao criar novo
        }
    </script>
</body>
</html>
