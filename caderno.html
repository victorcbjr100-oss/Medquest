<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Margem para não cobrir a sidebar fixa */
        main { margin-left: 16rem; }

        .flip-card { background-color: transparent; perspective: 1000px; height: 220px; position: relative; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; border-radius: 1.5rem; border: 1px solid #e2e8f0;
        }
        .flip-card-back { transform: rotateY(180deg); background-color: #f0f7ff; }
        
        /* Botões de controle sobre o card */
        .card-actions {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            display: flex; gap: 6px;
        }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-gray-800">Meu Caderno de Estudos 📝</h2>
                <p class="text-gray-500 mt-1">Crie lotes de flashcards que ficam salvos automaticamente.</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                <div class="bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-yellow-100 text-yellow-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <h3 class="font-bold text-gray-800 text-xl">Anotações Gerais</h3>
                    </div>
                    <textarea id="study-notes" class="w-full h-48 p-5 bg-yellow-50/50 border border-yellow-100 rounded-2xl text-gray-700 outline-none resize-none" placeholder="Escreva aqui..."></textarea>
                    <button onclick="saveNotes()" class="mt-4 w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-700 transition-all">Salvar Notas</button>
                </div>

                <div class="bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-plus"></i>
                        </div>
                        <h3 id="form-title" class="font-bold text-gray-800 text-xl">Criar Flashcard</h3>
                    </div>

                    <input type="hidden" id="edit-id" value="">
                    
                    <div class="space-y-4">
                        <input type="text" id="fc-front" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl outline-none" placeholder="Frente (Pergunta)">
                        <textarea id="fc-back" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl outline-none h-20" placeholder="Verso (Resposta)"></textarea>
                        
                        <div class="flex gap-2">
                            <button id="btn-submit" onclick="saveFlashcard()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">
                                Adicionar ao Lote
                            </button>
                            <button id="btn-cancel" onclick="clearForm()" class="hidden bg-gray-200 text-gray-600 px-4 py-3 rounded-xl font-bold">
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Meus Cartões</h3>
                <div id="flashcards-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // Carrega os dados do localStorage ou inicia vazio
        let flashcards = JSON.parse(localStorage.getItem('medquest_batch_cards')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            renderCards();
            const savedNotes = localStorage.getItem('medquest_notes');
            if (savedNotes) document.getElementById('study-notes').value = savedNotes;
        });

        function saveNotes() {
            localStorage.setItem('medquest_notes', document.getElementById('study-notes').value);
            alert('Anotações salvas com sucesso!');
        }

        function saveFlashcard() {
            const front = document.getElementById('fc-front').value;
            const back = document.getElementById('fc-back').value;
            const editId = document.getElementById('edit-id').value;

            if (!front || !back) return alert('Por favor, preencha frente e verso.');

            if (editId) {
                // Atualiza card existente
                const index = flashcards.findIndex(c => c.id == editId);
                flashcards[index].front = front;
                flashcards[index].back = back;
            } else {
                // Cria novo card
                const newCard = { id: Date.now(), front, back };
                flashcards.push(newCard);
            }

            updateStorage();
            clearForm();
        }

        function renderCards() {
            const container = document.getElementById('flashcards-list');
            container.innerHTML = '';

            flashcards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'flip-card';
                cardElement.innerHTML = `
                    <div class="card-actions">
                        <button onclick="event.stopPropagation(); editCard(${card.id})" class="bg-white p-2 rounded-full shadow-md text-blue-500 hover:text-blue-700 border border-gray-100">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteCard(${card.id})" class="bg-white p-2 rounded-full shadow-md text-red-500 hover:text-red-700 border border-gray-100">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="flip-card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                        <div class="flip-card-front bg-white shadow-sm">
                            <p class="font-bold text-gray-800 text-center">${card.front}</p>
                            <span class="absolute bottom-3 text-[9px] text-gray-400 font-bold uppercase">Clique para virar</span>
                        </div>
                        <div class="flip-card-back shadow-inner">
                            <p class="text-sm text-blue-800 font-medium text-center">${card.back}</p>
                        </div>
                    </div>
                `;
                container.appendChild(cardElement);
            });
        }

        function deleteCard(id) {
            if (confirm("Deseja excluir este flashcard?")) {
                flashcards = flashcards.filter(card => card.id !== id);
                updateStorage();
            }
        }

        function editCard(id) {
            const card = flashcards.find(c => c.id === id);
            document.getElementById('fc-front').value = card.front;
            document.getElementById('fc-back').value = card.back;
            document.getElementById('edit-id').value = card.id;

            document.getElementById('form-title').innerText = "Editar Flashcard";
            document.getElementById('btn-submit').innerText = "Salvar Alterações";
            document.getElementById('btn-cancel').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearForm() {
            document.getElementById('fc-front').value = '';
            document.getElementById('fc-back').value = '';
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "Criar Flashcard";
            document.getElementById('btn-submit').innerText = "Adicionar ao Lote";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function updateStorage() {
            localStorage.setItem('medquest_batch_cards', JSON.stringify(flashcards));
            renderCards();
        }
    </script>
</body>
</html>
