<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Estilos de Seleção e Resposta */
        .selected { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .selected span:first-child { background-color: #3b82f6 !important; color: white !important; }
        
        .correct { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .correct span:first-child { background-color: #22c55e !important; color: white !important; }
        
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .wrong span:first-child { background-color: #ef4444 !important; color: white !important; }

        .disabled { pointer-events: none; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20">

    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="cardiologia.html" class="text-gray-500 hover:text-blue-600 flex items-center gap-2 text-sm font-medium transition">
                <i class="fas fa-times"></i> Sair
            </a>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <span class="text-[10px] font-bold text-gray-400 uppercase block">Questão 1/5</span>
                    <div class="w-32 bg-gray-100 h-1.5 rounded-full mt-1">
                        <div class="bg-blue-600 h-1.5 rounded-full" style="width: 20%"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-6">
            <div class="flex items-center justify-between mb-6">
                <span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded uppercase">Cardiologia</span>
                <div id="feedbackBadge" class="hidden px-3 py-1 rounded-full text-[10px] font-bold uppercase"></div>
            </div>

            <p class="text-gray-800 text-lg leading-relaxed mb-10 font-medium">
                Paciente masculino, 55 anos, apresenta infra-desnivelamento de ST em V5 e V6 no ECG. Qual a conduta inicial imediata?
            </p>

            <div class="space-y-3" id="optionsContainer">
                <button onclick="selectOption(this)" data-correct="false" class="option-btn w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">A</span>
                    <span class="text-sm text-gray-600">Realizar angioplastia primária em menos de 90 min.</span>
                </button>
                <button onclick="selectOption(this)" data-correct="true" class="option-btn w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">B</span>
                    <span class="text-sm text-gray-600">Administrar dupla antiagregação plaquetária e estatina.</span>
                </button>
                <button onclick="selectOption(this)" data-correct="false" class="option-btn w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">C</span>
                    <span class="text-sm text-gray-600">Indicar trombólise química com Tenecteplase.</span>
                </button>
                <button onclick="selectOption(this)" data-correct="false" class="option-btn w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">D</span>
                    <span class="text-sm text-gray-600">Solicitar enzimas cardíacas e aguardar resultado.</span>
                </button>
                <button onclick="selectOption(this)" data-correct="false" class="option-btn w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">E</span>
                    <span class="text-sm text-gray-600">Realizar teste ergométrico de urgência.</span>
                </button>
            </div>

            <div class="mt-10 flex justify-between items-center">
                <span id="warning" class="text-xs text-red-500 font-medium opacity-0 italic">Selecione uma opção</span>
                <button id="btnConfirmar" onclick="confirmAnswer()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 hover:scale-105 transition-all">
                    Confirmar Resposta
                </button>
            </div>
        </div>

        <div id="commentSection" class="hidden">
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
                <div class="flex items-center gap-2 mb-4">
                    <i class="far fa-comment-dots text-blue-600"></i>
                    <h3 class="font-bold text-gray-800">Comentários e Notas</h3>
                </div>
                <textarea id="userComment" placeholder="Escreva seu comentário..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm focus:outline-none mb-4 h-24"></textarea>
                <div class="flex justify-between items-center">
                    <div class="flex gap-2">
                        <button onclick="saveComment('Público')" class="text-[11px] font-bold px-4 py-2 rounded-lg bg-blue-50 text-blue-600">Público</button>
                        <button onclick="saveComment('Privado')" class="text-[11px] font-bold px-4 py-2 rounded-lg bg-gray-50 text-gray-500">Privado</button>
                    </div>
                    <span id="statusLabel" class="text-[10px] font-bold text-green-500 uppercase hidden italic">Salvo!</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function selectOption(btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('warning').style.opacity = '0';
        }

        function confirmAnswer() {
            const selected = document.querySelector('.selected');
            const badge = document.getElementById('feedbackBadge');
            if (!selected) { document.getElementById('warning').style.opacity = '1'; return; }

            const isCorrect = selected.getAttribute('data-correct') === 'true';
            
            // Lógica de Cores
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.add('disabled');
                if(btn.getAttribute('data-correct') === 'true') btn.classList.add('correct');
            });

            if (!isCorrect) {
                selected.classList.add('wrong');
                badge.innerText = "Resposta Errada";
                badge.className = "px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-red-50 text-red-600 block";
            } else {
                badge.innerText = "Resposta Correta";
                badge.className = "px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-green-50 text-green-600 block";
            }

            document.getElementById('btnConfirmar').classList.add('hidden');
            document.getElementById('commentSection').classList.remove('hidden');
            document.getElementById('commentSection').scrollIntoView({ behavior: 'smooth' });
        }

        function saveComment(t) {
            document.getElementById('statusLabel').innerText = "Salvo como " + t;
            document.getElementById('statusLabel').classList.remove('hidden');
        }
    </script>
</body>
</html>
