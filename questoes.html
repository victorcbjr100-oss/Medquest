<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        body { margin-left: 16rem; transition: margin 0.3s; }
        @media (max-width: 768px) { body { margin-left: 0; } }

        .alt {
            padding: 18px;
            border-radius: 16px;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            align-items: center;
            background: white;
            font-size: 1.08rem;
            line-height: 1.4;
        }
        .alt:hover:not(.ok):not(.err) {
            border-color: #2563eb;
            background: #f0f9ff;
            transform: translateY(-3px);
        }
        .sel { 
            background: #dbeafe; 
            border-color: #2563eb; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.25);
        }
        .ok { background: #d1fae5 !important; border-color: #10b981 !important; color: #052e16 !important; }
        .err { background: #fee2e2 !important; border-color: #ef4444 !important; color: #7f1d1d !important; }

        .letra-circulo {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            margin-right: 18px;
            font-weight: 700; font-size: 1.25rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .ok .letra-circulo { background: #10b981; color: white; }
        .err .letra-circulo { background: #ef4444; color: white; }

        .timer { font-weight: 700; font-size: 1.35rem; transition: color 0.4s; }
        .progress-bar { height: 8px; background: linear-gradient(to right, #2563eb, #10b981); transition: width 0.5s ease; }
        
        .dificuldade-facil { color: #10b981; }
        .dificuldade-media { color: #eab308; }
        .dificuldade-dificil { color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 p-6 font-sans">

<div class="max-w-3xl mx-auto space-y-8">
    <!-- Header -->
    <div class="bg-white rounded-3xl shadow border border-gray-100 p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <h2 id="tema" class="text-sm font-bold uppercase tracking-widest text-blue-600">Carregando...</h2>
                <span id="dificuldade" class="text-xs font-medium px-3 py-1 rounded-full"></span>
            </div>
            <div class="flex items-center gap-6">
                <div id="timer" class="timer text-red-500">30s</div>
                <div class="text-sm font-medium text-gray-500">
                    Questão <span id="progresso" class="font-semibold text-gray-700">1</span> de <span id="total" class="font-semibold text-gray-700">0</span>
                </div>
            </div>
        </div>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="progress-bar w-0"></div>
        </div>
    </div>

    <!-- Card da Questão -->
    <div class="bg-white p-9 rounded-3xl shadow border border-gray-100">
        <div id="conteudo" class="text-gray-800 text-[1.1rem] leading-relaxed mb-12"></div>

        <div class="flex gap-4">
            <button id="prev" class="px-7 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-semibold transition">Anterior</button>
            <button id="pular" class="px-7 py-4 bg-amber-100 hover:bg-amber-200 text-amber-700 rounded-2xl font-semibold transition">Pular</button>
            <button id="btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition active:scale-95">
                Responder
            </button>
            <button id="next" class="px-7 py-4 bg-gray-800 hover:bg-black text-white rounded-2xl font-semibold transition">Próxima</button>
        </div>
    </div>

    <!-- Explicação -->
    <div id="explicacao-box" class="hidden bg-emerald-50 border border-emerald-100 p-8 rounded-3xl">
        <h3 class="font-bold text-xl text-emerald-800 mb-4 flex items-center gap-2">📌 Explicação Clínica</h3>
        <div id="explicacao-texto" class="text-gray-700 leading-relaxed text-[1.05rem]"></div>
    </div>

    <!-- Comentários -->
    <div id="comentarios-box" class="hidden space-y-6">
        <h3 class="font-bold text-2xl text-gray-800">💬 Discussão Clínica</h3>
        <div id="lista-comentarios" class="space-y-5"></div>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <textarea id="novo-comentario" rows="4" 
                class="w-full border border-gray-200 focus:border-blue-500 rounded-2xl p-5 outline-none resize-y text-gray-700"
                placeholder="Escreva seu raciocínio, dúvida ou comentário clínico..."></textarea>
            <div class="flex justify-end mt-4">
                <button id="btn-comentar" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3.5 rounded-2xl font-bold transition">
                    Postar Comentário
                </button>
            </div>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    let questoes = [];
    let indexAtual = 0;
    let questao = null;
    let marcada = null;
    let respondeu = false;
    let timerInterval = null;
    let tempoRestante = 30;
    let respostasUsuario = []; // {questao_id, marcada, acertou}

    function getAlt(q, l) {
        return q[`op_${l}`] || q[`opcao_${l}`] || q[`alternativa_${l}`] || "";
    }

    async function carregar() {
        try {
            const { data, error } = await supabaseClient.from("questoes").select("*").order('id');
            if (error) throw error;
            questoes = data || [];
            document.getElementById("total").textContent = questoes.length;
            if (questoes.length > 0) mostrarQuestao();
        } catch (e) {
            console.error("Erro ao carregar:", e);
            alert("Não foi possível carregar as questões.");
        }
    }

    function atualizarProgresso() {
        const percent = questoes.length ? Math.round(((indexAtual + 1) / questoes.length) * 100) : 0;
        document.getElementById("progress-bar").style.width = `${percent}%`;
        document.getElementById("progresso").textContent = indexAtual + 1;
    }

    function iniciarTimer() {
        clearInterval(timerInterval);
        tempoRestante = 30;
        const timerEl = document.getElementById("timer");
        timerEl.textContent = "30s";
        timerEl.classList.remove("text-orange-500", "text-red-600");

        timerInterval = setInterval(() => {
            tempoRestante--;
            timerEl.textContent = `${tempoRestante}s`;

            if (tempoRestante <= 10) timerEl.classList.add("text-red-600");
            else if (tempoRestante <= 20) timerEl.classList.add("text-orange-500");

            if (tempoRestante <= 0) {
                clearInterval(timerInterval);
                if (!respondeu) autoResponder();
            }
        }, 1000);
    }

    function autoResponder() {
        respondeu = true;
        document.getElementById("btn").innerText = "Tempo esgotado";
        document.getElementById("btn").disabled = false;
        
        const respostaCorreta = String(questao.resposta_correta || "").toLowerCase().trim();
        const mapa = { a: 0, b: 1, c: 2, d: 3 };
        const itens = document.querySelectorAll(".alt");
        
        if (mapa[respostaCorreta] !== undefined) {
            itens[mapa[respostaCorreta]].classList.add("ok");
        }

        respostasUsuario.push({ questao_id: questao.id, marcada: null, acertou: false });
        mostrarExplicacao();
        document.getElementById("comentarios-box").classList.remove("hidden");
    }

    function mostrarExplicacao() {
        if (questao.explicacao) {
            document.getElementById("explicacao-texto").innerHTML = questao.explicacao;
            document.getElementById("explicacao-box").classList.remove("hidden");
        }
    }

    function mostrarQuestao() {
        if (!questoes[indexAtual]) return;

        questao = questoes[indexAtual];
        marcada = null;
        respondeu = false;

        // Reset botões
        const btn = document.getElementById("btn");
        btn.innerText = "Responder";
        btn.disabled = false;

        document.getElementById("tema").innerText = questao.tema || "Clínica Médica";
        document.getElementById("explicacao-box").classList.add("hidden");
        document.getElementById("comentarios-box").classList.add("hidden");

        // Dificuldade
        const diffEl = document.getElementById("dificuldade");
        if (questao.dificuldade) {
            const diffClass = questao.dificuldade.toLowerCase() === 'facil' ? 'dificuldade-facil' : 
                             questao.dificuldade.toLowerCase() === 'media' ? 'dificuldade-media' : 'dificuldade-dificil';
            diffEl.innerHTML = `<span class="${diffClass}">${questao.dificuldade}</span>`;
            diffEl.classList.remove("hidden");
        } else {
            diffEl.classList.add("hidden");
        }

        let html = `<p class="mb-10 font-medium">${questao.enunciado}</p><div class="space-y-5">`;
        ["a", "b", "c", "d"].forEach(l => {
            const texto = getAlt(questao, l);
            if (texto) {
                html += `
                    <div class="alt" data-l="${l}">
                        <div class="letra-circulo">${l.toUpperCase()}</div>
                        <span>${texto}</span>
                    </div>`;
            }
        });
        html += `</div>`;

        document.getElementById("conteudo").innerHTML = html;

        // Seleção de alternativa
        document.querySelectorAll(".alt").forEach(el => {
            el.addEventListener("click", () => {
                if (respondeu) return;
                document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
                el.classList.add("sel");
                marcada = el.dataset.l;
            });
        });

        iniciarTimer();
        atualizarProgresso();
    }

    // ==================== BOTÃO RESPONDER ====================
    document.getElementById("btn").addEventListener("click", async () => {
        if (!respondeu && !marcada) {
            alert("Escolha uma alternativa antes de responder.");
            return;
        }

        if (respondeu) {
            if (indexAtual < questoes.length - 1) {
                indexAtual++;
                mostrarQuestao();
            } else {
                mostrarResumoFinal();
            }
            return;
        }

        // Responder
        respondeu = true;
        clearInterval(timerInterval);

        const respostaCorreta = String(questao.resposta_correta || "").toLowerCase().trim();
        const acertou = marcada === respostaCorreta;

        const mapa = { a: 0, b: 1, c: 2, d: 3 };
        const itens = document.querySelectorAll(".alt");

        if (mapa[respostaCorreta] !== undefined) itens[mapa[respostaCorreta]].classList.add("ok");
        if (!acertou && marcada && mapa[marcada] !== undefined) itens[mapa[marcada]].classList.add("err");

        if (acertou) {
            confetti({
                particleCount: 200,
                spread: 80,
                origin: { y: 0.6 }
            });
        }

        document.getElementById("btn").innerText = "Próxima Questão";

        respostasUsuario.push({ questao_id: questao.id, marcada, acertou });

        if (typeof registrarRevisao === "function") {
            await registrarRevisao(questao.id, acertou);
        }

        mostrarExplicacao();
        document.getElementById("comentarios-box").classList.remove("hidden");
        await carregarComentarios();
    });

    // Pular questão
    document.getElementById("pular").addEventListener("click", () => {
        if (respondeu) return;
        if (confirm("Deseja realmente pular esta questão? Você não receberá ponto.")) {
            clearInterval(timerInterval);
            respostasUsuario.push({ questao_id: questao.id, marcada: null, acertou: false });
            if (indexAtual < questoes.length - 1) {
                indexAtual++;
                mostrarQuestao();
            } else {
                mostrarResumoFinal();
            }
        }
    });

    function mostrarResumoFinal() {
        const total = questoes.length;
        const acertos = respostasUsuario.filter(r => r.acertou).length;
        const percent = total ? Math.round((acertos / total) * 100) : 0;

        const html = `
            <div class="text-center py-20">
                <div class="text-8xl mb-8">🎉</div>
                <h1 class="text-5xl font-bold text-gray-900 mb-3">Quiz Finalizado!</h1>
                <p class="text-2xl text-gray-600 mb-12">Aqui está seu desempenho</p>

                <div class="mx-auto max-w-md bg-white border border-gray-100 shadow-xl rounded-3xl p-12">
                    <div class="text-[6.5rem] font-black leading-none ${percent >= 80 ? 'text-emerald-600' : percent >= 60 ? 'text-blue-600' : 'text-rose-600'}">
                        ${percent}%
                    </div>
                    <p class="text-xl text-gray-500 mt-2">de aproveitamento</p>
                    
                    <div class="mt-10 grid grid-cols-2 gap-8 text-left">
                        <div>
                            <div class="text-4xl font-semibold">${acertos}</div>
                            <div class="text-gray-500">Acertos</div>
                        </div>
                        <div>
                            <div class="text-4xl font-semibold">${total - acertos}</div>
                            <div class="text-gray-500">Erros</div>
                        </div>
                    </div>
                </div>

                <div class="mt-12 flex flex-wrap gap-4 justify-center">
                    <button onclick="reiniciarQuiz()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-5 rounded-2xl font-bold text-lg transition">
                        Reiniciar Quiz Completo
                    </button>
                    <button onclick="iniciarRevisao()" 
                        class="bg-emerald-600 hover:bg-emerald-700 text-white px-12 py-5 rounded-2xl font-bold text-lg transition">
                        Revisar Apenas os Erros
                    </button>
                </div>
            </div>`;

        document.getElementById("conteudo").innerHTML = html;
        document.getElementById("btn").classList.add("hidden");
        document.getElementById("pular").classList.add("hidden");
        document.getElementById("explicacao-box").classList.add("hidden");
        document.getElementById("comentarios-box").classList.add("hidden");
    }

    window.reiniciarQuiz = () => location.reload();

    window.iniciarRevisao = () => {
        const indicesErros = respostasUsuario
            .map((r, idx) => r.acertou ? null : idx)
            .filter(idx => idx !== null);

        if (indicesErros.length === 0) {
            alert("Parabéns! Você não errou nenhuma questão.");
            return;
        }

        questoes = indicesErros.map(i => questoes[i]);
        respostasUsuario = [];
        indexAtual = 0;
        mostrarQuestao();
        alert(`🔄 Modo Revisão ativado — ${questoes.length} questões para revisar.`);
    };

    // ==================== TECLAS DE ATALHO ====================
    document.addEventListener("keydown", e => {
        if (respondeu) return;

        const key = e.key.toLowerCase();
        if (["a","b","c","d"].includes(key)) {
            const alt = document.querySelector(`.alt[data-l="${key}"]`);
            if (alt) {
                document.querySelectorAll(".alt").forEach(el => el.classList.remove("sel"));
                alt.classList.add("sel");
                marcada = key;
            }
        }

        if (e.key === "Enter" && marcada) {
            document.getElementById("btn").click();
        }
    });

    // ==================== COMENTÁRIOS ====================
    async function carregarComentarios() {
        if (!questao?.id) return;
        try {
            const { data, error } = await supabaseClient
                .from("comentarios")
                .select("*")
                .eq("questao_id", questao.id)
                .order("created_at", { ascending: false });

            if (error) throw error;

            const lista = document.getElementById("lista-comentarios");
            lista.innerHTML = "";

            if (!data || data.length === 0) {
                lista.innerHTML = `<p class="text-center text-gray-400 py-10 italic">Nenhum comentário ainda. Seja o primeiro!</p>`;
                return;
            }

            data.filter(c => !c.parent_id).forEach(c => {
                lista.innerHTML += `
                    <div class="bg-white p-7 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div class="font-semibold text-blue-700">${c.usuario_nome || 'Colega'}</div>
                            <div class="text-xs text-gray-400">${new Date(c.created_at).toLocaleDateString('pt-BR')}</div>
                        </div>
                        <p class="text-gray-700">${c.texto}</p>
                        <button onclick="like('${c.id}')" class="mt-5 text-sm flex items-center gap-2 text-gray-500 hover:text-blue-600 transition">
                            👍 ${c.likes || 0}
                        </button>
                    </div>`;
            });
        } catch (e) {
            console.error(e);
        }
    }

    document.getElementById("btn-comentar").addEventListener("click", async () => {
        const texto = document.getElementById("novo-comentario").value.trim();
        if (!texto || !questao?.id) return;

        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const nome = user?.email ? user.email.split("@")[0] : "Colega";

            await supabaseClient.from("comentarios").insert([{
                questao_id: questao.id,
                texto: texto,
                usuario_nome: nome
            }]);

            document.getElementById("novo-comentario").value = "";
            await carregarComentarios();
        } catch (e) {
            alert("Erro ao publicar comentário.");
        }
    });

    window.like = async (id) => {
        try {
            await supabaseClient.rpc("increment_like", { comment_id: id });
            await carregarComentarios();
        } catch (e) { console.error(e); }
    };

    // Navegação básica
    document.getElementById("next").addEventListener("click", () => {
        if (indexAtual < questoes.length - 1) {
            indexAtual++;
            mostrarQuestao();
        }
    });

    document.getElementById("prev").addEventListener("click", () => {
        if (indexAtual > 0) {
            indexAtual--;
            mostrarQuestao();
        }
    });

    // Iniciar aplicação
    carregar();
});
</script>
</body>
</html>
