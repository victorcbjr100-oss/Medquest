<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        main { margin-left: 16rem; }
        .alternativa { transition: all 0.2s ease; cursor: pointer; }
        .alternativa:hover { border-color: #3b82f6; background-color: #f0f7ff; }
        .correta { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46; }
        .errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="flex-1 p-8 md:p-12">
        <div class="max-w-4xl mx-auto">
            
            <header class="mb-8">
                <a href="temas.html" class="text-blue-600 text-xs font-bold uppercase flex items-center gap-2 mb-4 hover:underline">
                    <i class="fas fa-arrow-left"></i> Voltar aos Temas
                </a>
                <h2 id="titulo-tema" class="text-3xl font-bold text-gray-800 tracking-tight">Carregando questões...</h2>
                <div id="status-progresso" class="text-sm text-gray-500 mt-2 font-medium"></div>
            </header>

            <div id="questoes-container" class="space-y-8"></div>

            <div id="empty-state" class="hidden text-center py-20">
                <i class="fas fa-folder-open text-gray-300 text-6xl mb-4"></i>
                <p class="text-gray-500 font-medium">Nenhuma questão cadastrada para este tema ainda.</p>
            </div>

        </div>
    </main>

    <script>
        const bancoDeQuestoes = [
            {
                id: 1,
                tema: 'HAS',
                enunciado: "Qual o valor definido pela SBC para diagnóstico de Hipertensão Arterial Sistêmica em medidas de consultório?",
                opcoes: ["≥ 120/80 mmHg", "≥ 130/85 mmHg", "≥ 140/90 mmHg", "≥ 150/95 mmHg"],
                correta: 2
            },
            {
                id: 2,
                tema: 'HAS',
                enunciado: "Qual a droga de primeira escolha para tratamento de HAS em pacientes diabéticos com microalbuminúria?",
                opcoes: ["Anlodipino", "Enalapril (IECA)", "Clortalidona", "Atenolol"],
                correta: 1
            },
            {
                id: 3,
                tema: 'IAM',
                enunciado: "No Infarto Agudo do Miocárdio com supra de ST, qual o tempo 'porta-balão' ideal?",
                opcoes: ["60 minutos", "90 minutos", "120 minutos", "180 minutos"],
                correta: 1
            }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const temaSelecionado = urlParams.get('tema');

        function carregarQuestoes() {
            const container = document.getElementById('questoes-container');
            const titulo = document.getElementById('titulo-tema');
            
            if (!temaSelecionado) {
                titulo.innerText = "Todas as Questões";
                exibirQuestoes(bancoDeQuestoes);
                return;
            }

            titulo.innerText = `Questões: ${temaSelecionado}`;
            const filtradas = bancoDeQuestoes.filter(q => q.tema === temaSelecionado);

            if (filtradas.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            exibirQuestoes(filtradas);
        }

        function exibirQuestoes(lista) {
            const container = document.getElementById('questoes-container');
            document.getElementById('status-progresso').innerText = `${lista.length} questões encontradas`;

            lista.forEach((q, index) => {
                const questaoDiv = document.createElement('div');
                questaoDiv.className = "bg-white p-8 rounded-[24px] border border-gray-100 shadow-sm mb-6";
                
                let alternativasHTML = '';
                q.opcoes.forEach((opt, i) => {
                    alternativasHTML += `
                        <div onclick="verificarResposta(this, ${i}, ${q.correta})" 
                             class="alternativa p-4 border border-gray-100 rounded-xl mb-3 font-medium text-gray-700 flex items-center gap-4">
                            <span class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-xs font-bold text-gray-400">${String.fromCharCode(65 + i)}</span>
                            ${opt}
                        </div>
                    `;
                });

                questaoDiv.innerHTML = `
                    <p class="text-xs font-bold text-blue-600 uppercase mb-3 tracking-widest">Questão ${index + 1}</p>
                    <h3 class="text-lg font-bold text-gray-800 mb-6 leading-relaxed">${q.enunciado}</h3>
                    <div class="opcoes-container">
                        ${alternativasHTML}
                    </div>
                    <div class="feedback hidden mt-4 p-4 rounded-xl text-sm font-bold"></div>
                `;
                container.appendChild(questaoDiv);
            });
        }

        function verificarResposta(elemento, indexClicado, indexCorreto) {
            const container = elemento.parentElement;
            if (container.classList.contains('respondida')) return;
            container.classList.add('respondida');

            const alternativas = container.querySelectorAll('.alternativa');
            const feedbackDiv = container.nextElementSibling;

            // --- INÍCIO DA CONEXÃO COM ESTATÍSTICAS ---
            let stats = JSON.parse(localStorage.getItem('medquest_stats')) || { total: 0, acertos: 0, erros: 0 };
            stats.total += 1;
            // --- FIM DA CONEXÃO ---

            alternativas[indexCorreto].classList.add('correta');

            if (indexClicado === indexCorreto) {
                elemento.classList.add('correta');
                feedbackDiv.innerText = "✅ Resposta correta!";
                feedbackDiv.classList.add('bg-emerald-50', 'text-emerald-600');
                stats.acertos += 1; // Salva o acerto
            } else {
                elemento.classList.add('errada');
                feedbackDiv.innerText = "❌ Resposta incorreta.";
                feedbackDiv.classList.add('bg-red-50', 'text-red-600');
                stats.erros += 1; // Salva o erro
            }

            // Atualiza o banco de dados local
            localStorage.setItem('medquest_stats', JSON.stringify(stats));
            
            feedbackDiv.classList.remove('hidden');
        }

        window.onload = carregarQuestoes;
    </script>
</body>
</html>
