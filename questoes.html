<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .correta { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .travado { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-brain text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 leading-tight">MedQuest</h1>
                <p class="text-xs text-gray-400">Provas e Questões</p>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 mb-2">Navegação</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-all">
                <i class="fas fa-home w-5"></i> Página Inicial
            </a>
            <a href="temas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">
                <i class="fas fa-layer-group w-5"></i> Temas
            </a>
            <a href="estatisticas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-all">
                <i class="fas fa-chart-bar w-5"></i> Estatísticas
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8 ml-64">
        <header class="bg-white border border-gray-200 rounded-2xl p-4 mb-6 flex items-center justify-between shadow-sm">
            <a href="temas.html" class="text-gray-400 hover:text-blue-600 transition font-bold text-sm"><i class="fas fa-arrow-left mr-2"></i> Voltar</a>
            <span id="contador-questoes" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Carregando tema...</span>
        </header>

        <div id="card-questao" class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-6">
            <div class="mb-6">
                <span id="label-tema" class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded uppercase">Tema</span>
            </div>
            
            <p id="enunciado" class="text-gray-800 text-lg leading-relaxed mb-10 font-medium">Carregando...</p>

            <div class="space-y-3" id="campoAlternativas">
                <button onclick="marcar(this)" id="btn-A" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">A</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-B" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">B</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-C" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">C</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-D" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">D</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-E" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">E</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
            </div>

            <div class="mt-10 flex flex-wrap md:flex-nowrap justify-between items-center border-t pt-6 gap-3">
                <button id="btn-anterior" onclick="questaoAnterior()" class="bg-white border border-gray-200 text-gray-600 px-6 py-3 rounded-xl font-bold text-sm shadow-sm hover:bg-gray-50 transition-all flex items-center gap-2">
                    <i class="fas fa-chevron-left text-xs"></i> Anterior
                </button>

                <button id="btn-confirmar" onclick="verificar()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg hover:scale-105 transition-all flex-1 order-first md:order-none mb-4 md:mb-0 w-full md:w-auto">
                    Confirmar Resposta
                </button>
                
                <button id="btn-proxima" onclick="proximaQuestao()" class="bg-white border border-gray-200 text-gray-700 px-6 py-3 rounded-xl font-bold text-sm shadow-sm hover:bg-gray-50 transition-all flex items-center gap-2">
                    Próxima <i class="fas fa-chevron-right text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const temaAlvo = urlParams.get('tema') || 'Geral';
        let questaoAtualId = null;
        let elementoSelecionado = null;
        let totalNoTema = 0;

        window.onload = carregarQuestao;

        async function carregarQuestao() {
            // Busca o total de questões do tema de uma vez para o contador
            const { count } = await supabaseClient
                .from('banco_questoes')
                .select('*', { count: 'exact', head: true })
                .eq('tema', temaAlvo);
            totalNoTema = count || 0;

            const idUrl = urlParams.get('id');
            let query = supabaseClient.from('banco_questoes').select('*').eq('tema', temaAlvo);

            if (idUrl) {
                query = query.eq('id', idUrl);
            } else {
                query = query.order('id', { ascending: true }).limit(1);
            }

            const { data, error } = await query.single();

            if (data) {
                questaoAtualId = data.id;
                renderizarQuestao(data);
                atualizarContador();
            } else {
                document.getElementById('enunciado').innerText = "Nenhuma questão encontrada para este tema.";
            }
        }

        function renderizarQuestao(q) {
            document.getElementById('enunciado').innerHTML = q.enunciado;
            document.getElementById('label-tema').innerText = q.tema;
            
            const alternativas = [
                { letra: 'A', texto: q.opcao_a },
                { letra: 'B', texto: q.opcao_b },
                { letra: 'C', texto: q.opcao_c },
                { letra: 'D', texto: q.opcao_d },
                { letra: 'E', texto: q.opcao_e }
            ];

            alternativas.forEach(alt => {
                const btn = document.getElementById(`btn-${alt.letra}`);
                if (alt.texto) {
                    btn.querySelector('.texto-alternativa').innerText = alt.texto;
                    btn.setAttribute('data-certa', alt.letra === q.correta ? 'true' : 'false');
                    btn.classList.remove('selecionada', 'correta', 'errada', 'travado');
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            });

            document.getElementById('btn-confirmar').classList.remove('travado');
            document.getElementById('btn-confirmar').style.opacity = "1";
            elementoSelecionado = null;
        }

        function marcar(el) {
            document.querySelectorAll('.botao-opcao').forEach(btn => btn.classList.remove('selecionada'));
            el.classList.add('selecionada');
            elementoSelecionado = el;
        }

        function verificar() {
            if (!elementoSelecionado) {
                alert("Selecione uma alternativa!");
                return;
            }
            document.querySelectorAll('.botao-opcao').forEach(btn => btn.classList.add('travado'));
            const eCorreta = elementoSelecionado.getAttribute('data-certa') === 'true';
            
            if (eCorreta) elementoSelecionado.classList.add('correta');
            else {
                elementoSelecionado.classList.add('errada');
                document.querySelectorAll('.botao-opcao').forEach(btn => {
                    if (btn.getAttribute('data-certa') === 'true') btn.classList.add('correta');
                });
            }
            document.getElementById('btn-confirmar').classList.add('travado');
            document.getElementById('btn-confirmar').style.opacity = "0.5";
        }

        async function proximaQuestao() {
            const { data } = await supabaseClient
                .from('banco_questoes')
                .select('id')
                .eq('tema', temaAlvo)
                .gt('id', questaoAtualId)
                .order('id', { ascending: true })
                .limit(1).single();

            if (data) navegarPara(data.id);
            else alert("Fim das questões deste tema.");
        }

        async function questaoAnterior() {
            const { data } = await supabaseClient
                .from('banco_questoes')
                .select('id')
                .eq('tema', temaAlvo)
                .lt('id', questaoAtualId)
                .order('id', { ascending: false })
                .limit(1).single();

            if (data) navegarPara(data.id);
            else alert("Esta é a primeira questão.");
        }

        function navegarPara(id) {
            const novaUrl = `questoes.html?tema=${temaAlvo}&id=${id}`;
            window.history.pushState({path: novaUrl}, '', novaUrl);
            questaoAtualId = id;
            carregarQuestao();
        }

        function atualizarContador() {
            document.getElementById('contador-questoes').innerText = `TEMA: ${temaAlvo} | TOTAL: ${totalNoTema}`;
        }
    </script>
</body>
</html>
