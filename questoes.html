<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedQuest Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="sidebar.js"></script>

<style>
body { margin-left: 16rem; }
@media (max-width: 768px) { body { margin-left: 0; } }

.alt { padding: 14px; border-radius: 12px; border:1px solid #e5e7eb; cursor:pointer; }
.sel { background:#eff6ff; border-color:#3b82f6; }
.ok { background:#ecfdf5; border-color:#10b981; }
.err { background:#fef2f2; border-color:#ef4444; }
</style>
</head>

<body class="bg-gray-50 p-6">

<div class="max-w-3xl mx-auto space-y-6">

<!-- QUESTÃO -->
<div class="bg-white p-6 rounded-2xl shadow">

<h2 id="tema" class="text-lg font-bold mb-4">Carregando...</h2>

<div id="conteudo"></div>

<div class="flex gap-2 mt-6">
<button id="prev" class="flex-1 bg-gray-200 py-2 rounded">Anterior</button>
<button id="btn" class="flex-1 bg-blue-600 text-white py-2 rounded">Responder</button>
<button id="next" class="flex-1 bg-gray-800 text-white py-2 rounded">Próxima</button>
</div>

</div>

<!-- COMENTÁRIOS -->
<div id="comentarios-box" class="hidden bg-white p-6 rounded-2xl shadow">

<h3 class="font-bold mb-4 text-lg">💬 Discussão Clínica</h3>

<div id="lista-comentarios" class="space-y-4"></div>

<textarea id="novo-comentario" class="w-full border p-3 rounded mt-4" placeholder="Escreva um comentário..."></textarea>
<button id="btn-comentar" class="bg-blue-600 text-white px-4 py-2 rounded mt-2">Postar</button>

</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

let questoes = [];
let indexAtual = 0;
let questao = null;
let marcada = null;
let respondeu = false;

function getAlt(q, l){
return q["op_"+l] || q["opcao_"+l] || q["alternativa_"+l];
}

async function carregar(){
const { data } = await supabaseClient.from("questoes").select("*");
questoes = data;
mostrarQuestao();
}

function mostrarQuestao(){
questao = questoes[indexAtual];
marcada=null; respondeu=false;

document.getElementById("tema").innerText = questao.tema;

let html = `<p class="mb-4">${questao.enunciado}</p>`;

["a","b","c","d"].forEach(l=>{
html += `<div class="alt" data-l="${l}">
<b>${l})</b> ${getAlt(questao,l)}
</div>`;
});

document.getElementById("conteudo").innerHTML = html;

document.querySelectorAll(".alt").forEach(el=>{
el.onclick=()=>{
if(respondeu)return;
document.querySelectorAll(".alt").forEach(e=>e.classList.remove("sel"));
el.classList.add("sel");
marcada = el.dataset.l;
};
});

document.getElementById("comentarios-box").classList.add("hidden");
}

document.getElementById("btn").onclick = async () => {

if(!marcada)return alert("Escolha uma alternativa");

if(respondeu){
indexAtual++;
mostrarQuestao();
return;
}

respondeu=true;

const correta = questao.resposta_correta;
const mapa={a:0,b:1,c:2,d:3};
const itens=document.querySelectorAll(".alt");

itens[mapa[correta]]?.classList.add("ok");
if(marcada!==correta) itens[mapa[marcada]]?.classList.add("err");

document.getElementById("btn").innerText="Próxima";

document.getElementById("comentarios-box").classList.remove("hidden");

carregarComentarios();
};

// =================== COMENTÁRIOS ===================

async function carregarComentarios(){

const { data } = await supabaseClient
.from("comentarios")
.select("*")
.eq("questao_id", questao.id)
.order("created_at",{ascending:false});

const lista=document.getElementById("lista-comentarios");
lista.innerHTML="";

data.forEach(c=>{
if(!c.parent_id){
lista.innerHTML += renderComentario(c,data);
}
});

}

function renderComentario(c, all){

const respostas = all.filter(x=>x.parent_id===c.id);

return `
<div class="border p-3 rounded-lg">

<div class="flex justify-between text-xs text-gray-500">
<b>${c.usuario_nome}</b>
<span>${new Date(c.created_at).toLocaleString()}</span>
</div>

<div class="mt-1">${c.texto}</div>

<div class="flex gap-3 mt-2 text-xs">

<button onclick="like('${c.id}')">👍 ${c.likes||0}</button>

<button onclick="responder('${c.id}')">Responder</button>

</div>

<div class="ml-4 mt-3 space-y-2">
${respostas.map(r=>`
<div class="border-l pl-3 text-sm">
<b>${r.usuario_nome}</b> - ${r.texto}
</div>
`).join("")}
</div>

</div>`;
}

// =================== POST ===================
document.getElementById("btn-comentar").onclick = async ()=>{

const texto = document.getElementById("novo-comentario").value;
if(!texto)return;

const user = await getUser().catch(()=>null);

await supabaseClient.from("comentarios").insert([{
questao_id: questao.id,
texto,
usuario_nome: user?.email?.split("@")[0] || "User"
}]);

document.getElementById("novo-comentario").value="";
carregarComentarios();
};

// =================== LIKE ===================
window.like = async (id)=>{
await supabaseClient.rpc("increment_like",{comment_id:id});
carregarComentarios();
};

// =================== RESPONDER ===================
window.responder = async (parent_id)=>{

const texto = prompt("Responder comentário:");

if(!texto)return;

const user = await getUser().catch(()=>null);

await supabaseClient.from("comentarios").insert([{
questao_id: questao.id,
texto,
parent_id,
usuario_nome: user?.email?.split("@")[0] || "User"
}]);

carregarComentarios();
};

carregar();

});
</script>

</body>
</html>
