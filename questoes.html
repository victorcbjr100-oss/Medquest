<script>
    const SUPABASE_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let questoesFiltradas = [];
    let indiceAtual = 0;
    let respondida = false;
    let opcaoSelecionada = null;

    const urlParams = new URLSearchParams(window.location.search);
    const temaURL = urlParams.get('tema');

    async function inicializar() {
        try {
            let query = _supabase.from('questoes').select('*');

            if (temaURL) {
                // CORREÇÃO: Filtra se o termo está na coluna 'tema' OU 'subtema'
                query = query.or(`tema.eq."${temaURL}",subtema.eq."${temaURL}"`);
            }

            const { data, error } = await query;
            if (error) throw error;

            questoesFiltradas = data;

            if (!questoesFiltradas || questoesFiltradas.length === 0) {
                document.getElementById('questao-card').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('titulo-tema').innerText = "Nenhuma questão";
                return;
            }
            
            document.getElementById('titulo-tema').innerText = temaURL || "Geral - ENAMED";
            renderizarQuestao();

        } catch (err) {
            console.error("Erro Supabase:", err);
            document.getElementById('titulo-tema').innerText = "Erro de Conexão";
        }
    }

    function renderizarQuestao() {
        const q = questoesFiltradas[indiceAtual];
        const container = document.getElementById('conteudo-questao');
        
        respondida = false;
        opcaoSelecionada = null;
        
        document.getElementById('feedback-container').classList.add('hidden');
        document.getElementById('btn-acao').innerText = "Responder";
        document.getElementById('contador-questoes').innerText = `Questão ${indiceAtual + 1} de ${questoesFiltradas.length}`;

        const opcoes = [q.opcao_a, q.opcao_b, q.opcao_c, q.opcao_d];

        let html = `
            <div class="flex justify-between items-center mb-4">
                <p class="text-xs font-bold text-blue-600 uppercase tracking-widest">${q.origem || 'ID #' + q.id}</p>
                <span class="px-3 py-1 bg-blue-50 text-[10px] font-bold text-blue-600 rounded-full">
                    ${q.subtema ? q.subtema : q.tema}
                </span>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-8 leading-relaxed">${q.enunciado}</h3>
            <div class="space-y-3">
        `;

        opcoes.forEach((opt, i) => {
            if (opt) {
                html += `
                    <div onclick="selecionarOpcao(this, ${i})" 
                         class="alternativa p-5 border border-gray-100 rounded-2xl font-medium text-gray-700 flex items-center gap-4 bg-white">
                        <span class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-xs font-bold text-gray-400">
                            ${String.fromCharCode(65 + i)}
                        </span>
                        ${opt}
                    </div>
                `;
            }
        });

        html += `</div>`;
        container.innerHTML = html;
    }

    function selecionarOpcao(elemento, index) {
        if (respondida) return;
        document.querySelectorAll('.alternativa').forEach(alt => {
            alt.style.borderColor = '#f1f5f9';
            alt.style.backgroundColor = 'white';
        });
        elemento.style.borderColor = '#3b82f6';
        elemento.style.backgroundColor = '#f0f7ff';
        opcaoSelecionada = index;
    }

    function verificarAcao() {
        if (opcaoSelecionada === null) return alert("Selecione uma alternativa.");
        if (!respondida) confirmarResposta();
        else proximaQuestao();
    }

    function confirmarResposta() {
        respondida = true;
        const q = questoesFiltradas[indiceAtual];
        const alternativas = document.querySelectorAll('.alternativa');
        const feedbackStatus = document.getElementById('feedback-status');
        
        let stats = JSON.parse(localStorage.getItem('medquest_stats')) || { total: 0, acertos: 0, erros: 0 };
        stats.total += 1;

        alternativas[q.correta].classList.add('correta');

        if (opcaoSelecionada === q.correta) {
            feedbackStatus.innerHTML = "✅ RESPOSTA CORRETA!";
            feedbackStatus.className = "p-4 rounded-xl text-sm font-bold mb-4 bg-emerald-50 text-emerald-600";
            stats.acertos += 1;
        } else {
            alternativas[opcaoSelecionada].classList.add('errada');
            feedbackStatus.innerHTML = "❌ RESPOSTA INCORRETA";
            feedbackStatus.className = "p-4 rounded-xl text-sm font-bold mb-4 bg-red-50 text-red-600";
            stats.erros += 1;
        }

        localStorage.setItem('medquest_stats', JSON.stringify(stats));
        // CORREÇÃO: Evita erro se o comentário for nulo
        document.getElementById('comentario-texto').innerText = q.comentario || "Nenhum comentário disponível para esta questão.";
        document.getElementById('feedback-container').classList.remove('hidden');
        document.getElementById('btn-acao').innerText = "Próxima Questão";
    }

    function proximaQuestao() {
        if (indiceAtual < questoesFiltradas.length - 1) {
            indiceAtual++;
            renderizarQuestao();
        } else {
            alert("Você concluiu as questões disponíveis!");
        }
    }

    function questaoAnterior() {
        if (indiceAtual > 0) {
            indiceAtual--;
            renderizarQuestao();
        }
    }

    window.onload = inicializar;
</script>
