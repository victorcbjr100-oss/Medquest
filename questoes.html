<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-4xl mx-auto hidden" id="conteudo">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-slate-800">Questões</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-2xl hover:bg-red-700 font-semibold shadow">Sair</button>
        </div>

        <div id="lista-questoes" class="grid gap-4">
            <!-- Questões serão carregadas aqui -->
        </div>
    </div>

    <script>
        // Logout
        async function logout() {
            await window.supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // Função para renderizar uma questão
        function renderQuestao(questao) {
            const div = document.createElement('div');
            div.className = 'p-4 bg-white rounded-2xl shadow';
            div.innerHTML = `
                <h2 class="font-semibold text-slate-800 mb-2">Q${questao.id}: ${questao.pergunta}</h2>
                <ul class="list-disc list-inside text-slate-600">
                    ${questao.opcoes.map(op => `<li>${op}</li>`).join('')}
                </ul>
            `;
            return div;
        }

        window.onload = async () => {
            // Renderiza ícones Lucide
            lucide.createIcons();

            // Verifica sessão
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('conteudo').classList.remove('hidden');

            // Busca questões no Supabase
            const { data: questoes, error } = await window.supabaseClient
                .from('questoes')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                alert('Erro ao carregar questões: ' + error.message);
                return;
            }

            const lista = document.getElementById('lista-questoes');
            questoes.forEach(q => {
                // Supomos que 'opcoes' é um array de strings no Supabase
                lista.appendChild(renderQuestao(q));
            });
        }
    </script>

</body>
</html>
