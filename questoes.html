<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-4xl mx-auto hidden" id="conteudo">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-slate-800">Questões</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-2xl hover:bg-red-700 font-semibold shadow">Sair</button>
        </div>

        <div id="lista-questoes" class="grid gap-6"></div>

        <div class="mt-6 hidden" id="resultado">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Pontuação</h2>
            <p id="pontuacao" class="text-slate-700 text-lg"></p>
            <button onclick="location.reload()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-2xl hover:bg-blue-700 shadow">Refazer</button>
        </div>
    </div>

    <script>
        async function logout() {
            await window.supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        function renderQuestao(questao, index) {
            const div = document.createElement('div');
            div.className = 'p-4 bg-white rounded-2xl shadow';
            
            const opcoesHTML = questao.opcoes.map((op, i) => `
                <label class="flex items-center gap-3 mb-2 cursor-pointer">
                    <input type="radio" name="q${index}" value="${i}" class="accent-blue-600">
                    <span>${op}</span>
                </label>
            `).join('');

            div.innerHTML = `
                <h2 class="font-semibold text-slate-800 mb-2">Q${index+1}: ${questao.pergunta}</h2>
                <div class="opcoes">${opcoesHTML}</div>
            `;
            return div;
        }

        async function calcularPontuacao(questoes) {
            let pontos = 0;
            questoes.forEach((q, i) => {
                const selecionado = document.querySelector(`input[name="q${i}"]:checked`);
                if (selecionado && parseInt(selecionado.value) === q.resposta) {
                    pontos++;
                }
            });
            return pontos;
        }

        window.onload = async () => {
            lucide.createIcons();

            // Verifica sessão
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const conteudo = document.getElementById('conteudo');
            conteudo.classList.remove('hidden');

            // Busca questões no Supabase
            const { data: questoes, error } = await window.supabaseClient
                .from('questoes')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                alert('Erro ao carregar questões: ' + error.message);
                return;
            }

            const lista = document.getElementById('lista-questoes');
            questoes.forEach((q, i) => {
                // Supomos que 'opcoes' é array de strings e 'resposta' é índice correto
                lista.appendChild(renderQuestao(q, i));
            });

            // Adiciona botão de finalizar
            const btnFinalizar = document.createElement('button');
            btnFinalizar.className = 'mt-6 bg-green-600 text-white px-4 py-2 rounded-2xl hover:bg-green-700 font-semibold shadow';
            btnFinalizar.innerText = 'Finalizar';
            btnFinalizar.onclick = async () => {
                const pontos = await calcularPontuacao(questoes);
                lista.classList.add('hidden');
                btnFinalizar.classList.add('hidden');
                document.getElementById('resultado').classList.remove('hidden');
                document.getElementById('pontuacao').innerText = `Você acertou ${pontos} de ${questoes.length} questões.`;
            };
            lista.after(btnFinalizar);
        }
    </script>

</body>
</html>
