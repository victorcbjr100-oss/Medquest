<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questões - MedQuest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="sidebar.js"></script>

<style>
body { margin-left: 16rem; }
@media (max-width: 768px) { body { margin-left: 0; } }

.alt { padding: 12px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; margin-bottom: 8px; }
.sel { background: #eff6ff; border-color: #3b82f6; }
.ok { background: #ecfdf5; border-color: #10b981; }
.err { background: #fef2f2; border-color: #ef4444; }
</style>
</head>

<body class="bg-gray-50 p-6">

<div class="max-w-2xl mx-auto">

<!-- QUESTÃO -->
<div class="bg-white p-6 rounded-xl">

<h2 id="tema">Carregando...</h2>
<div id="conteudo"></div>

<div class="flex gap-2 mt-6">
<button id="prev" class="flex-1 bg-gray-200 py-2 rounded">Anterior</button>
<button id="btn" class="flex-1 bg-blue-600 text-white py-2 rounded">Responder</button>
<button id="next" class="flex-1 bg-gray-800 text-white py-2 rounded">Próxima</button>
</div>

</div>

<!-- COMENTÁRIOS -->
<div id="comentarios-box" class="hidden mt-6 bg-white p-6 rounded-xl">

<h3 class="font-bold mb-4">💬 Comentários</h3>

<div id="lista-comentarios" class="space-y-3 mb-4"></div>

<textarea id="novo-comentario"
class="w-full border p-3 rounded mb-2"
placeholder="Escreva um comentário..."></textarea>

<button id="btn-comentar"
class="bg-blue-600 text-white px-4 py-2 rounded">
Postar comentário
</button>

</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

let questoes = [];
let indexAtual = 0;
let questao = null;
let marcada = null;
let respondeu = false;

// =========================
function getAlt(q, l) {
    return q["op_" + l] || q["opcao_" + l] || q["alternativa_" + l] || "Sem alternativa";
}

// =========================
async function carregar() {

    const { data, error } = await supabaseClient.from("questoes").select("*");

    if (error) {
        console.error(error);
        alert("Erro ao carregar questões");
        return;
    }

    questoes = data;

    if (!questoes.length) {
        document.getElementById("conteudo").innerHTML = "Sem questões";
        return;
    }

    mostrarQuestao();
}

// =========================
function mostrarQuestao() {

    respondeu = false;
    marcada = null;

    questao = questoes[indexAtual];

    document.getElementById("tema").textContent = questao.tema;

    let html = `<p class="mb-4">${questao.enunciado}</p>`;

    ["a","b","c","d"].forEach(l => {
        html += `
        <div class="alt" data-letra="${l}">
            <b>${l})</b> ${getAlt(questao, l)}
        </div>`;
    });

    document.getElementById("conteudo").innerHTML = html;

    document.querySelectorAll(".alt").forEach(el => {
        el.onclick = () => selecionar(el);
    });

    document.getElementById("comentarios-box").classList.add("hidden");
    document.getElementById("btn").textContent = "Responder";
}

// =========================
function selecionar(el) {
    if (respondeu) return;

    document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
    el.classList.add("sel");

    marcada = el.dataset.letra;
}

// =========================
document.getElementById("btn").onclick = async () => {

    if (!marcada) {
        alert("Selecione uma alternativa");
        return;
    }

    if (respondeu) {
        indexAtual++;
        mostrarQuestao();
        return;
    }

    respondeu = true;

    const correta = (questao.resposta_correta || "").toLowerCase();

    const mapa = {a:0,b:1,c:2,d:3};
    const itens = document.querySelectorAll(".alt");

    if (itens[mapa[correta]]) {
        itens[mapa[correta]].classList.add("ok");
    }

    if (marcada !== correta && itens[mapa[marcada]]) {
        itens[mapa[marcada]].classList.add("err");
    }

    document.getElementById("btn").textContent = "Próxima";
    document.getElementById("comentarios-box").classList.remove("hidden");

    carregarComentarios();
};

// =========================
document.getElementById("next").onclick = () => {
    if (indexAtual < questoes.length - 1) {
        indexAtual++;
        mostrarQuestao();
    }
};

document.getElementById("prev").onclick = () => {
    if (indexAtual > 0) {
        indexAtual--;
        mostrarQuestao();
    }
};

// =========================
// 🔥 COMENTÁRIOS COMPLETOS
async function carregarComentarios() {

    const { data } = await supabaseClient
        .from("comentarios")
        .select("*")
        .eq("questao_id", questao.id)
        .order("created_at", { ascending: false });

    const lista = document.getElementById("lista-comentarios");
    lista.innerHTML = "";

    data?.forEach(c => {

        const dataFormatada = new Date(c.created_at).toLocaleString();

        lista.innerHTML += `
        <div class="border p-3 rounded">

            <div class="flex justify-between text-xs text-gray-500 mb-1">
                <span><b>${c.usuario_nome || "Usuário"}</b></span>
                <span>${dataFormatada}</span>
            </div>

            <div class="text-sm mb-2">${c.texto}</div>

            <button onclick="responderComentario('${c.id}')"
            class="text-blue-600 text-xs">
                Responder
            </button>

        </div>`;
    });
}

// =========================
// 🔥 POSTAR COMENTÁRIO (CORRIGIDO)
document.getElementById("btn-comentar").onclick = async () => {

    const texto = document.getElementById("novo-comentario").value;

    if (!texto) {
        alert("Digite algo");
        return;
    }

    let nome = "Usuário";

    try {
        if (typeof getUser === "function") {
            const user = await getUser();
            if (user?.email) nome = user.email.split("@")[0];
        }
    } catch {}

    const { error } = await supabaseClient.from("comentarios").insert([{
        questao_id: questao.id,
        texto: texto,
        usuario_nome: nome
    }]);

    if (error) {
        alert("Erro ao comentar");
        console.error(error);
        return;
    }

    document.getElementById("novo-comentario").value = "";

    carregarComentarios();
};

// =========================
window.responderComentario = function(id) {
    alert("Sistema de resposta em thread vem no próximo upgrade 😄");
};

// =========================
carregar();

});
</script>

</body>
</html>
