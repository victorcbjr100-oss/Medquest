<script>
    // 1. Configurações de Acesso
    const SUPABASE_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Variáveis de Controle
    var questoesFiltradas = [];
    var indiceAtual = 0;
    var respondida = false;
    var opcaoSelecionada = null;

    // 3. Captura do Tema da URL
    var urlParams = new URLSearchParams(window.location.search);
    var temaURL = urlParams.get('tema');

    async function inicializar() {
        try {
            // Busca simplificada para evitar erros de conexão (Tela Branca)
            var resultado = await _supabase.from('questoes').select('*');
            
            if (resultado.error) throw resultado.error;

            var todosOsDados = resultado.data;

            // Filtro manual para garantir precisão
            if (temaURL) {
                questoesFiltradas = todosOsDados.filter(function(q) {
                    var t = (q.tema || "").toLowerCase();
                    var s = (q.subtema || "").toLowerCase();
                    var busca = temaURL.toLowerCase();
                    return t === busca || s === busca;
                });
            } else {
                questoesFiltradas = todosOsDados;
            }

            // Se não encontrar nada, mostra o estado vazio
            if (!questoesFiltradas || questoesFiltradas.length === 0) {
                document.getElementById('questao-card').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('titulo-tema').innerText = "Sem questões";
                return;
            }
            
            document.getElementById('titulo-tema').innerText = temaURL || "Geral - ENAMED";
            renderizarQuestao();

        } catch (err) {
            console.error("Erro MedQuest:", err);
            document.getElementById('titulo-tema').innerText = "Erro de Conexão";
        }
    }

    function renderizarQuestao() {
        var q = questoesFiltradas[indiceAtual];
        var container = document.getElementById('conteudo-questao');
        
        respondida = false;
        opcaoSelecionada = null;
        
        document.getElementById('feedback-container').classList.add('hidden');
        document.getElementById('btn-acao').innerText = "Responder";
        document.getElementById('contador-questoes').innerText = "Questão " + (indiceAtual + 1) + " de " + questoesFiltradas.length;

        var html = '';
        html += '<div class="flex justify-between items-center mb-4">';
        html += '<p class="text-xs font-bold text-blue-600 uppercase tracking-widest">' + (q.origem || 'ID #' + q.id) + '</p>';
        html += '<span class="px-3 py-1 bg-blue-50 text-[10px] font-bold text-blue-600 rounded-full">' + (q.subtema || q.tema) + '</span>';
        html += '</div>';
        html += '<h3 class="text-lg font-bold text-gray-800 mb-8 leading-relaxed">' + q.enunciado + '</h3>';
        html += '<div class="space-y-3">';

        var opcoes = [q.opcao_a, q.opcao_b, q.opcao_c, q.opcao_d];
        opcoes.forEach(function(opt, i) {
            if (opt) {
                html += '<div onclick="selecionarOpcao(this, ' + i + ')" class="alternativa p-5 border border-gray-100 rounded-2xl font-medium text-gray-700 flex items-center gap-4 bg-white cursor-pointer">';
                html += '<span class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-xs font-bold text-gray-400">' + String.fromCharCode(65 + i) + '</span>';
                html += '<div class="flex-1">' + opt + '</div>';
                html += '</div>';
            }
        });

        html += '</div>';
        container.innerHTML = html;
    }

    function selecionarOpcao(elemento, index) {
        if (respondida) return;
        var alts = document.querySelectorAll('.alternativa');
        for (var i = 0; i < alts.length; i++) {
            alts[i].style.borderColor = '#f1f5f9';
            alts[i].style.backgroundColor = 'white';
        }
        elemento.style.borderColor = '#3b82f6';
        elemento.style.backgroundColor = '#f0f7ff';
        opcaoSelecionada = index;
    }

    function verificarAcao() {
        if (opcaoSelecionada === null) return alert("Selecione uma alternativa.");
        if (!respondida) confirmarResposta();
        else proximaQuestao();
    }

    function confirmarResposta() {
        respondida = true;
        var q = questoesFiltradas[indiceAtual];
        var alternativas = document.querySelectorAll('.alternativa');
        var feedbackStatus = document.getElementById('feedback-status');
        
        // Atualiza estatísticas locais (Dashboard)
        var stats = JSON.parse(localStorage.getItem('medquest_stats')) || { total: 0, acertos: 0, erros: 0 };
        stats.total += 1;

        alternativas[q.correta].classList.add('correta');

        if (opcaoSelecionada === q.correta) {
            feedbackStatus.innerHTML = "✅ RESPOSTA CORRETA!";
            feedbackStatus.className = "p-4 rounded-xl text-sm font-bold mb-4 bg-emerald-50 text-emerald-600";
            stats.acertos += 1;
        } else {
            alternativas[opcaoSelecionada].classList.add('errada');
            feedbackStatus.innerHTML = "❌ RESPOSTA INCORRETA";
            feedbackStatus.className = "p-4 rounded-xl text-sm font-bold mb-4 bg-red-50 text-red-600";
            stats.erros += 1;
        }

        localStorage.setItem('medquest_stats', JSON.stringify(stats));
        document.getElementById('comentario-texto').innerText = q.comentario || "Nenhum comentário disponível.";
        document.getElementById('feedback-container').classList.remove('hidden');
        document.getElementById('btn-acao').innerText = "Próxima Questão";
    }

    function proximaQuestao() {
        if (indiceAtual < questoesFiltradas.length - 1) {
            indiceAtual++;
            renderizarQuestao();
        } else {
            alert("Fim das questões deste tema!");
        }
    }

    function questaoAnterior() {
        if (indiceAtual > 0) {
            indiceAtual--;
            renderizarQuestao();
        }
    }

    window.onload = inicializar;
</script>
