<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - MedQuest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .selecionada .letra { background-color: #3b82f6 !important; color: white !important; }
        .correta { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .correta .letra { background-color: #22c55e !important; color: white !important; }
        .errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .errada .letra { background-color: #ef4444 !important; color: white !important; }
        .travado { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20">

    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="temas.html" class="text-gray-400 hover:text-blue-600 flex items-center gap-2 text-sm font-medium transition">
                <i class="fas fa-times"></i> Sair
            </a>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Questão 1 de 5</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-6">
            <div class="mb-6">
                <span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded uppercase">Cardiologia</span>
            </div>

            <p class="text-gray-800 text-lg leading-relaxed mb-10 font-medium">
                Paciente com dor precordial e infra de ST em V5 e V6. Qual a conduta inicial?
            </p>

            <div class="space-y-3" id="campoAlternativas">
                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500 group-hover:text-blue-600 transition-colors">A</span>
                    <span class="text-sm text-gray-600">Realizar angioplastia primária em menos de 90 min.</span>
                </button>

                <button onclick="marcar(this)" data-certa="true" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500 group-hover:text-blue-600 transition-colors">B</span>
                    <span class="text-sm text-gray-600">Administrar dupla antiagregação plaquetária e estatina.</span>
                </button>

                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500 group-hover:text-blue-600 transition-colors">C</span>
                    <span class="text-sm text-gray-600">Indicar trombólise química com Tenecteplase.</span>
                </button>

                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500 group-hover:text-blue-600 transition-colors">D</span>
                    <span class="text-sm text-gray-600">Solicitar enzimas cardíacas e aguardar resultado.</span>
                </button>

                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500 group-hover:text-blue-600 transition-colors">E</span>
                    <span class="text-sm text-gray-600">Realizar teste ergométrico de urgência.</span>
                </button>
            </div>

            <div class="mt-10 flex justify-end items-center gap-4">
                <span id="aviso" class="text-xs text-red-500 font-medium opacity-0 italic transition-opacity">Selecione uma opção</span>
                <button id="confirmar" onclick="verificar()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 hover:scale-105 transition-all">
                    Confirmar Resposta
                </button>
                <button id="proxima" onclick="window.location.reload()" class="hidden bg-gray-800 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg transition-all">
                    Próxima Questão <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <div id="comentarios" class="hidden">
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
                <div class="flex items-center gap-2 mb-4">
                    <i class="far fa-comment-dots text-blue-600"></i>
                    <h3 class="font-bold text-gray-800 text-sm">Minhas Anotações na Nuvem</h3>
                </div>
                <textarea id="textoComentario" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm mb-4 h-24 focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="Digite sua anotação aqui..."></textarea>
                <div class="flex items-center justify-between">
                    <button onclick="salvarNoSupabase()" class="bg-blue-600 text-white text-[10px] font-bold px-6 py-2 rounded-lg uppercase shadow-md shadow-blue-100 transition-all hover:bg-blue-700">Salvar no Banco</button>
                    <span id="status" class="hidden text-green-500 text-[10px] font-bold uppercase tracking-widest italic animate-pulse text-right">Sincronizado!</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO DO SUPABASE - COLOQUE SEUS DADOS AQUI
        const SUPABASE_URL = 'SUA_URL_AQUI'; 
        const SUPABASE_KEY = 'SUA_KEY_AQUI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const questaoID = "q1_cardiologia";
        let elementoSelecionado = null;

        window.onload = async () => {
            const { data, error } = await supabaseClient
                .from('comentarios_questoes')
                .select('texto')
                .eq('questao_id', questaoID)
                .maybeSingle();
            
            if (data) document.getElementById('textoComentario').value = data.texto;
        };

        function marcar(el) {
            document.querySelectorAll('.botao-opcao').forEach(btn => btn.classList.remove('selecionada'));
            el.classList.add('selecionada');
            elementoSelecionado = el;
            document.getElementById('aviso').style.opacity = '0';
        }

        function verificar() {
            if (!elementoSelecionado) {
                document.getElementById('aviso').style.opacity = '1';
                return;
            }

            const certa = elementoSelecionado.getAttribute('data-certa') === 'true';

            document.querySelectorAll('.botao-opcao').forEach(btn => {
                btn.classList.add('travado');
                if (btn.getAttribute('data-certa') === 'true') btn.classList.add('correta');
            });

            if (!certa) {
                elementoSelecionado.classList.remove('selecionada');
                elementoSelecionado.classList.add('errada');
            }

            document.getElementById('confirmar').classList.add('hidden');
            document.getElementById('proxima').classList.remove('hidden');
            document.getElementById('comentarios').classList.remove('hidden');
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function salvarNoSupabase() {
            const texto = document.getElementById('textoComentario').value;
            const status = document.getElementById('status');

            const { error } = await supabaseClient
                .from('comentarios_questoes')
                .upsert({ questao_id: questaoID, texto: texto }, { onConflict: 'questao_id' });

            if (!error) {
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 2000);
            } else {
                alert("Erro ao salvar! Verifique se as policies no Supabase foram criadas.");
            }
        }
    </script>
</body>
</html>
