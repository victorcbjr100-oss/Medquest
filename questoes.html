<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Supabase - MedQuest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .correta { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .travado { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20">

    <main class="max-w-3xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-6">
             <span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded uppercase mb-4 inline-block">Cardiologia</span>
             <p class="text-gray-800 text-lg font-medium mb-8">Paciente com dor precordial e infra de ST em V5 e V6. Qual a conduta?</p>
             
             <div class="space-y-3" id="opcoes">
                 <button onclick="marcar(this)" data-certa="true" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 flex items-center gap-4">
                     <span class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center font-bold">A</span>
                     <span>Dupla antiagregação e estatina.</span>
                 </button>
                 </div>

             <div class="mt-8 flex justify-end">
                 <button id="confirmar" onclick="verificar()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Confirmar</button>
             </div>
        </div>

        <div id="comentarios" class="hidden bg-white rounded-3xl border border-gray-100 p-8 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-4">Minhas Anotações na Nuvem</h3>
            <textarea id="textoComentario" class="w-full p-4 bg-gray-50 border rounded-2xl h-24 mb-4" placeholder="Sua anotação..."></textarea>
            <button onclick="salvarNoSupabase()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase">Salvar no Banco</button>
            <span id="status" class="hidden ml-4 text-green-500 text-xs font-bold">Sincronizado!</span>
        </div>
    </main>

    <script>
        // 1. CONFIGURAÇÃO DO SUPABASE (Substitua pelos seus dados)
        const SUPABASE_URL = 'SUA_URL_AQUI';
        const SUPABASE_KEY = 'SUA_KEY_AQUI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const questaoID = "quest_cardio_001";
        let selecionada = null;

        // 2. BUSCAR COMENTÁRIO DO BANCO AO CARREGAR
        window.onload = async () => {
            const { data, error } = await supabase
                .from('comentarios_questoes')
                .select('texto')
                .eq('questao_id', questaoID)
                .single();
            
            if (data) document.getElementById('textoComentario').value = data.texto;
        };

        function marcar(el) {
            document.querySelectorAll('.botao-opcao').forEach(b => b.classList.remove('selecionada'));
            el.classList.add('selecionada');
            selecionada = el;
        }

        function verificar() {
            if(!selecionada) return alert("Selecione!");
            document.querySelectorAll('.botao-opcao').forEach(b => b.classList.add('travado'));
            document.getElementById('comentarios').classList.remove('hidden');
        }

        // 3. SALVAR OU ATUALIZAR NO SUPABASE
        async function salvarNoSupabase() {
            const texto = document.getElementById('textoComentario').value;
            const status = document.getElementById('status');

            const { error } = await supabase
                .from('comentarios_questoes')
                .upsert({ questao_id: questaoID, texto: texto }, { onConflict: 'questao_id' });

            if (!error) {
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 2000);
            } else {
                console.error(error);
                alert("Erro ao salvar!");
            }
        }
    </script>
</body>
</html>
