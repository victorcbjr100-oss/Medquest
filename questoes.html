<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        body { display: flex; margin: 0; background: #f1f5f9; min-height: 100vh; }
        main { flex: 1; margin-left: 260px; padding: 2rem; }
        @media (max-width: 768px) { main { margin-left: 0; } }
        .questao-card { background: white; padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; }
        .alternativa { padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .alternativa:hover { border-color: #3b82f6; background: #eff6ff; }
        .selecionada { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body>
    <main>
        <div id="display-tema" class="mb-4 text-blue-600 font-black uppercase text-xs tracking-widest"></div>
        <div class="questao-card">
            <div id="conteudo-questao">Carregando questões de Hipertensão...</div>
            <div id="area-botoes" class="hidden mt-8">
                <button onclick="proxima()" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition">Pular</button>
            </div>
        </div>
    </main>

    <script>
        let questoes = [];
        let index = 0;

        async function buscarQuestoes() {
            const urlParams = new URLSearchParams(window.location.search);
            let tema = urlParams.get('tema') || 'Hipertensão';
            
            // Converte HAS vindo da URL para Hipertensão se necessário
            if (tema.toUpperCase() === 'HAS') tema = 'Hipertensão';
            
            document.getElementById('display-tema').innerText = tema;

            let query = window.supabaseClient.from('questoes').select('*');
            
            if (tema !== 'Todos') {
                query = query.ilike('specialty', `%${tema}%`);
            }

            const { data, error } = await query;
            
            if (error || !data || data.length === 0) {
                document.getElementById('conteudo-questao').innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-gray-500">Nenhuma questão de <b>${tema}</b> disponível no momento.</p>
                        <a href="index.html" class="text-blue-600 font-bold mt-4 block">Voltar ao Início</a>
                    </div>`;
                return;
            }

            questoes = data;
            document.getElementById('area-botoes').classList.remove('hidden');
            mostrar();
        }

        function mostrar() {
            const q = questoes[index];
            let html = `<h2 class="text-xl font-bold text-gray-800 mb-6">${q.title}</h2>`;
            
            ['a', 'b', 'c', 'd'].forEach(l => {
                if (q[`option_${l}`]) {
                    html += `<div class="alternativa" onclick="this.classList.toggle('selecionada')">
                                <b>${l.toUpperCase()})</b> ${q[`option_${l}`]}
                             </div>`;
                }
            });
            document.getElementById('conteudo-questao').innerHTML = html;
        }

        function proxima() {
            if (index < questoes.length - 1) {
                index++;
                mostrar();
            } else {
                alert("Você concluiu as questões deste tema!");
                window.location.href = "index.html";
            }
        }

        // Aguarda inicialização do cliente Supabase
        const monitor = setInterval(() => {
            if (window.supabaseClient) {
                clearInterval(monitor);
                buscarQuestoes();
            }
        }, 100);
    </script>
</body>
</html>
