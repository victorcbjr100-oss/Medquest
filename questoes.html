<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { display: flex; margin: 0; background: #f8fafc; min-height: 100vh; font-family: 'Inter', sans-serif; }
        main { flex: 1; margin-left: 260px; padding: 2rem; transition: 0.3s; }
        @media (max-width: 768px) { main { margin-left: 0; padding: 1rem; } }

        .questao-card { background: white; padding: 40px; border-radius: 32px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .alternativa { 
            padding: 18px; border: 2px solid #f1f5f9; border-radius: 16px; margin-bottom: 12px; 
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px;
        }
        .alternativa:hover { border-color: #3b82f6; background: #eff6ff; }
        .selecionada { border-color: #3b82f6; background: #eff6ff; font-weight: 600; }
        .correta { border-color: #10b981 !important; background: #ecfdf5 !important; color: #065f46 !important; }
        .errada { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }
    </style>
</head>
<body>

    <main>
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <a href="index.html" class="text-gray-400 hover:text-gray-600 flex items-center gap-2 text-xs font-bold tracking-widest">
                    <i data-lucide="chevron-left"></i> VOLTAR
                </a>
                <div id="display-tema" class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full font-black uppercase text-[10px]">
                    Sincronizando...
                </div>
            </div>

            <div class="questao-card">
                <div id="conteudo-questao">
                    <div class="flex flex-col items-center justify-center py-20">
                        <div class="animate-spin text-blue-500 mb-4"><i data-lucide="loader-2"></i></div>
                        <p class="text-gray-400 font-medium">Buscando questões no banco...</p>
                    </div>
                </div>

                <div id="area-botoes" class="hidden mt-10 pt-6 border-t border-gray-100 flex justify-between items-center">
                    <span class="text-[10px] text-gray-400 font-bold uppercase">Questão <span id="num-atual">1</span></span>
                    <div class="flex gap-3">
                        <button id="btn-conferir" onclick="conferirResposta()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">Responder</button>
                        <button id="btn-proxima" onclick="proxima()" class="hidden bg-gray-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition">Próxima</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let questoes = [];
        let index = 0;
        let respondida = false;

        async function buscarQuestoes() {
            const urlParams = new URLSearchParams(window.location.search);
            let tema = urlParams.get('tema') || 'Hipertensão';
            
            // Padronização automática: se a URL tiver HAS, busca Hipertensão no Banco
            if (tema.toUpperCase() === 'HAS') tema = 'Hipertensão';
            document.getElementById('display-tema').innerText = tema;

            try {
                // O ilike garante que encontre mesmo com diferenças de maiúscula/minúscula
                const { data, error } = await window.supabaseClient
                    .from('questoes')
                    .select('*')
                    .ilike('specialty', `%${tema}%`);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('conteudo-questao').innerHTML = `
                        <div class="text-center py-10">
                            <h3 class="text-xl font-bold text-gray-800">Nenhuma questão de ${tema}</h3>
                            <p class="text-gray-500 mt-2">Tente outro tema ou cadastre novas questões.</p>
                            <a href="temas.html" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-xl mt-6">Voltar</a>
                        </div>`;
                    return;
                }

                questoes = data;
                document.getElementById('area-botoes').classList.remove('hidden');
                mostrar();
            } catch (err) {
                document.getElementById('conteudo-questao').innerHTML = `<p class="text-red-500">Erro de conexão: ${err.message}</p>`;
            }
        }

        function mostrar() {
            respondida = false;
            const q = questoes[index];
            document.getElementById('num-atual').innerText = index + 1;
            document.getElementById('btn-conferir').classList.remove('hidden');
            document.getElementById('btn-proxima').classList.add('hidden');

            let html = `<h2 class="text-2xl font-bold text-gray-800 mb-8 leading-snug">${q.title}</h2><div class="space-y-3">`;
            
            ['a', 'b', 'c', 'd', 'e'].forEach(l => {
                if (q[`option_${l}`]) {
                    html += `
                        <div class="alternativa" id="opt-${l}" onclick="selecionar('${l}')">
                            <span class="w-8 h-8 flex items-center justify-center rounded-lg bg-gray-100 text-[10px] font-black">${l.toUpperCase()}</span>
                            <span class="text-sm">${q[`option_${l}`]}</span>
                        </div>`;
                }
            });

            document.getElementById('conteudo-questao').innerHTML = html + `</div>`;
            lucide.createIcons();
        }

        function selecionar(letra) {
            if (respondida) return;
            document.querySelectorAll('.alternativa').forEach(el => el.classList.remove('selecionada'));
            document.getElementById(`opt-${letra}`).classList.add('selecionada');
        }

        function conferirResposta() {
            const sel = document.querySelector('.alternativa.selecionada');
            if (!sel) return;

            respondida = true;
            const correta = questoes[index].correct_answer.toLowerCase();
            const escolhida = sel.id.split('-');

            document.getElementById(`opt-${correta}`).classList.add('correta');
            if (escolhida !== correta) document.getElementById(`opt-${escolhida}`).classList.add('errada');

            if (questoes[index].explanation) {
                const exp = document.createElement('div');
                exp.className = "mt-6 p-4 bg-blue-50 text-blue-800 text-xs rounded-2xl border border-blue-100";
                exp.innerHTML = `<strong>Explicação:</strong> ${questoes[index].explanation}`;
                document.getElementById('conteudo-questao').appendChild(exp);
            }

            document.getElementById('btn-conferir').classList.add('hidden');
            document.getElementById('btn-proxima').classList.remove('hidden');
        }

        function proxima() {
            if (index < questoes.length - 1) {
                index++;
                mostrar();
            } else {
                alert("Fim do bloco de questões!");
                window.location.href = "index.html";
            }
        }

        // Função de inicialização segura
        async function iniciar() {
            const ok = await inicializarSupabase();
            if (ok && window.supabaseClient) {
                buscarQuestoes();
            } else {
                setTimeout(iniciar, 300); // Tenta novamente se a biblioteca ainda não carregou
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
