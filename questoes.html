<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="sidebar.js"></script>
    <style>
        body { margin-left: 16rem; }
        @media (max-width: 768px) { body { margin-left: 0; } }
        .alt { padding: 14px; border-radius: 12px; border:1px solid #e5e7eb; cursor:pointer; transition: all 0.2s; }
        .alt:hover:not(.ok):not(.err) { border-color: #3b82f6; background: #f8fafc; }
        .sel { background:#eff6ff; border-color:#3b82f6; ring: 2px solid #3b82f6; }
        .ok { background:#ecfdf5; border-color:#10b981; color: #065f46; font-weight: 500; }
        .err { background:#fef2f2; border-color:#ef4444; color: #991b1b; }
    </style>
</head>

<body class="bg-gray-50 p-6">

    <div class="max-w-3xl mx-auto space-y-6">

        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 id="tema" class="text-lg font-bold mb-4 text-blue-600">Carregando...</h2>
            <div id="conteudo" class="text-gray-800 leading-relaxed"></div>

            <div class="flex gap-2 mt-6">
                <button id="prev" class="flex-1 bg-gray-200 py-2 rounded font-medium">Anterior</button>
                <button id="btn" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold shadow-lg">Responder</button>
                <button id="next" class="flex-1 bg-gray-800 text-white py-2 rounded font-medium">Próxima</button>
            </div>
        </div>

        <div id="comentarios-box" class="hidden bg-white p-6 rounded-2xl shadow">
            <h3 class="font-bold mb-4 text-lg border-b pb-2">💬 Discussão Clínica</h3>
            <div id="lista-comentarios" class="space-y-4 max-h-96 overflow-y-auto pr-2"></div>
            <textarea id="novo-comentario" class="w-full border p-3 rounded-xl mt-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Escreva um comentário clínico..."></textarea>
            <button id="btn-comentar" class="bg-blue-600 text-white px-6 py-2 rounded-lg mt-2 font-bold ml-auto block">Postar</button>
        </div>

    </div>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", () => {

        let questoes = [];
        let indexAtual = 0;
        let questao = null;
        let marcada = null;
        let respondeu = false;

        function getAlt(q, l) {
            return q["op_" + l] || q["opcao_" + l] || q["alternativa_" + l];
        }

        async function carregar() {
            const { data, error } = await supabaseClient.from("questoes").select("*");
            if (error) return console.error("Erro ao carregar questões:", error);
            questoes = data;
            mostrarQuestao();
        }

        function mostrarQuestao() {
            if (!questoes[indexAtual]) return;
            
            questao = questoes[indexAtual];
            marcada = null; 
            respondeu = false;

            document.getElementById("btn").innerText = "Responder";
            document.getElementById("tema").innerText = questao.tema;
            document.getElementById("comentarios-box").classList.add("hidden");

            let html = `<p class="mb-6 text-lg font-medium">${questao.enunciado}</p><div class="space-y-3">`;

            ["a", "b", "c", "d"].forEach(l => {
                html += `<div class="alt" data-l="${l}">
                    <span class="uppercase font-bold mr-2">${l})</span> ${getAlt(questao, l)}
                </div>`;
            });
            html += `</div>`;

            document.getElementById("conteudo").innerHTML = html;

            document.querySelectorAll(".alt").forEach(el => {
                el.onclick = () => {
                    if (respondeu) return;
                    document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
                    el.classList.add("sel");
                    marcada = el.dataset.l;
                };
            });
        }

        // LÓGICA DO BOTÃO RESPONDER
        document.getElementById("btn").onclick = async () => {
            if (!marcada) return alert("Por favor, selecione uma alternativa.");

            // Se já respondeu, o botão serve para ir para a próxima
            if (respondeu) {
                indexAtual++;
                if (indexAtual < questoes.length) {
                    mostrarQuestao();
                } else {
                    alert("Você chegou ao fim das questões!");
                }
                return;
            }

            respondeu = true;
            const correta = questao.resposta_correta;
            const acertou = (marcada === correta);

            // --- A MÁGICA: REGISTRAR REVISÃO NO BANCO ---
            if (typeof registrarRevisao === "function") {
                await registrarRevisao(questao.id, acertou);
            }

            // Feedback visual
            const mapa = { a: 0, b: 1, c: 2, d: 3 };
            const itens = document.querySelectorAll(".alt");

            itens[mapa[correta]]?.classList.add("ok");
            if (!acertou) {
                itens[mapa[marcada]]?.classList.add("err");
            }

            document.getElementById("btn").innerText = "Próxima Questão";
            document.getElementById("comentarios-box").classList.remove("hidden");
            carregarComentarios();
        };

        // Navegação simples
        document.getElementById("next").onclick = () => {
            if (indexAtual < questoes.length - 1) {
                indexAtual++;
                mostrarQuestao();
            }
        };

        document.getElementById("prev").onclick = () => {
            if (indexAtual > 0) {
                indexAtual--;
                mostrarQuestao();
            }
        };

        // =================== COMENTÁRIOS ===================

        async function carregarComentarios() {
            const { data } = await supabaseClient
                .from("comentarios")
                .select("*")
                .eq("questao_id", questao.id)
                .order("created_at", { ascending: false });

            const lista = document.getElementById("lista-comentarios");
            lista.innerHTML = data.length ? "" : "<p class='text-gray-400 text-sm italic'>Nenhum comentário ainda. Seja o primeiro a comentar!</p>";

            data.forEach(c => {
                if (!c.parent_id) {
                    lista.innerHTML += renderComentario(c, data);
                }
            });
        }

        function renderComentario(c, all) {
            const respostas = all.filter(x => x.parent_id === c.id);
            return `
                <div class="border p-3 rounded-lg bg-gray-50">
                    <div class="flex justify-between text-xs text-gray-500 mb-2">
                        <b class="text-blue-600">${c.usuario_nome}</b>
                        <span>${new Date(c.created_at).toLocaleString()}</span>
                    </div>
                    <div class="mt-1 text-sm text-gray-700">${c.texto}</div>
                    <div class="flex gap-4 mt-3 text-xs font-bold text-gray-500">
                        <button onclick="like('${c.id}')" class="hover:text-blue-600 transition">👍 ${c.likes || 0}</button>
                        <button onclick="responder('${c.id}')" class="hover:text-blue-600 transition">REPLICAR</button>
                    </div>
                    <div class="ml-4 mt-3 space-y-2 border-l-2 border-blue-100 pl-3">
                        ${respostas.map(r => `
                            <div class="text-sm py-1">
                                <b class="text-xs text-gray-500">${r.usuario_nome}:</b> ${r.texto}
                            </div>
                        `).join("")}
                    </div>
                </div>`;
        }

        // POSTAR COMENTÁRIO
        document.getElementById("btn-comentar").onclick = async () => {
            const texto = document.getElementById("novo-comentario").value;
            if (!texto) return;

            const { data: { user } } = await supabaseClient.auth.getUser();

            await supabaseClient.from("comentarios").insert([{
                questao_id: questao.id,
                texto,
                usuario_nome: user?.email?.split("@") || "Doutor"
            }]);

            document.getElementById("novo-comentario").value = "";
            carregarComentarios();
        };

        // LIKE & RESPONDER (Globais para funcionarem no HTML dinâmico)
        window.like = async (id) => {
            await supabaseClient.rpc("increment_like", { comment_id: id });
            carregarComentarios();
        };

        window.responder = async (parent_id) => {
            const texto = prompt("Sua resposta clínica:");
            if (!texto) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from("comentarios").insert([{
                questao_id: questao.id,
                texto,
                parent_id,
                usuario_nome: user?.email?.split("@") || "Doutor"
            }]);
            carregarComentarios();
        };

        carregar();
    });
    </script>
</body>
</html>
