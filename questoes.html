<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js" defer></script>
    <script src="sidebar.js" defer></script>

    <style>
        /* Seus estilos permanecem iguais */
        body { margin-left: 16rem; transition: margin 0.3s; }
        @media (max-width: 768px) { body { margin-left: 0; } }

        .alt {
            padding: 18px;
            border-radius: 16px;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            background: white;
            font-size: 1.08rem;
        }
        .alt:hover:not(.ok):not(.err) {
            border-color: #2563eb;
            background: #f0f9ff;
            transform: translateX(5px);
        }
        .sel { border-color: #2563eb; background: #eff6ff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .ok { background: #d1fae5 !important; border-color: #10b981 !important; color: #064e3b !important; }
        .err { background: #fee2e2 !important; border-color: #ef4444 !important; color: #7f1d1d !important; }
        
        .letra-circulo {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px;
            font-weight: 700; flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }
        .ok .letra-circulo { background: #10b981; color: white; border-color: #10b981; }
        .err .letra-circulo { background: #ef4444; color: white; border-color: #ef4444; }

        .progress-bar { height: 8px; background: linear-gradient(to right, #2563eb, #10b981); transition: width 0.5s ease; }

        /* Loading melhorado */
        .loading-sincronizando {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 300px; gap: 1.5rem;
        }
        .spinner { 
            width: 50px; height: 50px; border: 4px solid #e5e7eb; 
            border-top: 4px solid #2563eb; border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8 font-sans">

<div class="max-w-3xl mx-auto space-y-6">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <h2 id="tema" class="text-xs font-black uppercase tracking-widest text-blue-600">Carregando...</h2>
                <div id="dificuldade" class="hidden"></div>
            </div>
            <div class="flex items-center gap-5">
                <div id="timer" class="font-mono font-bold text-2xl text-red-500 bg-red-50 px-3 py-1 rounded-xl animate-pulse">60s</div>
                <div class="text-sm font-medium text-gray-400">
                    Questão <span id="progresso" class="text-gray-900">0</span> de <span id="total">0</span>
                </div>
            </div>
        </div>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="progress-bar w-0"></div>
        </div>
    </div>

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-gray-100">
        <div id="conteudo" class="loading-sincronizando">
            <div class="spinner"></div>
            <p class="text-gray-400 text-lg font-medium">🔄 Sincronizando com o banco médico...</p>
            <p class="text-sm text-gray-300">Aguarde alguns segundos</p>
        </div>
        
        <div class="flex flex-wrap gap-3 hidden" id="botoes-container">
            <button id="prev" class="px-6 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-2xl font-semibold transition flex items-center gap-2" disabled>
                <i data-lucide="chevron-left" class="w-5 h-5"></i> Anterior
            </button>
            <button id="btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-100 transition active:scale-95" disabled>Responder</button>
            <button id="next" class="px-6 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-2xl font-semibold transition flex items-center gap-2" disabled>
                Pular <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div id="explicacao-box" class="hidden bg-emerald-50 border border-emerald-100 p-8 rounded-3xl">
        <h3 class="font-bold text-lg text-emerald-800 mb-4 flex items-center gap-2">
            <i data-lucide="check-circle" class="w-5 h-5"></i> Comentário do Especialista
        </h3>
        <div id="explicacao-texto" class="text-emerald-900 leading-relaxed"></div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    let questoes = [];
    let indexAtual = 0;
    let questao = null;
    let marcada = null;
    let respondeu = false;
    let timerInterval = null;
    let tempoRestante = 60;

    const atualizarIcones = () => { if (window.lucide) lucide.createIcons(); };
    atualizarIcones();

    // 🔧 MELHOR TRATAMENTO DE ERRO - Timeout de 10s
    const maxTentativas = 70; // 10 segundos (70 * 150ms)
    let tentativas = 0;

    const aguardarBanco = setInterval(() => {
        tentativas++;
        
        if (window.supabaseClient) {
            clearInterval(aguardarBanco);
            console.log('✅ Supabase pronto!');
            carregarDados();
        } else if (tentativas >= maxTentativas) {
            clearInterval(aguardarBanco);
            mostrarErroConexao();
        }
    }, 150);

    function mostrarErroConexao() {
        const conteudo = document.getElementById("conteudo");
        conteudo.innerHTML = `
            <div class="text-center py-12">
                <div class="w-20 h-20 mx-auto mb-6 bg-red-100 rounded-3xl flex items-center justify-center">
                    <i data-lucide="database-off" class="w-10 h-10 text-red-500"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-900 mb-2">Erro de Conexão</h3>
                <p class="text-gray-500 mb-8 max-w-md mx-auto">
                    Não foi possível sincronizar com o banco médico. 
                    Verifique sua conexão ou tente novamente.
                </p>
                <div class="space-y-3">
                    <button onclick="location.reload()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-8 rounded-2xl font-bold shadow-lg transition">
                        🔄 Tentar Novamente
                    </button>
                    <a href="index.html" 
                       class="block w-full text-center text-blue-600 hover:text-blue-800 font-semibold py-3 px-8 rounded-2xl border border-blue-200 hover:bg-blue-50 transition">
                        ← Voltar ao Início
                    </a>
                </div>
            </div>`;
        atualizarIcones();
    }

    async function carregarDados() {
        try {
            // Mostra status de carregamento
            document.getElementById("conteudo").innerHTML = `
                <div class="loading-sincronizando">
                    <div class="spinner"></div>
                    <p class="text-gray-400 text-lg font-medium">📚 Carregando questões médicas...</p>
                </div>`;

            const urlParams = new URLSearchParams(window.location.search);
            const temaFiltro = urlParams.get('tema');

            let query = window.supabaseClient
                .from("questoes")
                .select("*")
                .eq('active', true) // Só questões ativas
                .order("id", { ascending: true });

            if (temaFiltro && temaFiltro !== "Todos") {
                query = query.ilike('specialty', `%${temaFiltro.trim()}%`);
            }

            const { data, error } = await query;
            
            if (error) {
                console.error("❌ Erro Supabase:", error);
                throw new Error(`Erro no banco: ${error.message}`);
            }

            questoes = data?.filter(q => 
                q.title && 
                q.title.trim() !== "" && 
                q.correct_answer
            ) || [];

            console.log(`✅ ${questoes.length} questões carregadas`);

            if (questoes.length > 0) {
                document.getElementById("total").textContent = questoes.length;
                document.getElementById("botoes-container").classList.remove("hidden");
                mostrarQuestao();
            } else {
                renderizarErro(temaFiltro);
            }
        } catch (e) {
            console.error("❌ Erro ao carregar dados:", e);
            mostrarErroConexao();
        }
    }

    // Resto do código permanece igual...
    function renderizarErro(tema) {
        document.getElementById("tema").innerText = "Aviso";
        document.getElementById("conteudo").innerHTML = `
            <div class="text-center py-12">
                <div class="w-20 h-20 mx-auto mb-6 bg-yellow-100 rounded-3xl flex items-center justify-center">
                    <i data-lucide="search" class="w-10 h-10 text-yellow-500"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-900 mb-2">Nenhuma Questão Encontrada</h3>
                <p class="text-gray-500 mb-8">Para: <strong>${tema || 'Geral'}</strong></p>
                <a href="index.html" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition">Voltar ao Início</a>
            </div>`;
        atualizarIcones();
    }

    // [Resto das funções mostrarQuestao, verificarResposta, etc. permanecem EXATAMENTE iguais]
    // ... (copie o resto do seu código JavaScript original aqui)
});
</script>
</body>
</html>
