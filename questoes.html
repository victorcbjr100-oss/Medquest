<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <script src="js/supabase.js"></script>
    <script src="sidebar.js" defer></script>

    <style>
        body { margin-left: 16rem; transition: margin 0.3s; }
        @media (max-width: 768px) { body { margin-left: 0; } }

        .alt {
            padding: 18px;
            border-radius: 16px;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            background: white;
            font-size: 1.08rem;
        }
        .alt:hover:not(.ok):not(.err) {
            border-color: #2563eb;
            background: #f0f9ff;
            transform: translateX(5px);
        }
        .sel { border-color: #2563eb; background: #eff6ff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .ok { background: #d1fae5 !important; border-color: #10b981 !important; color: #064e3b !important; }
        .err { background: #fee2e2 !important; border-color: #ef4444 !important; color: #7f1d1d !important; }
        
        .letra-circulo {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px;
            font-weight: 700; flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }
        .ok .letra-circulo { background: #10b981; color: white; border-color: #10b981; }
        .err .letra-circulo { background: #ef4444; color: white; border-color: #ef4444; }

        .progress-bar { height: 8px; background: linear-gradient(to right, #2563eb, #10b981); transition: width 0.5s ease; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8 font-sans">

<div class="max-w-3xl mx-auto space-y-6">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <h2 id="tema" class="text-xs font-black uppercase tracking-widest text-blue-600">Carregando...</h2>
                <div id="dificuldade" class="mt-1"></div>
            </div>
            <div class="flex items-center gap-5">
                <div id="timer" class="font-mono font-bold text-2xl text-red-500 bg-red-50 px-3 py-1 rounded-xl">60s</div>
                <div class="text-sm font-medium text-gray-400">
                    Questão <span id="progresso" class="text-gray-900">0</span> de <span id="total">0</span>
                </div>
            </div>
        </div>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="progress-bar w-0"></div>
        </div>
    </div>

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-gray-100">
        <div id="conteudo" class="text-gray-800 text-[1.1rem] leading-relaxed mb-10">
            <div class="flex flex-col items-center justify-center py-20 gap-4">
                <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-gray-400 animate-pulse">Sincronizando com o banco médico...</p>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button id="prev" class="px-6 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-2xl font-semibold transition flex items-center gap-2">
                <i data-lucide="chevron-left" class="w-5 h-5"></i> Anterior
            </button>
            <button id="btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-100 transition active:scale-95">Responder</button>
            <button id="next" class="px-6 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-2xl font-semibold transition flex items-center gap-2">
                Pular <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div id="explicacao-box" class="hidden bg-emerald-50 border border-emerald-100 p-8 rounded-3xl">
        <h3 class="font-bold text-lg text-emerald-800 mb-4 flex items-center gap-2">
            <i data-lucide="check-circle" class="w-5 h-5"></i> Comentário do Especialista
        </h3>
        <div id="explicacao-texto" class="text-emerald-900 leading-relaxed"></div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    let questoes = [];
    let indexAtual = 0;
    let questao = null;
    let marcada = null;
    let respondeu = false;
    let timerInterval = null;
    let tempoRestante = 60;

    // Inicializa ícones da sidebar e página
    const atualizarIcones = () => { if (window.lucide) lucide.createIcons(); };
    atualizarIcones();

    // Loop de verificação para garantir que o Supabase carregou
    const aguardarBanco = setInterval(() => {
        if (window.supabaseClient) {
            clearInterval(aguardarBanco);
            carregarDados();
        }
    }, 150);

    async function carregarDados() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const temaFiltro = urlParams.get('tema');

            let query = window.supabaseClient.from("questoes").select("*");
            
            // Busca inteligente (ilike ignora maiúsculas/minúsculas)
            if (temaFiltro && temaFiltro !== "Todos") {
                query = query.ilike('specialty', `%${temaFiltro.trim()}%`);
            }

            const { data, error } = await query.order("id", { ascending: true });
            if (error) throw error;

            questoes = data.filter(q => q.title && q.title.trim() !== "") || [];
            
            if (questoes.length > 0) {
                document.getElementById("total").textContent = questoes.length;
                mostrarQuestao();
            } else {
                renderizarErro(temaFiltro);
            }
        } catch (e) {
            console.error("Erro Supabase:", e);
            document.getElementById("conteudo").innerHTML = `<div class='text-center py-10 text-red-500 font-bold'>Erro de conexão com o banco de dados.</div>`;
        }
    }

    function renderizarErro(tema) {
        document.getElementById("tema").innerText = "Aviso";
        document.getElementById("conteudo").innerHTML = `
            <div class="text-center py-10">
                <p class="text-gray-500 mb-6 text-lg">Nenhuma questão encontrada para: <b>${tema || 'Geral'}</b></p>
                <a href="index.html" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-md">Voltar ao Início</a>
            </div>`;
    }

    function mostrarQuestao() {
        questao = questoes[indexAtual];
        marcada = null;
        respondeu = false;

        // Reset UI
        document.getElementById("btn").innerText = "Responder";
        document.getElementById("btn").className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition active:scale-95";
        document.getElementById("tema").innerText = questao.specialty || "Geral";
        document.getElementById("explicacao-box").classList.add("hidden");

        // Dificuldade
        const diffEl = document.getElementById("dificuldade");
        if (questao.difficulty) {
            const d = questao.difficulty.toLowerCase();
            const cor = d.includes('facil') ? 'text-emerald-500' : d.includes('medio') ? 'text-amber-500' : 'text-red-500';
            diffEl.innerHTML = `<span class="${cor} text-[10px] font-black uppercase tracking-widest">● ${questao.difficulty}</span>`;
            diffEl.classList.remove("hidden");
        }

        // Título e Alternativas
        let html = `<p class="mb-8 font-bold text-xl text-gray-900 leading-tight">${questao.title}</p><div class="space-y-4">`;
        
        ["a", "b", "c", "d", "e"].forEach(l => {
            const texto = questao[`option_${l}`];
            if (texto && texto !== "null" && texto.trim() !== "") {
                html += `
                    <div class="alt" data-l="${l.toUpperCase()}">
                        <div class="letra-circulo">${l.toUpperCase()}</div>
                        <span class="flex-1">${texto}</span>
                    </div>`;
            }
        });
        document.getElementById("conteudo").innerHTML = html + "</div>";

        // Clique nas opções
        document.querySelectorAll(".alt").forEach(el => {
            el.onclick = () => {
                if (respondeu) return;
                document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
                el.classList.add("sel");
                marcada = el.dataset.l;
            };
        });

        atualizarIcones();
        iniciarTimer();
        atualizarProgresso();
    }

    function iniciarTimer() {
        clearInterval(timerInterval);
        tempoRestante = 60; // Padrão de 60s
        const timerEl = document.getElementById("timer");
        timerEl.classList.remove("animate-pulse");
        timerEl.textContent = "60s";
        
        timerInterval = setInterval(() => {
            tempoRestante--;
            timerEl.textContent = `${tempoRestante}s`;
            if (tempoRestante <= 10) timerEl.classList.add("animate-pulse");
            if (tempoRestante <= 0) {
                clearInterval(timerInterval);
                if (!respondeu) verificarResposta();
            }
        }, 1000);
    }

    function verificarResposta() {
        if (!marcada && !respondeu) return alert("Por favor, selecione uma alternativa!");
        
        respondeu = true;
        clearInterval(timerInterval);

        const correta = String(questao.correct_answer).toUpperCase().trim();
        const acertou = marcada === correta;

        document.querySelectorAll(".alt").forEach(el => {
            el.classList.remove("sel");
            if (el.dataset.l === correta) el.classList.add("ok");
            if (el.dataset.l === marcada && !acertou) el.classList.add("err");
        });

        if (acertou) {
            confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 }, colors: ['#10b981', '#3b82f6'] });
        }

        if (questao.explanation && questao.explanation !== "null") {
            document.getElementById("explicacao-texto").innerHTML = questao.explanation;
            document.getElementById("explicacao-box").classList.remove("hidden");
            document.getElementById("explicacao-box").scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.getElementById("btn").innerText = "Próxima Questão";
        document.getElementById("btn").className = "flex-1 bg-gray-900 hover:bg-black text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition";
    }

    document.getElementById("btn").onclick = () => {
        if (respondeu) {
            if (indexAtual < questoes.length - 1) {
                indexAtual++;
                mostrarQuestao();
            } else {
                alert("Simulado finalizado!");
                window.location.href = 'index.html';
            }
        } else {
            verificarResposta();
        }
    };

    function atualizarProgresso() {
        const percent = ((indexAtual + 1) / questoes.length) * 100;
        document.getElementById("progress-bar").style.width = `${percent}%`;
        document.getElementById("progresso").textContent = indexAtual + 1;
    }

    document.getElementById("next").onclick = () => { if (indexAtual < questoes.length - 1) { indexAtual++; mostrarQuestao(); } };
    document.getElementById("prev").onclick = () => { if (indexAtual > 0) { indexAtual--; mostrarQuestao(); } };
});
</script>
</body>
</html>
