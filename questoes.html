<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temas - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-tema { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card-tema:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.05); }
        /* Espaço para a sidebar que será inserida pelo sidebar.js */
        main { margin-left: 16rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="flex-1 p-8 md:p-12">
        <div class="max-w-6xl mx-auto">
            
            <header class="mb-10">
                <div id="btn-voltar" class="hidden items-center gap-2 text-[10px] font-bold text-blue-600 uppercase mb-4 cursor-pointer hover:underline transition-all" onclick="voltar()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </div>
                <h2 id="titulo-pagina" class="text-3xl font-bold text-gray-800 tracking-tight">Estudar por Temas</h2>
                <p id="subtitulo-pagina" class="text-gray-500 mt-1 text-sm">Selecione uma grande área para começar sua revisão</p>
            </header>

            <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>

        </div>
    </main>

    <script>
        const bancoDeDados = {
            'Clínica Médica': {
                icon: 'fa-stethoscope', color: 'blue',
                especialidades: {
                    'Cardiologia': ['HAS', 'IAM', 'Bradiarritmias', 'Insuficiência Cardíaca', 'Valvopatias'],
                    'Pneumologia': ['Asma', 'DPOC', 'TEP', 'Pneumonias'],
                    'Nefrologia': ['IRA', 'DRC', 'Glomerulopatias']
                }
            },
            'Pediatria': {
                icon: 'fa-baby', color: 'emerald',
                especialidades: {
                    'Puericultura': ['Desenvolvimento PM', 'Crescimento', 'Vacinação'],
                    'Neonatologia': ['Icterícia Neonatal', 'Reanimação Neonatal']
                }
            },
            'Ciclo Básico': {
                icon: 'fa-microscope', color: 'purple',
                especialidades: {
                    'Anatomia': ['Sist. Cardiovascular', 'Sist. Nervoso', 'Sist. Digestório'],
                    'Fisiologia': ['Fisiologia Renal', 'Fisiologia Endócrina']
                }
            }
        };

        let estado = 'areas'; 
        let areaSelecionada = '';
        let especialidadeSelecionada = '';

        function renderizar() {
            const grid = document.getElementById('grid-container');
            const titulo = document.getElementById('titulo-pagina');
            const subtitulo = document.getElementById('subtitulo-pagina');
            const btnVoltar = document.getElementById('btn-voltar');
            
            grid.innerHTML = '';

            if (estado === 'areas') {
                btnVoltar.classList.add('hidden');
                titulo.innerText = "Estudar por Temas";
                subtitulo.innerText = "Selecione uma grande área para começar sua revisão";

                Object.keys(bancoDeDados).forEach(area => {
                    const info = bancoDeDados[area];
                    grid.appendChild(criarCardElement(area, info.icon, info.color, 'Ver Especialidades', () => {
                        areaSelecionada = area;
                        estado = 'especialidades';
                        renderizar();
                    }));
                });
            } 
            else if (estado === 'especialidades') {
                btnVoltar.classList.remove('hidden');
                titulo.innerText = areaSelecionada;
                subtitulo.innerText = "Escolha a especialidade desejada";

                const especialidades = bancoDeDados[areaSelecionada].especialidades;
                Object.keys(especialidades).forEach(esp => {
                    grid.appendChild(criarCardElement(esp, 'fa-layer-group', 'blue', 'Ver Assuntos', () => {
                        especialidadeSelecionada = esp;
                        estado = 'subtemas';
                        renderizar();
                    }));
                });
            }
            else if (estado === 'subtemas') {
                btnVoltar.classList.remove('hidden');
                titulo.innerText = especialidadeSelecionada;
                subtitulo.innerText = "Clique em um assunto para abrir as questões";

                const subtemas = bancoDeDados[areaSelecionada].especialidades[especialidadeSelecionada];
                subtemas.forEach(assunto => {
                    grid.appendChild(criarCardElement(assunto, 'fa-file-medical', 'slate', 'Praticar Questões', () => {
                        // Envia o tema para a página de questões
                        window.location.href = `questoes.html?tema=${encodeURIComponent(assunto)}`;
                    }));
                });
            }
        }

        // Função corrigida para criar elementos de card com eventos de clique reais
        function criarCardElement(nome, icon, cor, footer, acao) {
            const div = document.createElement('div');
            div.className = 'card-tema bg-white border border-gray-100 p-8 rounded-[32px] shadow-sm flex flex-col items-center text-center';
            div.onclick = acao;
            div.innerHTML = `
                <div class="w-16 h-16 bg-${cor}-50 text-${cor}-500 rounded-2xl flex items-center justify-center mb-5">
                    <i class="fas ${icon} text-2xl"></i>
                </div>
                <h4 class="font-bold text-gray-800 text-sm mb-2">${nome}</h4>
                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">${footer}</span>
            `;
            return div;
        }

        function voltar() {
            if (estado === 'subtemas') estado = 'especialidades';
            else if (estado === 'especialidades') estado = 'areas';
            renderizar();
        }

        window.onload = renderizar;
    </script>
</body>
</html>
