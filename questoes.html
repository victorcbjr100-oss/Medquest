<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#f8fafc] p-4">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 mt-10">
        <div id="monitor" class="text-[10px] font-mono text-blue-500 mb-4 uppercase tracking-widest">
            Status: Aguardando Sistema...
        </div>
        
        <h1 id="exibir-tema" class="text-3xl font-black text-gray-800 mb-6">MedQuest</h1>
        
        <div id="bloco-questao" class="min-h-[200px]">
            <p class="text-gray-400 italic">Iniciando protocolos de conexão...</p>
        </div>

        <div id="botoes" class="mt-8 hidden">
            <button onclick="verificarResposta()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">
                Responder Questão
            </button>
        </div>
    </div>

    <script>
        // Configurações de Acesso ao Banco
        const URL_DB = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
        const KEY_DB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
        
        function atualizarStatus(texto, erro = false) {
            const el = document.getElementById('monitor');
            el.innerText = "Status: " + texto;
            if(erro) el.style.color = "red";
        }

        async function conectarEBuscar() {
            atualizarStatus("Conectando ao Supabase...");
            
            try {
                // Verifica se a biblioteca carregou
                if (typeof supabase === 'undefined') {
                    throw new Error("Biblioteca de conexão não encontrada. Verifique sua internet.");
                }

                const cliente = supabase.createClient(URL_DB, KEY_DB);
                const { data, error } = await cliente.from('questoes').select('*');

                if (error) throw error;

                // Identifica o tema solicitado na URL (ex: HAS)
                const urlParams = new URLSearchParams(window.location.search);
                const temaSolicitado = (urlParams.get('tema') || "").toLowerCase().trim();
                document.getElementById('exibir-tema').innerText = urlParams.get('tema') || "Geral";

                // Filtro que aceita variações de nome
                const filtradas = data.filter(q => {
                    const temaBanco = (q.tema || "").toLowerCase();
                    const subtemaBanco = (q.subtema || "").toLowerCase();
                    return temaBanco.includes(temaSolicitado) || subtemaBanco.includes(temaSolicitado);
                });

                if (filtradas.length > 0) {
                    atualizarStatus(filtradas.length + " questões carregadas com sucesso.");
                    montarQuestao(filtradas);
                    document.getElementById('botoes').classList.remove('hidden');
                } else {
                    atualizarStatus("Nenhuma questão encontrada para: " + temaSolicitado, true);
                    document.getElementById('bloco-questao').innerHTML = `
                        <div class="p-6 bg-red-50 rounded-2xl border border-red-100 text-red-600">
                            Não existem questões cadastradas com o nome <b>${temaSolicitado}</b> no banco de dados.
                        </div>`;
                }

            } catch (err) {
                atualizarStatus("Falha Crítica: " + err.message, true);
            }
        }

        function montarQuestao(q) {
            let layout = `<p class="text-xl font-bold text-gray-700 mb-8 leading-relaxed">${q.enunciado}</p><div class="space-y-4">`;
            
            const alternativas = [
                { texto: q.opcao_a, letra: 'A' },
                { texto: q.opcao_b, letra: 'B' },
                { texto: q.opcao_c, letra: 'C' },
                { texto: q.opcao_d, letra: 'D' }
            ];

            alternativas.forEach(alt => {
                if(alt.texto) {
                    layout += `
                        <div onclick="this.style.borderColor='#3b82f6'; this.style.backgroundColor='#eff6ff'" 
                             class="p-5 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 transition-all flex items-center gap-4">
                            <span class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center text-xs font-black text-gray-400">${alt.letra}</span>
                            <div class="text-gray-600 font-medium">${alt.texto}</div>
                        </div>`;
                }
            });

            document.getElementById('bloco-questao').innerHTML = layout + "</div>";
        }

        window.onload = conectarEBuscar;
    </script>
</body>
</html>
