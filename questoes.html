<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .alternativa.selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .alternativa.correta { border-color: #10b981 !important; background-color: #ecfdf5 !important; }
        .alternativa.errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
</head>
<body class="bg-[#f8fafc] p-4">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 mt-10">
        <div id="monitor" class="text-[10px] font-mono text-blue-500 mb-4 uppercase tracking-widest">Status: Conectando...</div>
        <h1 id="exibir-tema" class="text-3xl font-black text-gray-800 mb-2 uppercase">MedQuest</h1>
        <p id="exibir-subtema" class="text-xs font-bold text-gray-400 uppercase mb-6"></p>
        
        <div id="bloco-questao" class="min-h-[200px]">
            <p class="text-gray-400 italic">Carregando dados do servidor...</p>
        </div>

        <div id="botoes" class="mt-8 hidden flex gap-3">
            <button onclick="window.location.href='temas.html'" class="px-6 py-5 bg-gray-100 text-gray-500 rounded-2xl font-bold hover:bg-gray-200">Sair</button>
            <button id="btn-acao" onclick="verificarResposta()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-blue-700">Responder Questão</button>
        </div>
    </div>

    <script>
        const URL_DB = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
        const KEY_DB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
        
        let questaoAtual = null;
        let respondida = false;
        let selecionada = null;

        async function carregarQuestao() {
            try {
                const supabaseClient = supabase.createClient(URL_DB, KEY_DB);
                const params = new URLSearchParams(window.location.search);
                const temaAlvo = (params.get('tema') || "HAS").toUpperCase();

                const { data, error } = await supabaseClient.from('questoes').select('*').eq('tema', temaAlvo);
                if (error) throw error;

                if (data && data.length > 0) {
                    questaoAtual = data[Math.floor(Math.random() * data.length)];
                    document.getElementById('exibir-tema').innerText = questaoAtual.tema;
                    document.getElementById('exibir-subtema').innerText = questaoAtual.subtema || "";
                    renderizar(questaoAtual);
                    document.getElementById('botoes').classList.remove('hidden');
                    document.getElementById('monitor').innerText = "Status: Questão carregada.";
                } else {
                    document.getElementById('bloco-questao').innerHTML = `<p class="text-red-500">Nenhuma questão encontrada para ${temaAlvo}.</p>`;
                }
            } catch (err) {
                document.getElementById('monitor').innerText = "Status: Erro de conexão.";
                console.error(err);
            }
        }

        function renderizar(q) {
            let html = `<p class="text-xl font-bold text-gray-700 mb-8">${q.enunciado}</p><div class="space-y-4">`;
            const alts = [
                {l: 'a', t: q.opcao_a}, {l: 'b', t: q.opcao_b}, 
                {l: 'c', t: q.opcao_c}, {l: 'd', t: q.opcao_d}
            ];
            alts.forEach(a => {
                html += `
                    <div onclick="selecionar(this, '${a.l}')" class="alt-item p-5 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 flex items-center gap-4">
                        <span class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center text-xs font-black text-gray-400 uppercase">${a.l}</span>
                        <div class="text-gray-600 font-medium">${a.t}</div>
                    </div>`;
            });
            document.getElementById('bloco-questao').innerHTML = html + "</div>";
        }

        window.selecionar = (el, letra) => {
            if(respondida) return;
            document.querySelectorAll('.alt-item').forEach(d => d.classList.remove('selecionada'));
            el.classList.add('selecionada');
            selecionada = letra;
        };

        window.verificarResposta = () => {
            if(!selecionada) return alert("Selecione uma opção!");
            if(respondida) return window.location.reload();

            respondida = true;
            const itens = document.querySelectorAll('.alt-item');
            const mapa = {a:0, b:1, c:2, d:3};
            const correta = questaoAtual.correta.toLowerCase().trim();

            itens[mapa[correta]].classList.add('correta');
            if(selecionada !== correta) itens[mapa[selecionada]].classList.add('errada');

            document.getElementById('btn-acao').innerText = "Próxima Questão";
            document.getElementById('btn-acao').classList.replace('bg-blue-600', 'bg-gray-800');
        };

        window.onload = carregarQuestao;
    </script>
</body>
</html>
