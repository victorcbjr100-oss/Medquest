<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .correta { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .travado { pointer-events: none; opacity: 0.8; }
        .resposta-container { margin-left: 2rem; border-left: 2px solid #e2e8f0; padding-left: 1rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20">

    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50 flex items-center justify-between">
        <a href="temas.html" class="text-gray-400 hover:text-blue-600 transition"><i class="fas fa-times"></i></a>
        <span id="contador-questoes" class="text-xs font-bold text-gray-500 uppercase tracking-widest text-center flex-1">Carregando...</span>
    </header>

    <main class="max-w-3xl mx-auto p-6 mt-6">
        <div id="card-questao" class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-6">
            <div class="mb-6">
                <span id="label-tema" class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded uppercase">Tema</span>
            </div>
            
            <p id="enunciado" class="text-gray-800 text-lg leading-relaxed mb-10 font-medium">Buscando questão no banco de dados...</p>

            <div class="space-y-3" id="campoAlternativas">
                <button onclick="marcar(this)" id="btn-A" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">A</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-B" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">B</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-C" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">C</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-D" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">D</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
                <button onclick="marcar(this)" id="btn-E" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4 group">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">E</span>
                    <span class="texto-alternativa text-sm text-gray-600"></span>
                </button>
            </div>

            <div class="mt-10 flex justify-between items-center border-t pt-6">
                <button id="btn-confirmar" onclick="verificar()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg hover:scale-105 transition-all">Confirmar Resposta</button>
                <button id="btn-proxima" onclick="proximaQuestao()" class="hidden bg-gray-800 text-white px-8 py-3 rounded-xl font-bold text-sm shadow-lg hover:bg-black transition-all">Próxima <i class="fas fa-arrow-right ml-2"></i></button>
            </div>
        </div>

        <div id="secao-comentarios" class="hidden">
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
                <div class="flex items-center gap-2 mb-4">
                    <i class="far fa-comments text-blue-600"></i>
                    <h3 class="font-bold text-gray-800 text-sm">Fórum de Discussão</h3>
                </div>
                
                <textarea id="textoComentario" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm mb-4 h-24 focus:outline-none focus:ring-2 focus:ring-blue-100" placeholder="Inicie uma discussão..."></textarea>
                <button onclick="salvarNoSupabase(null)" class="bg-blue-600 text-white text-[10px] font-bold px-8 py-2 rounded-lg uppercase shadow-md hover:bg-blue-700 mb-8 transition-all">Postar Comentário</button>

                <div id="listaComentarios" class="space-y-6 border-t border-gray-100 pt-6"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const temaAlvo = urlParams.get('tema') || 'Geral';
        let questaoAtualId = null;
        let elementoSelecionado = null;
        let totalNoTema = 0;
        let indexAtual = 1;

        window.onload = carregarQuestao;

        async function carregarQuestao() {
            // 1. Conta quantas questões existem nesse tema
            const { count } = await supabaseClient
                .from('banco_questoes')
                .select('*', { count: 'exact', head: true })
                .eq('tema', temaAlvo);
            totalNoTema = count || 0;

            // 2. Busca a questão
            let query = supabaseClient.from('banco_questoes').select('*').eq('tema', temaAlvo);
            
            // Se tiver um ID na URL, busca ele, senão pega a primeira do tema
            const idUrl = urlParams.get('id');
            if (idUrl) {
                query = query.eq('id', idUrl);
            } else {
                query = query.limit(1);
            }

            const { data, error } = await query.single();

            if (data) {
                questaoAtualId = data.id;
                renderizarQuestao(data);
                carregarComentarios();
                atualizarContador();
            }
        }

        function renderizarQuestao(q) {
            document.getElementById('enunciado').innerHTML = q.enunciado;
            document.getElementById('label-tema').innerText = q.tema;
            
            const alternativas = [
                { letra: 'A', texto: q.opcao_a },
                { letra: 'B', texto: q.opcao_b },
                { letra: 'C', texto: q.opcao_c },
                { letra: 'D', texto: q.opcao_d },
                { letra: 'E', texto: q.opcao_e }
            ];

            alternativas.forEach(alt => {
                const btn = document.getElementById(`btn-${alt.letra}`);
                if (alt.texto) {
                    btn.querySelector('.texto-alternativa').innerText = alt.texto;
                    btn.setAttribute('data-certa', alt.letra === q.correta ? 'true' : 'false');
                    btn.classList.remove('selecionada', 'correta', 'errada', 'travado');
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            });

            document.getElementById('btn-confirmar').classList.remove('hidden');
            document.getElementById('btn-proxima').classList.add('hidden');
            document.getElementById('secao-comentarios').classList.add('hidden');
        }

        function marcar(el) {
            document.querySelectorAll('.botao-opcao').forEach(btn => btn.classList.remove('selecionada'));
            el.classList.add('selecionada');
            elementoSelecionado = el;
        }

        function verificar() {
            if (!elementoSelecionado) {
                alert("Selecione uma alternativa!");
                return;
            }
            
            document.querySelectorAll('.botao-opcao').forEach(btn => btn.classList.add('travado'));
            
            const eCorreta = elementoSelecionado.getAttribute('data-certa') === 'true';
            
            if (eCorreta) {
                elementoSelecionado.classList.add('correta');
            } else {
                elementoSelecionado.classList.add('errada');
                // Mostra a correta
                document.querySelectorAll('.botao-opcao').forEach(btn => {
                    if (btn.getAttribute('data-certa') === 'true') btn.classList.add('correta');
                });
            }

            document.getElementById('btn-confirmar').classList.add('hidden');
            document.getElementById('btn-proxima').classList.remove('hidden');
            document.getElementById('secao-comentarios').classList.remove('hidden');
        }

        async function proximaQuestao() {
            // Busca a próxima questão com ID maior que o atual dentro do mesmo tema
            const { data } = await supabaseClient
                .from('banco_questoes')
                .select('id')
                .eq('tema', temaAlvo)
                .gt('id', questaoAtualId)
                .order('id', { ascending: true })
                .limit(1)
                .single();

            if (data) {
                window.location.href = `questoes.html?tema=${temaAlvo}&id=${data.id}`;
            } else {
                alert("Parabéns! Você concluiu todas as questões deste tema.");
                window.location.href = "temas.html";
            }
        }

        function atualizarContador() {
            document.getElementById('contador-questoes').innerText = `Tema: ${temaAlvo} | Banco: ${totalNoTema} questões`;
        }

        // --- LÓGICA DE COMENTÁRIOS ---
        async function carregarComentarios() {
            const { data } = await supabaseClient
                .from('comentarios_questoes')
                .select('*')
                .eq('questao_id', questaoAtualId)
                .order('created_at', { ascending: true });
            
            const lista = document.getElementById('listaComentarios');
            lista.innerHTML = "";
            if (data) {
                data.filter(c => !c.pai_id).forEach(p => {
                    adicionarNaTela(p.texto, p.created_at, p.id, false);
                    data.filter(r => r.pai_id === p.id).forEach(r => {
                        adicionarNaTela(r.texto, r.created_at, r.id, true, p.id);
                    });
                });
            }
        }

        async function salvarNoSupabase(paiId = null) {
            const campo = paiId ? document.getElementById(`input-${paiId}`) : document.getElementById('textoComentario');
            const texto = campo.value;
            if (!texto.trim()) return;

            await supabaseClient.from('comentarios_questoes').insert({ 
                questao_id: questaoAtualId, 
                texto: texto,
                pai_id: paiId 
            });

            campo.value = "";
            carregarComentarios();
        }

        function adicionarNaTela(texto, dataHora, id, ehResposta, paiId = null) {
            const container = ehResposta ? document.getElementById(`respostas-de-${paiId}`) : document.getElementById('listaComentarios');
            const dataF = new Date(dataHora).toLocaleString('pt-BR');
            const html = `
                <div class="${ehResposta ? 'resposta-container' : 'bg-gray-50 p-4 rounded-2xl border border-gray-100'} mb-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-bold text-blue-600 uppercase">Estudante</span>
                        <span class="text-[8px] text-gray-400">${dataF}</span>
                    </div>
                    <p class="text-sm text-gray-700">${texto}</p>
                    ${!ehResposta ? `
                        <button onclick="document.getElementById('box-${id}').classList.toggle('hidden')" class="text-[9px] font-bold text-blue-500 mt-2 hover:underline">RESPONDER</button>
                        <div id="box-${id}" class="hidden mt-3">
                            <textarea id="input-${id}" class="w-full p-2 text-xs bg-white border rounded-lg h-16 mb-2 outline-none" placeholder="Sua resposta..."></textarea>
                            <button onclick="salvarNoSupabase('${id}')" class="bg-blue-600 text-white text-[8px] px-4 py-1 rounded font-bold uppercase">Enviar</button>
                        </div>
                        <div id="respostas-de-${id}"></div>
                    ` : ''}
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
    </script>
</body>
</html>
