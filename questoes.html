<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .alternativa.correta { border-color: #10b981 !important; background-color: #ecfdf5 !important; }
        .alternativa.errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .alternativa.selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <div class="max-w-4xl mx-auto p-6 pt-12">
        <div class="flex justify-between items-end mb-8">
            <div>
                <a href="temas.html" class="text-blue-600 text-xs font-bold uppercase tracking-widest flex items-center gap-2 mb-2">
                    <i class="fas fa-arrow-left text-[10px]"></i> Voltar aos Temas
                </a>
                <h1 id="titulo-tema" class="text-3xl font-black text-gray-800">Carregando...</h1>
            </div>
            <div class="text-right">
                <p id="contador-questoes" class="text-sm font-bold text-gray-400">Questão 0 de 0</p>
            </div>
        </div>

        <div id="questao-card" class="bg-white rounded-[32px] shadow-xl shadow-blue-900/5 border border-gray-100 p-8 md:p-12 relative overflow-hidden">
            <div id="conteudo-questao">
                </div>

            <div id="feedback-container" class="mt-10 pt-10 border-t border-gray-100 hidden">
                <div id="feedback-status" class="mb-4"></div>
                <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2">Explicação Técnica</p>
                    <p id="comentario-texto" class="text-gray-600 leading-relaxed text-sm"></p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-8">
            <button onclick="questaoAnterior()" class="bg-white border border-gray-200 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-50 transition-all">Anterior</button>
            <button id="btn-acao" onclick="verificarAcao()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:scale-[1.02] active:scale-95 transition-all">Responder</button>
            <button onclick="proximaQuestao()" class="bg-white border border-gray-200 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-50 transition-all">Próxima</button>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-[32px] border border-dashed border-gray-200">
            <i class="fas fa-folder-open text-gray-200 text-6xl mb-4"></i>
            <h2 class="text-xl font-bold text-gray-800">Nenhuma questão encontrada</h2>
            <p class="text-gray-500 mb-8">Ainda não há questões cadastradas para este tema.</p>
            <a href="temas.html" class="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold text-sm">Explorar outros temas</a>
        </div>
    </div>

    <script>
        // Configurações do Supabase (Victor Hugo - MedQuest)
        const SUPABASE_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var questoesFiltradas = [];
        var indiceAtual = 0;
        var respondida = false;
        var opcaoSelecionada = null;

        const urlParams = new URLSearchParams(window.location.search);
        const temaURL = urlParams.get('tema');

        async function inicializar() {
            try {
                const { data, error } = await _supabase.from('questoes').select('*');
                if (error) throw error;

                if (temaURL) {
                    questoesFiltradas = data.filter(q => 
                        (q.tema && q.tema.toLowerCase() === temaURL.toLowerCase()) ||
                        (q.subtema && q.subtema.toLowerCase() === temaURL.toLowerCase())
                    );
                } else {
                    questoesFiltradas = data;
                }

                if (questoesFiltradas.length === 0) {
                    document.getElementById('questao-card').classList.add('hidden');
                    document.getElementById('empty-state').classList.remove('hidden');
                    document.getElementById('titulo-tema').innerText = "Vazio";
                    return;
                }

                document.getElementById('titulo-tema').innerText = temaURL || "Geral";
                renderizarQuestao();
            } catch (err) {
                console.error("Erro:", err);
                document.getElementById('titulo-tema').innerText = "Erro de Conexão";
            }
        }

        function renderizarQuestao() {
            const q = questoesFiltradas[indiceAtual];
            const container = document.getElementById('conteudo-questao');
            
            respondida = false;
            opcaoSelecionada = null;
            document.getElementById('feedback-container').classList.add('hidden');
            document.getElementById('btn-acao').innerText = "Responder";
            document.getElementById('contador-questoes').innerText = "Questão " + (indiceAtual + 1) + " de " + questoesFiltradas.length;

            let html = `
                <div class="flex items-center gap-3 mb-6">
                    <span class="px-3 py-1 bg-blue-50 text-[10px] font-black text-blue-600 rounded-lg uppercase tracking-widest">${q.origem || 'MEDQUEST'}</span>
                    <span class="text-gray-300 text-xs">|</span>
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">${q.subtema || q.tema}</span>
                </div>
                <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-10 leading-snug">${q.enunciado}</h3>
                <div class="space-y-4">
            `;

            const opcoes = [q.opcao_a, q.opcao_b, q.opcao_c, q.opcao_d];
            opcoes.forEach((opt, i) => {
                if (opt) {
                    html += `
                        <div onclick="selecionar(${i})" class="alternativa p-5 border-2 border-gray-100 rounded-2xl font-medium text-gray-700 flex items-center gap-4 bg-white cursor-pointer transition-all hover:border-gray-200">
                            <span class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-xs font-black text-gray-400 uppercase">${String.fromCharCode(65 + i)}</span>
                            <div class="flex-1 text-sm md:text-base">${opt}</div>
                        </div>
                    `;
                }
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        window.selecionar = function(i) {
            if (respondida) return;
            const alts = document.querySelectorAll('.alternativa');
            alts.forEach(a => a.classList.remove('selecionada'));
            alts[i].classList.add('selecionada');
            opcaoSelecionada = i;
        };

        window.verificarAcao = function() {
            if (opcaoSelecionada === null) return alert("Por favor, selecione uma alternativa.");
            if (!respondida) confirmar();
            else proximaQuestao();
        };

        function confirmar() {
            respondida = true;
            const q = questoesFiltradas[indiceAtual];
            const alts = document.querySelectorAll('.alternativa');
            const stats = JSON.parse(localStorage.getItem('medquest_stats')) || { total: 0, acertos: 0, erros: 0 };
            
            stats.total += 1;
            alts[q.correta].classList.add('correta');

            if (opcaoSelecionada === q.correta) {
                stats.acertos += 1;
                document.getElementById('feedback-status').innerHTML = '<div class="p-4 bg-emerald-50 text-emerald-600 rounded-2xl font-bold text-sm">✅ Parabéns, doutor! Resposta correta.</div>';
            } else {
                stats.erros += 1;
                alts[opcaoSelecionada].classList.add('errada');
                document.getElementById('feedback-status').innerHTML = '<div class="p-4 bg-red-50 text-red-600 rounded-2xl font-bold text-sm">❌ Resposta incorreta. Revise o tema abaixo.</div>';
            }

            localStorage.setItem('medquest_stats', JSON.stringify(stats));
            document.getElementById('comentario-texto').innerText = q.comentario || "O comentário técnico para esta questão está sendo processado pela nossa equipe médica.";
            document.getElementById('feedback-container').classList.remove('hidden');
            document.getElementById('btn-acao').innerText = "Próxima Questão";
        }

        window.proximaQuestao = function() {
            if (indiceAtual < questoesFiltradas.length - 1) {
                indiceAtual++;
                renderizarQuestao();
            } else {
                alert("Você completou este bloco de questões!");
                window.location.href = 'temas.html';
            }
        };

        window.questaoAnterior = function() {
            if (indiceAtual > 0) {
                indiceAtual--;
                renderizarQuestao();
            }
        };

        window.onload = inicializar;
    </script>
</body>
</html>
