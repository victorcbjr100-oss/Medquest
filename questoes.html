<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="sidebar.js"></script>
    <style>
        .alt-item.selecionada { border-color: #3b82f6; background-color: #eff6ff; }
        .alt-item.correta { border-color: #10b981; background-color: #ecfdf5; }
        .alt-item.errada { border-color: #ef4444; background-color: #fef2f2; }
        body { margin-left: 260px; }
        @media (max-width: 768px) { body { margin-left: 0; } }
    </style>
</head>
<body class="bg-[#f8fafc] p-4">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 mt-10">
        <h1 id="exibir-tema" class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Carregando...</h1>
        <div id="bloco-questao" class="mt-6"></div>
        <div id="aba-resposta" class="hidden bg-blue-50 p-4 rounded-2xl border-l-4 border-blue-500 mt-4 text-sm text-gray-700">
            <h4 class="font-bold mb-1 uppercase text-[10px]">Comentário:</h4>
            <p id="texto-comentario"></p>
        </div>
        <div id="botoes" class="mt-8 flex gap-3">
            <button id="btn-acao" onclick="verificarResposta()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase">Responder</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto mt-6 bg-white p-6 rounded-[24px] border border-gray-100">
        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 flex items-center gap-2">
            <i class="fas fa-comments text-blue-500"></i> Discussão Clínica
        </h3>
        <div id="lista-comentarios" class="space-y-3 mb-4"></div>
        <div class="flex flex-col gap-2">
            <input id="input-comentario" type="text" placeholder="Escreva um comentário..." class="bg-gray-50 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
            <button onclick="enviarComentarioMaster(questaoAtual.id)" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs self-end">POSTAR</button>
        </div>
    </div>

    <script src="medquest-core.js"></script>
    <script>
        let questaoAtual = null;
        let respondida = false;
        let selecionada = null;

        async function carregarQuestao() {
            const params = new URLSearchParams(window.location.search);
            const tema = (params.get('tema') || "HAS").toUpperCase();
            const { data } = await _supabase.from('questoes').select('*').eq('tema', tema);
            if (data?.length > 0) {
                questaoAtual = data[Math.floor(Math.random() * data.length)];
                document.getElementById('exibir-tema').innerText = questaoAtual.tema;
                renderizar(questaoAtual);
                carregarComentarios(questaoAtual.id);
            }
        }

        function renderizar(q) {
            let html = `<p class="text-lg font-bold text-gray-700 mb-6">${q.enunciado}</p><div class="space-y-3">`;
            ['a','b','c','d'].forEach(l => {
                const txt = q[`opcao_${l}`] || q[`alternativa_${l}`];
                if(txt) html += `<div onclick="selecionar(this, '${l}')" class="alt-item p-4 border border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 flex items-center gap-3">
                    <span class="w-6 h-6 bg-gray-100 rounded flex items-center justify-center text-[10px] font-bold uppercase">${l}</span>
                    <div class="text-gray-600 text-sm font-medium">${txt}</div>
                </div>`;
            });
            document.getElementById('bloco-questao').innerHTML = html + "</div>";
        }

        function selecionar(el, l) { if(!respondida) { document.querySelectorAll('.alt-item').forEach(d => d.classList.remove('selecionada')); el.classList.add('selecionada'); selecionada = l; } }

        async function verificarResposta() {
            if(!selecionada || respondida) return respondida ? location.reload() : null;
            respondida = true;
            const correta = (questaoAtual.correta || questaoAtual.resposta_correta).toLowerCase().trim();
            const acertou = selecionada === correta;

            await _supabase.from('estatisticas').insert([{ tema: questaoAtual.tema, acertou: acertou, usuario: 'Dr. Victor' }]);

            const itens = document.querySelectorAll('.alt-item');
            const mapa = {a:0, b:1, c:2, d:3};
            if(itens[mapa[correta]]) itens[mapa[correta]].classList.add('correta');
            if(!acertou && itens[mapa[selecionada]]) itens[mapa[selecionada]].classList.add('errada');

            if(questaoAtual.comentario_professor) {
                document.getElementById('texto-comentario').innerText = questaoAtual.comentario_professor;
                document.getElementById('aba-resposta').classList.remove('hidden');
            }
            document.getElementById('btn-acao').innerText = "Próxima Questão";
            document.getElementById('btn-acao').className = "flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold text-xs uppercase";
        }

        window.onload = carregarQuestao;
    </script>
</body>
</html>
