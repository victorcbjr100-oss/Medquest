<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questões - MedQuest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="sidebar.js"></script>

<style>
body { margin-left: 16rem; }
@media (max-width: 768px) { body { margin-left: 0; } }

.alt { padding: 12px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; }
.sel { background: #eff6ff; border-color: #3b82f6; }
.ok { background: #ecfdf5; border-color: #10b981; }
.err { background: #fef2f2; border-color: #ef4444; }
</style>
</head>

<body class="bg-gray-50 p-6">

<div class="max-w-2xl mx-auto">

<div class="bg-white p-6 rounded-xl">

<h2 id="tema" class="font-bold mb-4">Carregando...</h2>
<div id="conteudo"></div>

<div class="flex gap-2 mt-6">
<button id="prev" class="flex-1 bg-gray-200 py-2 rounded">Anterior</button>
<button id="btn" class="flex-1 bg-blue-600 text-white py-2 rounded">Responder</button>
<button id="next" class="flex-1 bg-gray-800 text-white py-2 rounded">Próxima</button>
</div>

</div>

<!-- COMENTÁRIOS -->
<div id="comentarios-box" class="hidden mt-6 bg-white p-6 rounded-xl">

<h3 class="font-bold mb-4">💬 Comentários</h3>

<div id="comentario-professor"></div>

<div id="lista-comentarios" class="space-y-4 my-4"></div>

<div class="flex flex-col gap-2">
<input id="novo-comentario" class="border p-3 rounded" placeholder="Escreva um comentário...">
<button id="btn-comentar" class="bg-blue-600 text-white py-2 rounded">
Postar comentário
</button>
</div>

</div>

</div>

<script src="js/supabase.js"></script>

<script>
let questoes = [];
let indexAtual = 0;
let questao = null;
let marcada = null;
let respondeu = false;

// =============================
function getAlt(q, l) {
    return q["op_" + l] || q["opcao_" + l] || q["alternativa_" + l] || "Sem alternativa";
}

// =============================
async function carregar() {
    const { data, error } = await supabaseClient.from("questoes").select("*");

    if (error) {
        console.error(error);
        alert("Erro ao carregar questões");
        return;
    }

    questoes = data;
    mostrarQuestao();
}

// =============================
function mostrarQuestao() {
    respondeu = false;
    marcada = null;

    questao = questoes[indexAtual];

    document.getElementById("tema").textContent = questao.tema;

    let html = `<p class="mb-4">${questao.enunciado}</p>`;

    ["a","b","c","d"].forEach(l => {
        html += `
        <div class="alt" onclick="selecionar(this,'${l}')">
            <b>${l})</b> ${getAlt(questao, l)}
        </div>`;
    });

    document.getElementById("conteudo").innerHTML = html;

    document.getElementById("comentarios-box").classList.add("hidden");
    document.getElementById("btn").textContent = "Responder";
}

// =============================
function selecionar(el, l) {
    if (respondeu) return;

    document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
    el.classList.add("sel");

    marcada = l;
}

// =============================
document.getElementById("btn").onclick = async () => {

    if (!marcada) {
        alert("Selecione uma alternativa");
        return;
    }

    if (respondeu) {
        indexAtual++;
        mostrarQuestao();
        return;
    }

    respondeu = true;

    const correta = (questao.resposta_correta || "").toLowerCase();

    const mapa = {a:0,b:1,c:2,d:3};
    const itens = document.querySelectorAll(".alt");

    if (itens[mapa[correta]]) itens[mapa[correta]].classList.add("ok");

    if (marcada !== correta && itens[mapa[marcada]]) {
        itens[mapa[marcada]].classList.add("err");
    }

    document.getElementById("btn").textContent = "Próxima";
    document.getElementById("comentarios-box").classList.remove("hidden");

    carregarComentarios();
};

// =============================
document.getElementById("next").onclick = () => {
    if (indexAtual < questoes.length - 1) {
        indexAtual++;
        mostrarQuestao();
    }
};

document.getElementById("prev").onclick = () => {
    if (indexAtual > 0) {
        indexAtual--;
        mostrarQuestao();
    }
};

// =============================
// COMENTÁRIOS
// =============================
async function carregarComentarios() {

    const prof = document.getElementById("comentario-professor");

    if (questao.comentario_professor) {
        prof.innerHTML = `
        <div class="bg-yellow-50 border p-3 rounded">
            <b>👨‍⚕️ Professor:</b> ${questao.comentario_professor}
        </div>`;
    } else {
        prof.innerHTML = "";
    }

    const { data } = await supabaseClient
        .from("comentarios")
        .select("*")
        .eq("questao_id", questao.id)
        .order("created_at", { ascending: false });

    const lista = document.getElementById("lista-comentarios");
    lista.innerHTML = "";

    data?.forEach(c => {
        lista.innerHTML += `
        <div class="border p-3 rounded">
            <div class="text-xs text-gray-400 mb-1">
                👤 ${c.user_id || "Anônimo"} • ${new Date(c.created_at).toLocaleString()}
            </div>
            <p>${c.texto}</p>
        </div>`;
    });
}

// =============================
// BOTÃO COMENTAR (FIX REAL)
// =============================
document.getElementById("btn-comentar").addEventListener("click", async () => {

    try {
        const input = document.getElementById("novo-comentario");
        const texto = input.value.trim();

        if (!texto) {
            alert("Digite um comentário");
            return;
        }

        const { error } = await supabaseClient
            .from("comentarios")
            .insert([{
                questao_id: questao.id,
                texto: texto,
                user_id: "Usuário"
            }]);

        if (error) throw error;

        input.value = "";

        carregarComentarios();

    } catch (e) {
        console.error("Erro ao comentar:", e.message);
        alert("Erro ao postar comentário");
    }

});

carregar();
</script>

</body>
</html>
