<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .alt { padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .sel { background: #eff6ff; border-color: #3b82f6; }
        .ok { background: #ecfdf5; border-color: #10b981; }
        .err { background: #fef2f2; border-color: #ef4444; }
    </style>
</head>

<body class="bg-gray-50 p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded-xl">

    <h2 id="tema" class="font-bold mb-4">Carregando...</h2>

    <div id="conteudo"></div>

    <button id="btn" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">
        Responder
    </button>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<script>
let questao = null;
let marcada = null;
let respondeu = false;

async function carregar() {
    try {
        console.log("Iniciando...");

        // 🔒 Tenta proteger rota (sem quebrar)
        try {
            if (typeof protegerRota === "function") {
                await protegerRota();
            }
        } catch (e) {
            console.warn("Auth falhou, seguindo sem login");
        }

        const { data, error } = await supabaseClient
            .from("questoes")
            .select("*")
            .limit(10);

        if (error) throw error;

        if (!data || data.length === 0) {
            document.getElementById("conteudo").innerHTML =
                "<p class='text-red-500'>Banco vazio ou tabela errada</p>";
            return;
        }

        questao = data[Math.floor(Math.random() * data.length)];

        document.getElementById("tema").textContent = questao.tema || "Sem tema";

        render();

    } catch (e) {
        console.error(e);
        document.getElementById("conteudo").innerHTML =
            "<p class='text-red-500'>Erro: " + e.message + "</p>";
    }
}

function render() {
    let html = `<p class="mb-4">${questao.enunciado}</p>`;

    ["a","b","c","d"].forEach(l => {
        const txt =
            questao["op_" + l] ||
            questao["opcao_" + l] ||
            questao["alternativa_" + l];

        if (txt) {
            html += `<div class="alt" onclick="selecionar(this,'${l}')">
                <b>${l})</b> ${txt}
            </div>`;
        }
    });

    document.getElementById("conteudo").innerHTML = html;
}

function selecionar(el, l) {
    if (respondeu) return;

    document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
    el.classList.add("sel");

    marcada = l;
}

document.getElementById("btn").onclick = async () => {
    if (!marcada) return;

    if (respondeu) {
        location.reload();
        return;
    }

    respondeu = true;

    const correta = (questao.resposta_correta || "").toLowerCase();

    const mapa = {a:0,b:1,c:2,d:3};
    const itens = document.querySelectorAll(".alt");

    if (itens[mapa[correta]]) itens[mapa[correta]].classList.add("ok");

    if (marcada !== correta && itens[mapa[marcada]]) {
        itens[mapa[marcada]].classList.add("err");
    }

    // salva só se tiver login
    try {
        if (typeof getUser === "function") {
            const user = await getUser();

            if (user) {
                await supabaseClient.from("respostas_usuario").insert([{
                    user_id: user.id,
                    questao_id: questao.id,
                    resposta_marcada: marcada,
                    acertou: marcada === correta
                }]);
            }
        }
    } catch (e) {
        console.warn("Erro ao salvar:", e.message);
    }

    document.getElementById("btn").textContent = "Próxima";
};

carregar();
</script>

</body>
</html>
