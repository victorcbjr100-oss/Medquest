<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
        <div id="debug" class="text-[10px] text-blue-400 font-mono mb-4 uppercase">Status: Inicializando...</div>
        
        <h1 id="tema-titulo" class="text-2xl font-black text-gray-800 mb-6">MedQuest Pro</h1>
        
        <div id="area-questao" class="min-h-[200px]">
            <p class="text-gray-400 italic">Conectando ao banco de dados...</p>
        </div>

        <div id="controles" class="mt-8 flex gap-4 hidden">
            <button id="btn-responder" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700">Responder</button>
        </div>
    </div>

    <script>
        const S_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
        
        function reportar(msg, erro = false) {
            const el = document.getElementById('debug');
            el.innerText = "Status: " + msg;
            if(erro) el.style.color = "red";
        }

        async function iniciar() {
            try {
                if (typeof supabase === 'undefined') throw new Error("Biblioteca não carregada");

                const _supabase = supabase.createClient(S_URL, S_KEY);
                reportar("Buscando questões...");

                const { data, error } = await _supabase.from('questoes').select('*');
                if (error) throw error;

                const params = new URLSearchParams(window.location.search);
                const temaAlvo = (params.get('tema') || "").toLowerCase().trim();
                document.getElementById('tema-titulo').innerText = params.get('tema') || "Geral";

                // Filtro Inteligente
                let filtradas = data.filter(q => {
                    const t = (q.tema || "").toLowerCase();
                    const s = (q.subtema || "").toLowerCase();
                    return t.includes(temaAlvo) || s.includes(temaAlvo);
                });

                if (filtradas.length === 0) {
                    reportar("Nenhuma questão para: " + temaAlvo, true);
                    document.getElementById('area-questao').innerHTML = `
                        <div class='text-center'>
                            <p class='text-red-500 mb-4 font-bold'>Tema "${temaAlvo}" não encontrado no banco.</p>
                            <button onclick="location.reload()" class="text-blue-600 underline">Tentar novamente</button>
                        </div>`;
                } else {
                    reportar(filtradas.length + " questões carregadas.");
                    renderizar(filtradas);
                    document.getElementById('controles').classList.remove('hidden');
                }

            } catch (err) {
                reportar("Erro: " + err.message, true);
            }
        }

        function renderizar(q) {
            let html = `<p class="text-lg font-bold text-gray-700 mb-6">${q.enunciado}</p><div class="space-y-3">`;
            [q.opcao_a, q.opcao_b, q.opcao_c, q.opcao_d].forEach((opt, i) => {
                if(opt) {
                    html += `<div class="p-4 border border-gray-200 rounded-xl hover:bg-blue-50 cursor-pointer transition-all">${opt}</div>`;
                }
            });
            document.getElementById('area-questao').innerHTML = html + "</div>";
        }

        window.onload = iniciar;
    </script>
</body>
</html>
