<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="sidebar.js"></script>

    <style>
        body { margin-left: 16rem; transition: margin 0.3s; }
        @media (max-width: 768px) { body { margin-left: 0; } }

        .alt {
            padding: 16px;
            border-radius: 14px;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            background: white;
            font-size: 1.05rem;
        }
        .alt:hover:not(.ok):not(.err) {
            border-color: #3b82f6;
            background: #f0f9ff;
            transform: translateY(-2px);
        }
        .sel {
            background: #eff6ff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        .ok {
            background: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #064e3b !important;
        }
        .err {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }
        .letra-circulo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .ok .letra-circulo { background: #10b981; color: white; }
        .err .letra-circulo { background: #ef4444; color: white; }

        .progress-bar {
            height: 6px;
            background: linear-gradient(to right, #3b82f6, #10b981);
            transition: width 0.4s ease;
        }
    </style>
</head>
<body class="bg-gray-50 p-6 font-sans">

    <div class="max-w-3xl mx-auto space-y-8">
        <!-- Cabeçalho com progresso -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="tema" class="text-sm font-bold uppercase tracking-widest text-blue-600">Carregando...</h2>
                <div class="text-sm font-medium text-gray-500">
                    <span id="progresso">1</span> de <span id="total">0</span>
                </div>
            </div>
            <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar w-0"></div>
            </div>
        </div>

        <!-- Card da Questão -->
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <div id="conteudo" class="text-gray-800 text-[1.1rem] leading-relaxed mb-10"></div>

            <div class="flex gap-3">
                <button id="prev" class="px-6 py-3.5 bg-gray-100 text-gray-600 rounded-2xl font-semibold hover:bg-gray-200 transition">Anterior</button>
                <button id="btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-2xl font-bold shadow-lg transition active:scale-[0.985]">
                    Responder
                </button>
                <button id="next" class="px-6 py-3.5 bg-gray-800 hover:bg-black text-white rounded-2xl font-semibold transition">Próxima</button>
            </div>
        </div>

        <!-- Explicação (aparece após responder) -->
        <div id="explicacao-box" class="hidden bg-emerald-50 border border-emerald-200 p-6 rounded-3xl">
            <h3 class="font-bold text-emerald-700 mb-3 flex items-center gap-2">
                📌 Explicação
            </h3>
            <div id="explicacao-texto" class="text-gray-700 leading-relaxed"></div>
        </div>

        <!-- Comentários -->
        <div id="comentarios-box" class="hidden space-y-6">
            <h3 class="font-bold text-xl text-gray-800 border-b pb-4">💬 Discussão Clínica</h3>
            <div id="lista-comentarios" class="space-y-4"></div>

            <div class="bg-white p-5 rounded-3xl border shadow-sm">
                <textarea id="novo-comentario" class="w-full border border-gray-200 focus:border-blue-500 focus:ring-0 outline-none resize-none text-gray-700 rounded-2xl p-4" rows="3" placeholder="Compartilhe seu raciocínio clínico..."></textarea>
                <div class="flex justify-end pt-3">
                    <button id="btn-comentar" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-700 transition">Postar Comentário</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        let questoes = [];
        let indexAtual = 0;
        let questao = null;
        let marcada = null;
        let respondeu = false;

        function getAlt(q, l) {
            return q[`op_${l}`] || q[`opcao_${l}`] || q[`alternativa_${l}`] || "";
        }

        async function carregar() {
            try {
                const { data, error } = await supabaseClient.from("questoes").select("*").order('id');
                if (error) throw error;
                questoes = data || [];
                document.getElementById("total").textContent = questoes.length;
                if (questoes.length > 0) mostrarQuestao();
            } catch (e) {
                console.error("Erro ao carregar questões:", e);
                alert("Não foi possível carregar as questões.");
            }
        }

        function atualizarProgresso() {
            const percent = questoes.length ? Math.round(((indexAtual + 1) / questoes.length) * 100) : 0;
            document.getElementById("progress-bar").style.width = `${percent}%`;
            document.getElementById("progresso").textContent = indexAtual + 1;
        }

        function mostrarQuestao() {
            if (!questoes[indexAtual]) return;

            questao = questoes[indexAtual];
            marcada = null;
            respondeu = false;

            document.getElementById("btn").innerText = "Responder";
            document.getElementById("btn").disabled = false;
            document.getElementById("tema").innerText = questao.tema || "Medicina Geral";
            document.getElementById("explicacao-box").classList.add("hidden");
            document.getElementById("comentarios-box").classList.add("hidden");

            let html = `<p class="mb-8 font-medium">${questao.enunciado}</p><div class="space-y-4">`;

            ["a", "b", "c", "d"].forEach(l => {
                const texto = getAlt(questao, l);
                if (texto) {
                    html += `
                        <div class="alt" data-l="${l}">
                            <div class="letra-circulo">${l.toUpperCase()}</div>
                            <span>${texto}</span>
                        </div>`;
                }
            });
            html += `</div>`;

            document.getElementById("conteudo").innerHTML = html;

            // Clique nas alternativas
            document.querySelectorAll(".alt").forEach(el => {
                el.addEventListener("click", () => {
                    if (respondeu) return;
                    document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
                    el.classList.add("sel");
                    marcada = el.dataset.l;
                });
            });

            atualizarProgresso();
        }

        // ==================== BOTÃO PRINCIPAL ====================
        document.getElementById("btn").addEventListener("click", async () => {
            if (!marcada) {
                alert("Selecione uma alternativa antes de responder.");
                return;
            }

            if (respondeu) {
                // Avançar para próxima
                if (indexAtual < questoes.length - 1) {
                    indexAtual++;
                    mostrarQuestao();
                } else {
                    mostrarResumoFinal();
                }
                return;
            }

            // Responder pela primeira vez
            respondeu = true;
            const btn = document.getElementById("btn");
            btn.disabled = true;

            const respostaCorreta = String(questao.resposta_correta || "").toLowerCase().trim();
            const acertou = marcada === respostaCorreta;

            // Feedback visual
            const mapa = { a: 0, b: 1, c: 2, d: 3 };
            const itens = document.querySelectorAll(".alt");

            // Sempre marca a correta de verde
            if (mapa[respostaCorreta] !== undefined) {
                itens[mapa[respostaCorreta]].classList.add("ok");
            }
            // Marca a escolhida como errada (se errou)
            if (!acertou && mapa[marcada] !== undefined) {
                itens[mapa[marcada]].classList.add("err");
            }

            btn.innerText = "Próxima Questão";
            btn.disabled = false;

            // Mostra explicação (se existir)
            if (questao.explicacao) {
                document.getElementById("explicacao-texto").innerHTML = questao.explicacao;
                document.getElementById("explicacao-box").classList.remove("hidden");
            }

            document.getElementById("comentarios-box").classList.remove("hidden");

            // Salva no banco
            if (typeof registrarRevisao === "function") {
                await registrarRevisao(questao.id, acertou);
            }
            await carregarComentarios();
        });

        function mostrarResumoFinal() {
            const acertos = questoes.filter((q, i) => {
                // Aqui você poderia salvar as respostas do usuário para calcular melhor
                return true; // placeholder
            }).length;

            document.getElementById("conteudo").innerHTML = `
                <div class="text-center py-12">
                    <div class="text-6xl mb-6">🎉</div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Quiz Finalizado!</h2>
                    <p class="text-xl text-gray-600">Parabéns por completar todas as questões.</p>
                    <div class="mt-8 text-5xl font-bold text-blue-600">${indexAtual + 1}/${questoes.length}</div>
                    <p class="text-gray-500 mt-2">questões respondidas</p>
                    
                    <button onclick="location.reload()" 
                            class="mt-10 bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition">
                        Reiniciar Quiz
                    </button>
                </div>`;
            
            document.getElementById("btn").classList.add("hidden");
        }

        // ==================== COMENTÁRIOS (mantido similar, mas melhorado) ====================
        async function carregarComentarios() {
            if (!questao?.id) return;
            try {
                const { data, error } = await supabaseClient
                    .from("comentarios")
                    .select("*")
                    .eq("questao_id", questao.id)
                    .order("created_at", { ascending: false });

                if (error) throw error;

                const lista = document.getElementById("lista-comentarios");
                lista.innerHTML = "";

                if (!data || data.length === 0) {
                    lista.innerHTML = `<p class="text-gray-400 italic text-center py-8">Ainda não há comentários. Seja o primeiro!</p>`;
                    return;
                }

                const principais = data.filter(c => !c.parent_id);
                principais.forEach(c => {
                    const respostas = data.filter(r => r.parent_id === c.id);
                    lista.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm">
                            <div class="flex justify-between mb-3">
                                <b class="text-blue-600">${c.usuario_nome || 'Colega'}</b>
                                <span class="text-xs text-gray-400">${new Date(c.created_at).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-gray-700">${c.texto}</p>
                            <div class="flex gap-6 mt-4 text-sm">
                                <button onclick="like('${c.id}')" class="flex items-center gap-1 text-gray-500 hover:text-blue-600">
                                    👍 <span>${c.likes || 0}</span>
                                </button>
                                <button onclick="responderComentario('${c.id}')" class="text-gray-500 hover:text-blue-600">Responder</button>
                            </div>
                            ${respostas.length ? `
                            <div class="mt-5 ml-6 border-l-2 border-gray-100 pl-5 space-y-4">
                                ${respostas.map(r => `
                                    <div>
                                        <span class="text-xs text-gray-500">${r.usuario_nome}:</span>
                                        <p class="text-gray-600">"${r.texto}"</p>
                                    </div>
                                `).join('')}
                            </div>` : ''}
                        </div>`;
                });
            } catch (e) {
                console.error(e);
            }
        }

        // Funções de comentário (mantidas)
        document.getElementById("btn-comentar").addEventListener("click", async () => {
            const texto = document.getElementById("novo-comentario").value.trim();
            if (!texto || !questao?.id) return;

            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                const nome = user?.email ? user.email.split("@")[0] : "Colega";

                await supabaseClient.from("comentarios").insert([{
                    questao_id: questao.id,
                    texto,
                    usuario_nome: nome
                }]);

                document.getElementById("novo-comentario").value = "";
                await carregarComentarios();
            } catch (e) {
                alert("Erro ao postar comentário.");
            }
        });

        window.like = async (id) => {
            try {
                await supabaseClient.rpc("increment_like", { comment_id: id });
                await carregarComentarios();
            } catch (e) { console.error(e); }
        };

        window.responderComentario = async (parent_id) => {
            const texto = prompt("Sua resposta ao comentário:");
            if (!texto) return;
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                const nome = user?.email ? user.email.split("@")[0] : "Colega";

                await supabaseClient.from("comentarios").insert([{
                    questao_id: questao.id,
                    texto,
                    parent_id,
                    usuario_nome: nome
                }]);
                await carregarComentarios();
            } catch (e) { console.error(e); }
        };

        // Navegação (desabilitada até responder)
        document.getElementById("next").addEventListener("click", () => {
            if (respondeu && indexAtual < questoes.length - 1) {
                indexAtual++;
                mostrarQuestao();
            }
        });

        document.getElementById("prev").addEventListener("click", () => {
            if (indexAtual > 0) {
                indexAtual--;
                mostrarQuestao();
            }
        });

        // Iniciar
        carregar();
    });
    </script>
</body>
</html>
