<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MedQuest Pro - Questões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
        <div id="debug" class="text-[10px] text-red-400 font-mono mb-4">Status: Aguardando script...</div>
        
        <h1 id="tema-titulo" class="text-2xl font-black text-gray-800 mb-6">Carregando...</h1>
        
        <div id="area-questao" class="min-h-[200px]">
            <p class="text-gray-400 italic">Buscando questões no Supabase...</p>
        </div>

        <div class="mt-8 flex gap-4">
            <button onclick="verificar()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">Responder</button>
        </div>
    </div>

    <script>
        // Usei var para evitar erros de escopo em navegadores antigos
        var S_URL = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
        var S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
        
        function reportar(msg) { document.getElementById('debug').innerText = "Status: " + msg; }

        async function iniciar() {
            reportar("Iniciando conexão...");
            try {
                var supabaseClient = supabase.createClient(S_URL, S_KEY);
                var resultado = await supabaseClient.from('questoes').select('*');
                
                if (resultado.error) {
                    reportar("Erro Supabase: " + resultado.error.message);
                    return;
                }

                reportar("Dados recebidos: " + resultado.data.length + " itens.");
                
                // Pegar tema da URL
                var params = new URLSearchParams(window.location.search);
                var temaAlvo = params.get('tema');
                document.getElementById('tema-titulo').innerText = temaAlvo || "Geral";

                var questoes = resultado.data;
                if (temaAlvo) {
                    questoes = resultado.data.filter(function(q) {
                        return (q.tema || "").toLowerCase().trim() === temaAlvo.toLowerCase().trim();
                    });
                }

                if (questoes.length === 0) {
                    document.getElementById('area-questao').innerHTML = "<b class='text-red-500'>Nenhuma questão para o tema: " + temaAlvo + "</b>";
                    reportar("Filtro zerado.");
                } else {
                    renderizar(questoes);
                }

            } catch (err) {
                reportar("Erro crítico: " + err.message);
            }
        }

        function renderizar(q) {
            var html = '<p class="text-lg font-bold text-gray-700 mb-6">' + q.enunciado + '</p><div class="space-y-3">';
            var opcoes = [q.opcao_a, q.opcao_b, q.opcao_c, q.opcao_d];
            opcoes.forEach(function(opt, i) {
                if(opt) {
                    html += '<div class="p-4 border border-gray-200 rounded-xl hover:bg-blue-50 cursor-pointer">' + opt + '</div>';
                }
            });
            document.getElementById('area-questao').innerHTML = html + "</div>";
        }

        window.onload = iniciar;
    </script>
</body>
</html>
