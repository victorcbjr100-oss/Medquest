<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="sidebar.js?v=4.0"></script>
    
    <style>
        .alt-item.selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .alt-item.correta { border-color: #10b981 !important; background-color: #ecfdf5 !important; }
        .alt-item.errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        body { margin-left: 260px; }
        @media (max-width: 768px) { body { margin-left: 0; } }
        
        .aba-comentario {
            display: none;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #3b82f6;
            font-size: 0.875rem;
        }
        /* Efeito de clique no comentário para responder */
        .comentario-card:hover { border-color: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="bg-[#f8fafc] p-4">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 mt-10">
        <div id="monitor" class="text-[10px] font-mono text-blue-500 mb-4 uppercase tracking-widest">Conexão Ativa</div>
        <h1 id="exibir-tema" class="text-2xl font-black text-gray-800 mb-1 uppercase tracking-tighter">Carregando...</h1>
        <p id="exibir-subtema" class="text-xs font-bold text-gray-400 uppercase mb-6"></p>
        
        <div id="bloco-questao"></div>

        <div id="aba-resposta" class="aba-comentario text-gray-600 animate-in fade-in duration-500">
            <h4 class="text-xs font-black text-gray-800 uppercase mb-1">Comentário do Professor:</h4>
            <p id="texto-comentario"></p>
        </div>

        <div id="botoes" class="mt-8 hidden flex gap-3">
            <button onclick="window.history.back()" class="px-5 py-2.5 bg-gray-50 text-gray-400 rounded-xl font-bold text-xs hover:bg-gray-100 transition-all">Anterior</button>
            <button id="btn-acao" onclick="verificarResposta()" class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-md hover:bg-blue-700 transition-all uppercase tracking-wider">Responder</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto mt-6 bg-white p-6 rounded-[24px] border border-gray-100">
        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 flex items-center gap-2">
            <i class="fas fa-comments text-blue-500"></i> Discussão e Respostas
        </h3>
        <div id="lista-comentarios" class="space-y-4 mb-4 max-h-80 overflow-y-auto pr-2"></div>
        
        <div class="flex flex-col gap-2">
            <input id="input-comentario" type="text" placeholder="Escreva um comentário ou clique em um acima para responder..." class="flex-1 bg-gray-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 font-medium text-gray-700 transition-all">
            <div class="flex justify-end">
                <button onclick="enviarComentario()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs hover:bg-blue-700 shadow-sm transition-all uppercase">Postar</button>
            </div>
        </div>
    </div>

    <script>
        const URL_DB = 'https://xkhwfudjcqmbhcdkpewr.supabase.co';
        const KEY_DB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHdmdWRqY3FtYmhjZGtwZXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAwMzQsImV4cCI6MjA4OTk2NjAzNH0.tOHjrpUCfqzt43b3MnC2sbCFXGJzFH95-p85lKGrwQI';
        const supabaseClient = supabase.createClient(URL_DB, KEY_DB);
        
        let questaoAtual = null;
        let respondida = false;
        let selecionada = null;

        async function carregarQuestao() {
            const params = new URLSearchParams(window.location.search);
            const tema = (params.get('tema') || "HAS").toUpperCase();
            const { data, error } = await supabaseClient.from('questoes').select('*').eq('tema', tema);
            
            if (data?.length > 0) {
                questaoAtual = data[Math.floor(Math.random() * data.length)];
                document.getElementById('exibir-tema').innerText = questaoAtual.tema;
                document.getElementById('exibir-subtema').innerText = questaoAtual.subtema || "Geral";
                renderizar(questaoAtual);
                carregarComentarios(questaoAtual.id);
                document.getElementById('botoes').classList.remove('hidden');
            }
        }

        function renderizar(q) {
            let html = `<p class="text-xl font-bold text-gray-700 mb-8 leading-snug">${q.enunciado}</p><div class="space-y-3">`;
            ['a','b','c','d'].forEach(l => {
                const txt = q[`opcao_${l}`] || q[`alternativa_${l}`];
                if(txt) html += `
                    <div onclick="selecionar(this, '${l}')" class="alt-item p-4 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 flex items-center gap-4 transition-all group">
                        <span class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center text-[11px] font-black text-gray-400 uppercase transition-all group-hover:bg-white">${l}</span>
                        <div class="text-gray-600 font-semibold text-sm">${txt}</div>
                    </div>`;
            });
            document.getElementById('bloco-questao').innerHTML = html + "</div>";
        }

        window.selecionar = (el, l) => { 
            if(!respondida) { 
                document.querySelectorAll('.alt-item').forEach(d => d.classList.remove('selecionada')); 
                el.classList.add('selecionada'); 
                selecionada = l; 
            }
        };

        window.verificarResposta = async () => {
            if(!selecionada || respondida) return respondida ? window.location.reload() : null;
            
            respondida = true;
            const correta = (questaoAtual.correta || questaoAtual.resposta_correta).toLowerCase().trim();
            const acertou = selecionada === correta;

            // --- PERSISTÊNCIA DE ESTATÍSTICAS ---
            try {
                await supabaseClient.from('estatisticas').insert([
                    { tema: questaoAtual.tema, acertou: acertou, usuario: 'Dr. Victor' }
                ]);
            } catch (e) { console.error("Erro ao salvar estatística:", e); }

            const itens = document.querySelectorAll('.alt-item');
            const mapa = {a:0, b:1, c:2, d:3};
            
            if(itens[mapa[correta]]) itens[mapa[correta]].classList.add('correta');
            if(!acertou && itens[mapa[selecionada]]) itens[mapa[selecionada]].classList.add('errada');

            if(questaoAtual.comentario_professor) {
                document.getElementById('texto-comentario').innerText = questaoAtual.comentario_professor;
                document.getElementById('aba-resposta').style.display = 'block';
            }
            
            document.getElementById('btn-acao').innerText = "Próxima Questão";
            document.getElementById('btn-acao').classList.replace('bg-blue-600', 'bg-gray-800');
        };

        async function carregarComentarios(id) {
            const { data } = await supabaseClient.from('comentarios').select('*').eq('questao_id', id).order('created_at', { ascending: false });
            const lista = document.getElementById('lista-comentarios');
            lista.innerHTML = '';
            
            if(!data || data.length === 0) {
                lista.innerHTML = '<p class="text-[10px] text-gray-400 italic">Seja o primeiro a comentar esta questão.</p>';
                return;
            }

            data.forEach(c => {
                const dt = new Date(c.created_at);
                const dataFormatada = dt.toLocaleDateString('pt-BR') + ' às ' + dt.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                
                lista.innerHTML += `
                    <div onclick="prepararResposta('${c.usuario}')" class="comentario-card bg-gray-50 p-4 rounded-2xl border border-gray-100 transition-all">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-tighter">${c.usuario}</span>
                            <span class="text-[8px] font-bold text-gray-400 uppercase">${dataFormatada}</span>
                        </div>
                        <p class="text-xs text-gray-600 font-medium leading-relaxed">${c.texto}</p>
                    </div>`;
            });
        }

        window.prepararResposta = (user) => {
            const input = document.getElementById('input-comentario');
            input.value = `@${user} `;
            input.focus();
        };

        async function enviarComentario() {
            const txt = document.getElementById('input-comentario').value;
            if(!txt) return;
            
            const { error } = await supabaseClient.from('comentarios').insert([
                { questao_id: questaoAtual.id, usuario: 'Dr. Victor', texto: txt }
            ]);
            
            if(!error) {
                document.getElementById('input-comentario').value = '';
                carregarComentarios(questaoAtual.id);
            } else {
                alert("Erro ao enviar: " + error.message + ". Verifique se a tabela 'comentarios' existe no Supabase.");
            }
        }

        window.onload = carregarQuestao;
    </script>
</body>
</html>
