<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Questões</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="sidebar.js"></script>

    <style>
        body { margin-left: 260px; }
        @media (max-width: 768px) { body { margin-left: 0; } }

        .alt { padding: 12px; border: 1px solid #eee; border-radius: 12px; cursor: pointer; }
        .alt.sel { background: #eff6ff; border-color: #3b82f6; }
        .alt.ok { background: #ecfdf5; border-color: #10b981; }
        .alt.err { background: #fef2f2; border-color: #ef4444; }
    </style>
</head>

<body class="bg-gray-50 p-4">

<div class="max-w-2xl mx-auto bg-white p-6 rounded-xl mt-10">

    <h2 id="tema" class="text-xl font-bold mb-4">Carregando...</h2>

    <div id="q"></div>

    <button id="btn" class="mt-6 bg-blue-600 text-white px-4 py-2 rounded">
        Responder
    </button>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<script>
let questao = null;
let marcada = null;
let respondeu = false;

async function carregar() {
    try {
        await protegerRota();

        const params = new URLSearchParams(location.search);
        const temaURL = params.get("tema");

        console.log("Tema recebido:", temaURL);

        // 🔍 BUSCA FLEXÍVEL (COM OU SEM TEMA)
        let query = supabaseClient.from("questoes").select("*");

        if (temaURL) {
            query = query.ilike("tema", temaURL);
        }

        const { data, error } = await query;

        if (error) throw error;

        if (!data || data.length === 0) {
            document.getElementById("q").innerHTML =
                "<p class='text-red-500'>Nenhuma questão encontrada.</p>";
            return;
        }

        questao = data[Math.floor(Math.random() * data.length)];

        document.getElementById("tema").textContent = questao.tema || "Sem tema";

        render();

    } catch (e) {
        console.error(e);
        document.getElementById("q").innerHTML =
            "<p class='text-red-500'>Erro ao carregar questão.</p>";
    }
}

function render() {
    let html = `<p class="mb-4">${questao.enunciado}</p>`;

    ["a","b","c","d"].forEach(l => {
        const txt =
            questao["op_" + l] ||
            questao["opcao_" + l] ||
            questao["alternativa_" + l];

        if (txt) {
            html += `
                <div class="alt" onclick="sel(this,'${l}')">
                    <b>${l})</b> ${txt}
                </div>
            `;
        }
    });

    document.getElementById("q").innerHTML = html;
}

function sel(el, l) {
    if (respondeu) return;

    document.querySelectorAll(".alt").forEach(e => e.classList.remove("sel"));
    el.classList.add("sel");

    marcada = l;
}

document.getElementById("btn").onclick = async () => {
    if (!marcada) return;

    if (respondeu) {
        location.reload();
        return;
    }

    respondeu = true;

    const correta = (questao.resposta_correta || "").toLowerCase();

    const itens = document.querySelectorAll(".alt");

    const mapa = {a:0,b:1,c:2,d:3};

    if (itens[mapa[correta]]) itens[mapa[correta]].classList.add("ok");
    if (marcada !== correta && itens[mapa[marcada]]) {
        itens[mapa[marcada]].classList.add("err");
    }

    const user = await getUser();

    await supabaseClient.from("respostas_usuario").insert([{
        user_id: user.id,
        questao_id: questao.id,
        resposta_marcada: marcada,
        acertou: marcada === correta
    }]);

    document.getElementById("btn").textContent = "Próxima";
};

carregar();
</script>

</body>
</html>
