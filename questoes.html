<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Cores de Seleção */
        .selecionada { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .selecionada .letra { background-color: #3b82f6 !important; color: white !important; }
        
        /* Cores de Resposta */
        .correta { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .correta .letra { background-color: #22c55e !important; color: white !important; }
        
        .errada { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .errada .letra { background-color: #ef4444 !important; color: white !important; }

        .travado { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20">

    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="temas.html" class="text-gray-400 hover:text-blue-600 flex items-center gap-2 text-sm font-medium">
                <i class="fas fa-times"></i> Sair
            </a>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Questão 1 de 5</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-6">
            <div class="mb-6">
                <span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded uppercase">Cardiologia</span>
            </div>

            <p class="text-gray-800 text-lg leading-relaxed mb-10 font-medium">
                Paciente com dor precordial e infra de ST em V5 e V6. Qual a conduta inicial?
            </p>

            <div class="space-y-3" id="campoAlternativas">
                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">A</span>
                    <span class="text-sm text-gray-600">Angioplastia primária.</span>
                </button>

                <button onclick="marcar(this)" data-certa="true" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">B</span>
                    <span class="text-sm text-gray-600">Dupla antiagregação e estatina.</span>
                </button>

                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">C</span>
                    <span class="text-sm text-gray-600">Trombólise química.</span>
                </button>

                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">D</span>
                    <span class="text-sm text-gray-600">Aguardar enzimas.</span>
                </button>

                <button onclick="marcar(this)" data-certa="false" class="botao-opcao w-full text-left p-4 rounded-2xl border border-gray-100 transition-all flex items-center gap-4">
                    <span class="letra w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-sm font-bold text-gray-500">E</span>
                    <span class="text-sm text-gray-600">Teste ergométrico.</span>
                </button>
            </div>

            <div class="mt-10 flex justify-end">
                <button id="confirmar" onclick="verificar()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg hover:scale-105 transition-all">
                    Confirmar Resposta
                </button>
                <button id="proxima" onclick="window.location.reload()" class="hidden bg-gray-800 text-white px-10 py-3 rounded-xl font-bold text-sm shadow-lg">
                    Próxima Questão <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <div id="comentarios" class="hidden animate-bounce-in">
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
                <h3 class="font-bold text-gray-800 mb-4 text-sm">Comentários da Questão</h3>
                <textarea class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm mb-4 h-24 focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="Digite sua anotação..."></textarea>
                <button class="bg-blue-50 text-blue-600 text-[10px] font-bold px-4 py-2 rounded-lg uppercase">Salvar Comentário</button>
            </div>
        </div>
    </main>

    <script>
        let selecionada = null;

        // Função para selecionar a alternativa
        function marcar(elemento) {
            // Remove a seleção de todos os botões
            document.querySelectorAll('.botao-opcao').forEach(btn => {
                btn.classList.remove('selecionada');
            });
            // Adiciona seleção ao que foi clicado
            elemento.classList.add('selecionada');
            selecionada = elemento;
        }

        // Função para verificar se acertou
        function verificar() {
            if (!selecionada) {
                alert("Por favor, selecione uma alternativa!");
                return;
            }

            const ehCorreta = selecionada.getAttribute('data-certa') === 'true';

            // Trava os botões para não clicar mais
            document.querySelectorAll('.botao-opcao').forEach(btn => {
                btn.classList.add('travado');
                // Revela a correta em verde
                if (btn.getAttribute('data-certa') === 'true') {
                    btn.classList.add('correta');
                }
            });

            // Se errou, pinta a selecionada de vermelho
            if (!ehCorreta) {
                selecionada.classList.remove('selecionada');
                selecionada.classList.add('errada');
            }

            // Troca os botões e mostra comentários
            document.getElementById('confirmar').classList.add('hidden');
            document.getElementById('proxima').classList.remove('hidden');
            document.getElementById('comentarios').classList.remove('hidden');
            
            // Rola a tela para baixo
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>

</body>
</html>
