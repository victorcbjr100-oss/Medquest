<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediatria - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-[#f8fafc] dark:bg-slate-950 flex min-h-screen">

    <aside class="w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 fixed h-full flex flex-col">
        <div class="p-6">
            <h1 class="font-bold text-blue-600 text-xl flex items-center gap-2">
                <i class="fas fa-brain"></i> MedQuest
            </h1>
        </div>
        <nav class="flex-1 px-4 space-y-1">
             <a href="temas.html" class="flex items-center gap-3 px-3 py-2 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">
                <i class="fas fa-arrow-left"></i> Voltar aos Temas
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8 ml-64">
        <div class="max-w-4xl mx-auto">
            <header class="mb-8">
                <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Módulo 04</span>
                <h2 class="text-3xl font-bold text-gray-800 dark:text-white mt-2">Pediatria Clínica</h2>
                <p class="text-gray-500">Resolva as questões abaixo focadas em crescimento e desenvolvimento.</p>
            </header>

            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border dark:border-slate-800 shadow-sm mb-6">
                <div class="flex justify-between mb-4 text-xs font-bold text-gray-400">
                    <span>QUESTÃO #128</span>
                    <span class="text-blue-500">REVALIDA 2024</span>
                </div>
                <p class="text-gray-700 dark:text-gray-300 leading-relaxed mb-6">
                    Um lactente de 6 meses é levado à consulta de puericultura... (Enunciado da Questão)
                </p>
                <div class="space-y-3">
                    <button class="w-full text-left p-4 rounded-xl border dark:border-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all text-sm dark:text-gray-300">A) Iniciar suplementação de ferro...</button>
                    <button class="w-full text-left p-4 rounded-xl border dark:border-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all text-sm dark:text-gray-300">B) Manter apenas aleitamento materno...</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
