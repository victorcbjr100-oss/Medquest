<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sidebar.js"></script> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin-left: 16rem; }
        @media (max-width: 768px) { body { margin-left: 0; } }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <main class="p-10 max-w-6xl mx-auto">
        <div class="mb-10">
            <h2 class="text-3xl font-bold text-gray-800">Seu Desempenho 📊</h2>
            <p class="text-gray-500 mt-1">Análise detalhada por especialidade médica</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div><p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Total Respondidas</p><h3 id="stat-total" class="text-3xl font-bold text-gray-800">...</h3></div>
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-tasks"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div><p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Precisão Geral</p><h3 id="stat-precisao" class="text-3xl font-bold text-blue-600">...</h3></div>
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-bullseye"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div><p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Acertos Totais</p><h3 id="stat-acertos" class="text-3xl font-bold text-emerald-600">...</h3></div>
                <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center"><i class="fas fa-fire"></i></div>
            </div>
        </div>

        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-6 tracking-widest">Desempenho por Tema</h3>
        
        <div id="lista-estatisticas-temas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-gray-400 italic text-sm">Carregando dados clínicos...</p>
        </div>
    </main>

    <script src="medquest-core.js"></script>
    <script>
        window.onload = () => {
            sincronizarDashboard(); // Preenche os cards de cima
            carregarEstatisticasDetalhadas(); // Preenche a lista por tema
        };
    </script>
</body>
</html>
