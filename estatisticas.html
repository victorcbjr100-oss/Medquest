<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - MedQuest Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script>

    <style>
        body { margin-left: 16rem; font-family: sans-serif; }
        @media (max-width: 768px) { body { margin-left: 0; } }
    </style>
</head>

<body class="bg-[#f8fafc]">

<main class="p-10 max-w-6xl mx-auto">

    <!-- HEADER -->
    <div class="mb-10">
        <h2 class="text-3xl font-bold flex items-center gap-2">
            📊 Estatísticas Avançadas
        </h2>
        <p class="text-gray-500">Análise completa do seu desempenho</p>
    </div>

    <!-- CARDS -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">

        <div class="bg-white p-4 rounded-xl">
            <p class="text-xs text-gray-400">Respondidas</p>
            <h3 id="total" class="text-xl font-bold">0</h3>
        </div>

        <div class="bg-white p-4 rounded-xl">
            <p class="text-xs text-gray-400">Precisão</p>
            <h3 id="precisao" class="text-xl font-bold text-blue-600">0%</h3>
        </div>

        <div class="bg-white p-4 rounded-xl">
            <p class="text-xs text-gray-400">Acertos</p>
            <h3 id="acertos" class="text-xl font-bold text-green-600">0</h3>
        </div>

        <div class="bg-white p-4 rounded-xl">
            <p class="text-xs text-gray-400">Erros</p>
            <h3 id="erros" class="text-xl font-bold text-red-600">0</h3>
        </div>

        <div class="bg-white p-4 rounded-xl">
            <p class="text-xs text-gray-400">Streak</p>
            <h3 id="streak" class="text-xl font-bold text-purple-600">0</h3>
        </div>

    </div>

    <!-- GRID -->
    <div class="grid lg:grid-cols-3 gap-8">

        <!-- EVOLUÇÃO -->
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl">
            <h3 class="text-sm font-bold mb-4">📈 Evolução recente</h3>
            <div id="grafico" class="flex items-end gap-2 h-40"></div>
        </div>

        <!-- TAXA RECENTE -->
        <div class="bg-white p-6 rounded-2xl">
            <h3 class="text-sm font-bold mb-4">⚡ Últimas 10 questões</h3>
            <p id="recente" class="text-3xl font-bold text-blue-600">0%</p>
        </div>

        <!-- TEMAS -->
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl">
            <h3 class="text-sm font-bold mb-4">📚 Desempenho por Tema</h3>
            <div id="temas" class="space-y-4"></div>
        </div>

        <!-- PONTOS FRACOS -->
        <div class="bg-red-50 p-6 rounded-2xl">
            <h3 class="text-sm font-bold text-red-600 mb-4">🚨 Pontos Fracos</h3>
            <div id="fracos" class="space-y-3 text-sm"></div>
        </div>

    </div>

</main>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    try {
        await protegerRota();

        const user = await getUser();

        const { data } = await supabaseClient
            .from('respostas_usuario')
            .select('*, questoes(tema)')
            .eq('user_id', user.id)
            .order('created_at', { ascending: true });

        if (!data || data.length === 0) return;

        // ===== GERAL =====
        const total = data.length;
        const acertos = data.filter(r => r.acertou).length;
        const erros = total - acertos;
        const precisao = ((acertos / total) * 100).toFixed(1);

        document.getElementById("total").textContent = total;
        document.getElementById("acertos").textContent = acertos;
        document.getElementById("erros").textContent = erros;
        document.getElementById("precisao").textContent = `${precisao}%`;

        // ===== STREAK =====
        let streak = 0;
        for (let i = data.length - 1; i >= 0; i--) {
            if (data[i].acertou) streak++;
            else break;
        }
        document.getElementById("streak").textContent = streak;

        // ===== ÚLTIMAS 10 =====
        const ultimas = data.slice(-10);
        const ultAcertos = ultimas.filter(r => r.acertou).length;
        const taxaRecente = ((ultAcertos / ultimas.length) * 100).toFixed(0);
        document.getElementById("recente").textContent = `${taxaRecente}%`;

        // ===== GRÁFICO SIMPLES =====
        const grafico = document.getElementById("grafico");
        grafico.innerHTML = "";

        const ultimas20 = data.slice(-20);

        ultimas20.forEach(r => {
            const bar = document.createElement("div");
            bar.className = "w-3 rounded";
            bar.style.height = r.acertou ? "80%" : "30%";
            bar.style.background = r.acertou ? "#10b981" : "#ef4444";
            grafico.appendChild(bar);
        });

        // ===== TEMAS =====
        const temasMap = {};

        data.forEach(r => {
            const tema = r.questoes?.tema || "Geral";

            if (!temasMap[tema]) {
                temasMap[tema] = { total: 0, acertos: 0 };
            }

            temasMap[tema].total++;
            if (r.acertou) temasMap[tema].acertos++;
        });

        const temasDiv = document.getElementById("temas");
        const fracosDiv = document.getElementById("fracos");

        Object.entries(temasMap).forEach(([tema, stats]) => {
            const perc = ((stats.acertos / stats.total) * 100).toFixed(0);

            temasDiv.innerHTML += `
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span>${tema}</span>
                        <span>${perc}%</span>
                    </div>
                    <div class="w-full bg-gray-100 h-2 rounded">
                        <div class="h-2 bg-blue-600 rounded" style="width:${perc}%"></div>
                    </div>
                </div>
            `;

            if (perc < 70) {
                fracosDiv.innerHTML += `
                    <div class="bg-white p-3 rounded border border-red-200">
                        ${tema} — ${perc}%
                    </div>
                `;
            }
        });

        if (fracosDiv.innerHTML === "") {
            fracosDiv.innerHTML = "<p class='text-green-600'>Sem pontos fracos 🎉</p>";
        }

    } catch (e) {
        console.error(e.message);
    }
});
</script>

</body>
</html>
