<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - MedQuest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card { @apply bg-white dark:bg-slate-900 border border-f1f5f9 dark:border-slate-800 rounded-[1.5rem] p-6 shadow-sm; }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-slate-950 flex min-h-screen transition-colors duration-300">

    <aside class="w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex flex-col fixed h-full transition-colors">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                <i class="fas fa-brain text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 dark:text-white leading-tight">MedQuest</h1>
                <p class="text-xs text-gray-400">Provas e Questões</p>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <p class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider px-2 mb-2">Navegação</p>
            <a href="index.html" class="nav-item flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">
                <i class="fas fa-home w-5"></i> Página Inicial
            </a>
            <a href="temas.html" class="nav-item flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">
                <i class="fas fa-layer-group w-5"></i> Temas
            </a>
            <a href="estatisticas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
                <i class="fas fa-chart-bar w-5"></i> Estatísticas
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100 dark:border-slate-800">
            <button onclick="toggleDarkMode()" class="flex items-center justify-between w-full px-3 py-2 text-xs font-bold text-gray-500 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-xl transition-all">
                <span id="dark-text">Modo Escuro</span>
                <i id="dark-icon" class="fas fa-moon"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 p-8 ml-64">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Painel de Métricas</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Acompanhe sua evolução, Dr. Victor</p>
            </div>
            <div class="flex items-center gap-3 bg-white dark:bg-slate-900 p-2 pr-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">V</div>
                <div>
                    <p class="text-xs font-bold text-gray-800 dark:text-white leading-none">Victor Hugo</p>
                    <span class="text-[10px] bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded-full font-bold uppercase">Nível Intermediário</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="card flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase mb-1">Total de questões</p>
                    <p id="total-questoes" class="text-4xl font-bold text-gray-800 dark:text-white">68</p>
                </div>
                <i class="fas fa-check-circle text-blue-500 text-2xl"></i>
            </div>
            <div class="card flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase mb-1">Desempenho Geral</p>
                    <p id="porcentagem-texto" class="text-4xl font-bold text-gray-800 dark:text-white">41%</p>
                </div>
                <i class="fas fa-chart-line text-green-500 text-2xl"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <p class="text-xs font-bold text-gray-700 dark:text-gray-300 mb-4 uppercase">Evolução Semanal</p>
                <canvas id="chartLinha" height="150"></canvas>
            </div>
            <div class="card">
                <p class="text-xs font-bold text-gray-700 dark:text-gray-300 mb-4 uppercase">Distribuição por Tema</p>
                <canvas id="chartPizza" height="150"></canvas>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateDarkUI(isDark);
        }

        function updateDarkUI(isDark) {
            document.getElementById('dark-text').innerText = isDark ? "Modo Claro" : "Modo Escuro";
            document.getElementById('dark-icon').className = isDark ? "fas fa-sun" : "fas fa-moon";
        }

        (function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.classList.add('dark');
                updateDarkUI(true);
            }
        })();

        // Graficos (Simulados para visualização)
        new Chart(document.getElementById('chartLinha'), {
            type: 'line',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'],
                datasets: [{ label: 'Acertos', data:, borderColor: '#3b82f6', tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
