<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temas - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="sidebar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-tema { transition: all 0.3s ease; cursor: pointer; }
        .card-tema:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        main { margin-left: 16rem; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <header class="mb-10">
                <div id="btn-voltar" class="hidden items-center gap-2 text-[10px] font-bold text-blue-600 uppercase mb-4 cursor-pointer hover:underline" onclick="resetarNavegacao()">
                    <i class="fas fa-arrow-left"></i> Voltar aos Grandes Temas
                </div>
                <h2 id="titulo-pagina" class="text-3xl font-bold text-gray-800">Estudar por Temas</h2>
                <p id="subtitulo-pagina" class="text-gray-500 mt-1">Escolha uma grande área para começar sua revisão</p>
            </header>

            <div id="secao-principal">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div onclick="abrirEspecialidades('Clínica Médica')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                        <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mb-4">
                            <i class="fas fa-stethoscope text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-gray-800 text-lg">Clínica Médica</h4>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase font-bold tracking-widest">Ver Especialidades</p>
                    </div>

                    <div onclick="abrirEspecialidades('Pediatria')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                        <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mb-4">
                            <i class="fas fa-baby text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-gray-800 text-lg">Pediatria</h4>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase font-bold tracking-widest">Ver Especialidades</p>
                    </div>

                    <div onclick="abrirEspecialidades('Ciclo Básico')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                        <div class="w-16 h-16 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center mb-4">
                            <i class="fas fa-microscope text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-gray-800 text-lg">Ciclo Básico</h4>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase font-bold tracking-widest">Ver Especialidades</p>
                    </div>
                </div>
            </div>

            <div id="grade-dinamica" class="hidden">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6" id="container-itens"></div>
            </div>
        </div>
    </main>

    <script>
        const dadosSubtemas = {
            'Clínica Médica': [
                { nome: 'Cardiologia', icon: 'fa-heart', cor: 'red', sub: ['HAS', 'IAM', 'Bradiarritmias', 'Valvopatias'] },
                { nome: 'Pneumologia', icon: 'fa-lungs', cor: 'cyan', sub: ['DPOC', 'Asma', 'TEP'] },
                { nome: 'Nefrologia', icon: 'fa-tint', cor: 'blue', sub: ['IRA', 'DRC', 'Glomerulopatias'] }
            ],
            'Pediatria': [
                { nome: 'Puericultura', icon: 'fa-child', cor: 'emerald', sub: ['Crescimento', 'Desenvolvimento', 'Vacinação'] },
                { nome: 'Neonatologia', icon: 'fa-baby-carriage', cor: 'pink', sub: ['Icterícia', 'Reanimação'] }
            ],
            'Ciclo Básico': [
                { nome: 'Anatomia', icon: 'fa-skeleton', cor: 'purple', sub: ['Sist. Cardiovascular', 'Sist. Nervoso', 'Sist. Digestório'] },
                { nome: 'Fisiologia', icon: 'fa-wave-square', cor: 'indigo', sub: ['Fisiologia Renal', 'Fisiologia Endócrina'] }
            ]
        };

        function abrirEspecialidades(area) {
            document.getElementById('secao-principal').classList.add('hidden');
            document.getElementById('grade-dinamica').classList.remove('hidden');
            document.getElementById('btn-voltar').classList.remove('hidden');
            document.getElementById('titulo-pagina').innerText = area;
            document.getElementById('subtitulo-pagina').innerText = "Escolha a especialidade desejada";

            const container = document.getElementById('container-itens');
            container.innerHTML = '';
            
            dadosSubtemas[area].forEach(esp => {
                container.innerHTML += `
                    <div onclick="abrirAssuntos('${area}', '${esp.nome}')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                        <div class="w-14 h-14 bg-${esp.cor}-50 text-${esp.cor}-500 rounded-2xl flex items-center justify-center mb-4">
                            <i class="fas ${esp.icon} text-xl"></i>
                        </div>
                        <h4 class="font-bold text-gray-800 text-sm">${esp.nome}</h4>
                        <p class="text-[10px] text-blue-600 mt-2 uppercase font-bold tracking-widest">Ver Assuntos</p>
                    </div>
                `;
            });
        }

        function abrirAssuntos(area, espNome) {
            const especialidade = dadosSubtemas[area].find(e => e.nome === espNome);
            document.getElementById('titulo-pagina').innerText = espNome;
            document.getElementById('subtitulo-pagina').innerText = "Clique em um assunto para abrir as questões";
            
            const container = document.getElementById('container-itens');
            container.innerHTML = '';

            especialidade.sub.forEach(assunto => {
                // AQUI ESTAVA O ERRO: Adicionado o onclick para levar à página de questões
                container.innerHTML += `
                    <div onclick="irParaQuestoes('${assunto}')" class="card-tema bg-white border border-gray-100 p-6 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                        <div class="w-12 h-12 bg-slate-50 text-slate-500 rounded-xl flex items-center justify-center mb-3">
                            <i class="fas fa-file-medical text-lg"></i>
                        </div>
                        <h4 class="font-bold text-gray-800 text-xs">${assunto}</h4>
                        <p class="text-[9px] text-blue-600 mt-2 font-bold uppercase tracking-tighter">Praticar Questões</p>
                    </div>
                `;
            });
        }

        function irParaQuestoes(tema) {
            // Redireciona para a página de questões passando o tema via URL
            window.location.href = `questoes.html?tema=${encodeURIComponent(tema)}`;
        }

        function resetarNavegacao() {
            document.getElementById('secao-principal').classList.remove('hidden');
            document.getElementById('grade-dinamica').classList.add('hidden');
            document.getElementById('btn-voltar').classList.add('hidden');
            document.getElementById('titulo-pagina').innerText = "Estudar por Temas";
            document.getElementById('subtitulo-pagina').innerText = "Escolha uma grande área para começar sua revisão";
        }
    </script>
</body>
</html>
