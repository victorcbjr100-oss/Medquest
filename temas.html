<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temas - MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-tema { transition: all 0.3s ease; cursor: pointer; }
        .card-tema:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col fixed h-full">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-brain text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 leading-tight">MedQuest</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Provas e Questões</p>
            </div>
        </div>
        <nav class="flex-1 px-4 mt-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-gray-500 hover:bg-gray-50 rounded-xl">
                <i class="fas fa-home w-5"></i> Página Inicial
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-blue-600 bg-blue-50 rounded-xl">
                <i class="fas fa-layer-group w-5"></i> Temas
            </a>
        </nav>
    </aside>

    <main class="ml-64 flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <header class="mb-10">
                <div id="breadcrumb" class="hidden items-center gap-2 text-xs font-bold text-blue-600 uppercase mb-4 cursor-pointer hover:underline" onclick="voltarParaGrandesTemas()">
                    <i class="fas fa-arrow-left"></i> Voltar aos Grandes Temas
                </div>
                <h2 id="main-title" class="text-3xl font-bold text-gray-800">Escolha um Tema</h2>
                <p id="main-subtitle" class="text-gray-500 mt-1">Selecione uma área para começar a praticar</p>
            </header>

            <div id="grade-grandes-temas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div onclick="mostrarSubtemas('Clínica Médica')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                    <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-stethoscope text-2xl"></i>
                    </div>
                    <h4 class="font-bold text-gray-800 text-lg">Clínica Médica</h4>
                    <p class="text-xs text-gray-400 mt-2">Cardiologia, Nefrologia, etc.</p>
                </div>

                <div onclick="mostrarSubtemas('Cirurgia')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                    <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-hand-holding-medical text-2xl"></i>
                    </div>
                    <h4 class="font-bold text-gray-800 text-lg">Cirurgia</h4>
                    <p class="text-xs text-gray-400 mt-2">Geral, Trauma, Urologia</p>
                </div>

                <div onclick="mostrarSubtemas('Pediatria')" class="card-tema bg-white border border-gray-100 p-8 rounded-[24px] shadow-sm flex flex-col items-center text-center">
                    <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-baby text-2xl"></i>
                    </div>
                    <h4 class="font-bold text-gray-800 text-lg">Pediatria</h4>
                    <p class="text-xs text-gray-400 mt-2">Puericultura, Neonatologia</p>
                </div>
            </div>

            <div id="grade-subtemas" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>

        </div>
    </main>

    <script>
        const subtemasPorArea = {
            'Clínica Médica': [
                { nome: 'Cardiologia', icon: 'fa-heart', cor: 'red' },
                { nome: 'Pneumologia', icon: 'fa-lungs', cor: 'cyan' },
                { nome: 'Nefrologia', icon: 'fa-tint', cor: 'blue' },
                { nome: 'Infectologia', icon: 'fa-virus', cor: 'lime' }
            ],
            'Cirurgia': [
                { nome: 'Cirurgia Geral', icon: 'fa-scalpel', cor: 'slate' },
                { nome: 'Traumatologia', icon: 'fa-bone', cor: 'orange' },
                { nome: 'Urologia', icon: 'fa-pills', cor: 'indigo' }
            ],
            'Pediatria': [
                { nome: 'Neonatologia', icon: 'fa-baby-carriage', cor: 'pink' },
                { nome: 'Puericultura', icon: 'fa-child', cor: 'emerald' }
            ]
        };

        function mostrarSubtemas(area) {
            // Esconde a grade principal
            document.getElementById('grade-grandes-temas').classList.add('hidden');
            
            // Mostra a grade de subtemas e o botão de voltar
            const gradeSub = document.getElementById('grade-subtemas');
            gradeSub.classList.remove('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            
            // Atualiza títulos
            document.getElementById('main-title').innerText = area;
            document.getElementById('main-subtitle').innerText = `Subtemas de ${area}`;

            // Limpa e popula subtemas
            gradeSub.innerHTML = '';
            subtemasPorArea[area].forEach(sub => {
                gradeSub.innerHTML += `
                    <div class="card-tema bg-white border border-gray-100 p-6 rounded-[20px] shadow-sm flex flex-col items-center text-center">
                        <div class="w-12 h-12 bg-${sub.cor}-50 text-${sub.cor}-500 rounded-xl flex items-center justify-center mb-3">
                            <i class="fas ${sub.icon} text-xl"></i>
                        </div>
                        <h5 class="font-bold text-gray-800 text-sm">${sub.nome}</h5>
                        <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold">Ver Questões</p>
                    </div>
                `;
            });
        }

        function voltarParaGrandesTemas() {
            document.getElementById('grade-grandes-temas').classList.remove('hidden');
            document.getElementById('grade-subtemas').classList.add('hidden');
            document.getElementById('breadcrumb').classList.add('hidden');
            
            document.getElementById('main-title').innerText = "Escolha um Tema";
            document.getElementById('main-subtitle').innerText = "Selecione uma área para começar a praticar";
        }
    </script>
</body>
</html>
