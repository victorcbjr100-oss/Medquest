<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temas - MedQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-brain text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 leading-tight">MedQuest</h1>
                <p class="text-xs text-gray-400">Provas e Questões</p>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-1 mt-4">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 mb-2">Navegação</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-all">
                <i class="fas fa-home w-5"></i> Página Inicial
            </a>
            <a href="temas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">
                <i class="fas fa-layer-group w-5"></i> Temas
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-all">
                <i class="fas fa-stopwatch w-5"></i> Simulados
            </a>
            <a href="estatisticas.html" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-all">
                <i class="fas fa-chart-bar w-5"></i> Estatísticas
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8 ml-64">
        <header class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Estudar por Temas</h2>
            <p class="text-gray-500">Escolha uma especialidade para ver os subtemas disponíveis</p>
        </header>

        <div class="mb-8 flex gap-2">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Buscar especialidade..." class="w-full pl-12 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20">
            </div>
            <div class="flex border border-gray-200 rounded-xl overflow-hidden">
                <button class="px-4 py-2 bg-white text-xs font-bold hover:bg-gray-50 border-r">Todas</button>
                <button class="px-4 py-2 bg-white text-xs font-bold hover:bg-gray-50 border-r">Fácil</button>
                <button class="px-4 py-2 bg-white text-xs font-bold hover:bg-gray-50 border-r">Médio</button>
                <button class="px-4 py-2 bg-white text-xs font-bold hover:bg-gray-50">Difícil</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-4">
                    <i class="fas fa-heart text-red-500"></i>
                    <h3 class="font-bold text-gray-800 text-lg">Cardiologia</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <a href="questoes.html?tema=Bradiarritmias" class="flex flex-col p-4 border border-gray-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all group">
                        <span class="font-semibold text-gray-700 group-hover:text-blue-600">Bradiarritmias</span>
                        <span class="text-xs text-gray-400">30 questões</span>
                    </a>
                    </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-4">
                    <i class="fas fa-child text-purple-500"></i>
                    <h3 class="font-bold text-gray-800 text-lg">Pediatria</h3>
                </div>
                <p class="text-sm text-gray-400 italic">Selecione para ver as questões...</p>
            </div>
        </div>
    </main>

</body>
</html>
