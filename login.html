<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="max-w-md w-full bg-white p-8 rounded-[32px] shadow-2xl border border-slate-100">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
            <i data-lucide="graduation-cap" class="text-white w-8 h-8"></i>
        </div>
        <h2 class="text-3xl font-black text-slate-800">MedQuest <span class="text-blue-600">Pro</span></h2>
    </div>

    <div class="flex mb-8 border-b border-slate-100">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 font-bold text-sm tab-active">Entrar</button>
        <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-2 font-bold text-sm text-slate-400">Criar Conta</button>
    </div>

    <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-100 py-4 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-all active:scale-95 mb-6">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar com Google
    </button>

    <div class="relative mb-6 text-center">
        <span class="bg-white px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Ou use seu e-mail</span>
    </div>

    <div class="space-y-4">
        <input type="email" id="email" placeholder="E-mail" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-all text-sm">
        <input type="password" id="senha" placeholder="Senha" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-all text-sm">
        <button id="btn-acao" onclick="executarAcao()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg">Entrar</button>
    </div>
</div>

<script>
let modo = 'login';

function switchTab(novaTab) {
    modo = novaTab;
    document.getElementById('tab-login').className = modo === 'login' ? 'flex-1 py-2 font-bold text-sm tab-active' : 'flex-1 py-2 font-bold text-sm text-slate-400';
    document.getElementById('tab-signup').className = modo === 'signup' ? 'flex-1 py-2 font-bold text-sm tab-active' : 'flex-1 py-2 font-bold text-sm text-slate-400';
    document.getElementById('btn-acao').innerText = modo === 'login' ? 'Entrar' : 'Criar minha conta';
}

// LOGIN GOOGLE
async function loginGoogle() {
    const { error } = await window.supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'index.html' } // Redireciona direto para a página inicial
    });
    if (error) alert("Erro Google: " + error.message);
}

// LOGIN / CADASTRO
async function executarAcao() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('senha').value;

    if (modo === 'login') {
        const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else window.location.href = 'index.html'; // Redireciona para a página inicial
    } else {
        const { error } = await window.supabaseClient.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert("Conta criada! Verifique seu e-mail para confirmar.");
    }
}

// VERIFICAÇÃO DE LOGIN
window.onload = async () => {
    lucide.createIcons();

    const { data: { session } } = await window.supabaseClient.auth.getSession();

    // Se já estiver logado, redireciona para página inicial
    if (session) {
        window.location.href = 'index.html';
    }
};
</script>
</body>
</html>
